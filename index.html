<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Before</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;700&family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="void"]{
--bg-0:#000;--bg-1:#050505;--bg-2:#0a0a0a;--bg-3:#111;--bg-4:#1a1a1a;
--card:rgba(255,255,255,.03);--card-b:rgba(255,255,255,.06);--card-h:rgba(255,255,255,.08);
--text-100:#fff;--text-80:rgba(255,255,255,.8);--text-60:rgba(255,255,255,.6);
--text-40:rgba(255,255,255,.4);--text-20:rgba(255,255,255,.2);--text-10:rgba(255,255,255,.1);
--glow:rgba(255,255,255,.12);--glow-s:rgba(255,255,255,.06);
--accent:#fff;--accent-dim:#888;
--blur:blur(40px);--blur-s:blur(20px)
}
[data-theme="slate"]{
--bg-0:#0f0f12;--bg-1:#14141a;--bg-2:#1a1a22;--bg-3:#22222c;--bg-4:#2a2a36;
--card:rgba(255,255,255,.04);--card-b:rgba(255,255,255,.07);--card-h:rgba(255,255,255,.1);
}
[data-theme="frost"]{
--bg-0:#e8e8ec;--bg-1:#f0f0f4;--bg-2:#f5f5f8;--bg-3:#fafafe;--bg-4:#fff;
--card:rgba(0,0,0,.04);--card-b:rgba(0,0,0,.08);--card-h:rgba(0,0,0,.06);
--text-100:#111;--text-80:rgba(0,0,0,.8);--text-60:rgba(0,0,0,.55);
--text-40:rgba(0,0,0,.35);--text-20:rgba(0,0,0,.15);--text-10:rgba(0,0,0,.08);
--glow:rgba(0,0,0,.08);--glow-s:rgba(0,0,0,.04);--accent:#000;--accent-dim:#666;
}
[data-theme="solar"]{
--bg-0:#0d0c0a;--bg-1:#141310;--bg-2:#1c1b17;--bg-3:#24231e;--bg-4:#2e2d27;
--card:rgba(255,245,230,.04);--card-b:rgba(255,245,230,.07);--card-h:rgba(255,245,230,.1);
--text-100:#f5f0e8;--text-80:rgba(245,240,232,.8);--text-60:rgba(245,240,232,.55);
--text-40:rgba(245,240,232,.35);--text-20:rgba(245,240,232,.15);--text-10:rgba(245,240,232,.08);
--glow:rgba(255,245,230,.1);--accent:#f5f0e8;--accent-dim:#998;
}
[data-theme="matte"]{
--bg-0:#161616;--bg-1:#1c1c1c;--bg-2:#222;--bg-3:#2a2a2a;--bg-4:#333;
--card:rgba(255,255,255,.035);--card-b:rgba(255,255,255,.06);--card-h:rgba(255,255,255,.08);
}
html{scroll-behavior:smooth}
body{width:100%;min-height:100vh;overflow-x:hidden;background:var(--bg-0);color:var(--text-100);
font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .6s,color .6s}
#root{min-height:100vh;position:relative}
canvas.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.fd{font-family:'Space Grotesk',sans-serif}

/* INTRO */
.intro-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
background:#000;transition:opacity 1.2s cubic-bezier(.4,0,.2,1);overflow:hidden}
.intro-screen.out{opacity:0;pointer-events:none}
.intro-center{text-align:center;position:relative;z-index:2}
.intro-line{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.4rem,4.5vw,3rem);font-weight:300;
letter-spacing:-.02em;min-height:1.4em;display:flex;align-items:center;justify-content:center;
flex-wrap:wrap;gap:0;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;width:max-content}
.intro-line .ch{display:inline-block;opacity:0;filter:blur(16px);transform:translateY(28px);
transition:opacity .7s,filter .8s,transform .7s;transition-timing-function:cubic-bezier(.25,.46,.45,.94)}
.intro-line.vis .ch{opacity:1;filter:blur(0);transform:translateY(0)}
.intro-line.fade-out{transition:opacity .8s,transform .8s;opacity:0;transform:translate(-50%,-50%) translateY(-20px)!important}

.morph-100{font-size:clamp(5rem,18vw,12rem);font-weight:700;position:relative;display:inline-block;
transition:text-shadow 1s;letter-spacing:-.02em;line-height:1}
.morph-100.locked{text-shadow:0 0 60px rgba(255,255,255,.4),0 0 120px rgba(255,255,255,.15),0 0 200px rgba(255,255,255,.08);
font-family:'Space Grotesk',sans-serif!important}
.morph-100.locked .ray{opacity:1}
.ray{position:absolute;top:50%;left:50%;width:2px;background:linear-gradient(to bottom,rgba(255,255,255,.3),transparent);
transform-origin:top center;opacity:0;transition:opacity 1.5s}

.glitch-before{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,7vw,5rem);font-weight:700;
letter-spacing:.3em;position:relative;display:inline-block;margin-top:8px}
.glitch-before.active{animation:glitchText .6s steps(1) forwards}
.glitch-before .echo{position:absolute;inset:0;opacity:0;filter:blur(8px);transition:opacity .5s}
.glitch-before.stable{text-shadow:0 0 40px rgba(255,255,255,.3),0 0 80px rgba(255,255,255,.1)}
.glitch-before.stable .echo{opacity:.15}

@keyframes glitchText{
0%{clip-path:inset(0);transform:translate(0);text-shadow:3px 0 rgba(255,100,100,.4),-3px 0 rgba(100,100,255,.4)}
10%{clip-path:inset(40% 0 20% 0);transform:translate(-4px,2px);text-shadow:4px 0 rgba(255,80,80,.5),-4px 0 rgba(80,80,255,.5)}
20%{clip-path:inset(10% 0 60% 0);transform:translate(3px,-1px);text-shadow:-3px 0 rgba(255,120,120,.3),3px 0 rgba(120,120,255,.3)}
30%{clip-path:inset(0);transform:translate(0);text-shadow:none}
40%{clip-path:inset(60% 0 10% 0);transform:translate(-3px,1px) scaleX(1.02);text-shadow:2px 0 rgba(255,100,100,.4),-2px 0 rgba(100,100,255,.4)}
50%{clip-path:inset(0);transform:translate(0) scale(1.04);text-shadow:none}
60%{clip-path:inset(20% 0 40% 0);transform:translate(2px,-2px);text-shadow:-4px 0 rgba(255,80,80,.3),4px 0 rgba(80,80,255,.3)}
70%,100%{clip-path:inset(0);transform:translate(0) scale(1);text-shadow:0 0 40px rgba(255,255,255,.3)}
}

.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);
pointer-events:none;z-index:101;opacity:0;transition:opacity .5s}
.scanlines.vis{opacity:1}

.skip-btn{position:fixed;bottom:32px;right:32px;z-index:200;background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-family:'Inter',sans-serif;
font-size:12px;padding:10px 24px;border-radius:100px;cursor:pointer;transition:all .3s;
backdrop-filter:blur(10px);letter-spacing:.05em}
.skip-btn:hover{background:rgba(255,255,255,.12);color:#fff;transform:scale(1.05)}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
transition:opacity .8s,transform .8s;background:transparent}
.login-screen.out{opacity:0;pointer-events:none;transform:scale(1.03)}
.login-wrap{display:flex;width:min(900px,92vw);min-height:480px;border-radius:24px;overflow:hidden;
background:var(--card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
border:1px solid var(--card-b);box-shadow:0 8px 60px rgba(0,0,0,.5),0 0 80px var(--glow-s);
position:relative;animation:loginIn .8s cubic-bezier(.34,1.56,.64,1)}
@keyframes loginIn{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:none}}
.login-left{flex:1;display:flex;align-items:center;justify-content:center;position:relative;
background:linear-gradient(135deg,rgba(255,255,255,.02),rgba(255,255,255,.005));overflow:hidden;min-height:200px}
.login-left-100{font-family:'Space Grotesk',sans-serif;font-size:clamp(6rem,12vw,10rem);font-weight:700;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:2;
text-shadow:none;filter:drop-shadow(0 0 40px var(--glow));animation:float100 6s ease-in-out infinite}
@keyframes float100{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-left::after{content:'';position:absolute;width:200%;height:200%;
background:radial-gradient(circle,var(--glow) 0%,transparent 60%);animation:leftGlow 8s ease infinite;opacity:.5}
@keyframes leftGlow{0%,100%{transform:translate(-30%,-30%)}50%{transform:translate(-20%,-20%)}}
.login-before-vert{position:absolute;right:20px;top:50%;transform:translateY(-50%);
writing-mode:vertical-rl;font-family:'Space Grotesk',sans-serif;font-size:clamp(1rem,2vw,1.6rem);
font-weight:700;letter-spacing:.4em;color:var(--text-20);
background:linear-gradient(180deg,var(--text-40),var(--text-10));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.login-right{flex:1;padding:48px 40px;display:flex;flex-direction:column;justify-content:center}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:600;margin-bottom:6px;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:13px;color:var(--text-40);margin-bottom:32px}
.input-g{position:relative;margin-bottom:22px}
.input-g input{width:100%;padding:16px 18px 8px;background:var(--card);border:1px solid var(--card-b);
border-radius:10px;color:var(--text-100);font-size:15px;font-family:'Inter',sans-serif;outline:none;
transition:all .4s cubic-bezier(.4,0,.2,1)}
.input-g input:focus{border-color:rgba(255,255,255,.25);background:var(--card-h);
box-shadow:0 0 0 3px var(--glow-s),0 0 30px var(--glow-s)}
.input-g input.err{border-color:rgba(180,60,60,.5);box-shadow:0 0 20px rgba(180,60,60,.1)}
.input-g label{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:14px;
color:var(--text-40);pointer-events:none;transition:all .3s cubic-bezier(.4,0,.2,1)}
.input-g input:focus+label,.input-g input:not(:placeholder-shown)+label{
top:10px;transform:translateY(0);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-60)}
.input-g .focus-line{position:absolute;bottom:0;left:50%;width:0;height:2px;
background:linear-gradient(90deg,transparent,var(--text-40),transparent);transition:all .4s;border-radius:2px}
.input-g input:focus~.focus-line{left:10%;width:80%}
.btn-mag{width:100%;padding:16px;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));
border:1px solid var(--card-b);border-radius:10px;color:var(--text-100);font-size:15px;font-weight:500;
font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);
position:relative;overflow:hidden;margin-top:8px}
.btn-mag:hover{transform:scale(1.02) translateY(-1px);box-shadow:0 8px 30px var(--glow-s);
background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.08));border-color:var(--text-20)}
.btn-mag:active{transform:scale(.98)}
.btn-mag .shine{position:absolute;top:0;left:-100%;width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shine 4s infinite}
@keyframes shine{0%{left:-100%}40%,100%{left:100%}}
.ripple-e{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);
transform:scale(0);animation:ripple .6s ease-out forwards;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}
.login-wrap.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-6px)}30%,60%{transform:translateX(6px)}}
.login-wrap.glow-success{box-shadow:0 0 80px rgba(255,255,255,.15),0 0 160px rgba(255,255,255,.05)!important;
border-color:rgba(255,255,255,.2)!important}
.light-streak{position:absolute;width:1px;height:80px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.08),transparent);
animation:streak 5s linear infinite;opacity:.5}
@keyframes streak{0%{transform:translateY(-100px);opacity:0}20%{opacity:.5}80%{opacity:.5}100%{transform:translateY(500px);opacity:0}}

/* DASHBOARD */
.dashboard{position:relative;z-index:1;min-height:100vh;transition:opacity .6s}
.dash-header{position:sticky;top:0;z-index:30;padding:14px 24px;display:flex;align-items:center;
justify-content:space-between;background:rgba(0,0,0,.6);backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--card-b);transition:background .5s}
[data-theme="frost"] .dash-header{background:rgba(255,255,255,.8)}
.dash-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.06em;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;align-items:center;gap:12px}
.avatar-sm{width:32px;height:32px;border-radius:50%;background:var(--card-h);border:1px solid var(--card-b);
display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;
overflow:hidden;transition:all .3s;color:var(--text-60)}
.avatar-sm:hover{border-color:var(--text-20)}
.avatar-sm img{width:100%;height:100%;object-fit:cover}
.btn-sm{background:none;border:1px solid var(--card-b);color:var(--text-40);font-size:11px;
padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.btn-sm:hover{border-color:var(--text-20);color:var(--text-100)}
.dash-body{max-width:1100px;margin:0 auto;padding:32px 20px 120px}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-c{background:var(--card);backdrop-filter:var(--blur-s);border:1px solid var(--card-b);
border-radius:16px;padding:24px 20px;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.stat-c::before{content:'';position:absolute;inset:-1px;border-radius:inherit;
background:linear-gradient(135deg,rgba(255,255,255,.05),transparent 50%);pointer-events:none}
.stat-c:hover{background:var(--card-h);border-color:var(--text-20);transform:translateY(-2px);
box-shadow:0 8px 30px rgba(0,0,0,.3)}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-40);margin-bottom:8px}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.stat-sub{font-size:11px;color:var(--text-20);margin-top:4px}

/* PROGRESS */
.progress-area{display:flex;gap:32px;margin-bottom:36px;flex-wrap:wrap;align-items:center;justify-content:center}
.ring-w{position:relative;width:170px;height:170px;flex-shrink:0}
.ring-w svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--card-b);stroke-width:6}
.ring-fg{fill:none;stroke:url(#rg);stroke-width:6;stroke-linecap:round;
transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 8px var(--glow))}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;color:var(--text-100)}
.ring-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-40);margin-top:2px}
.ring-glow{position:absolute;inset:20px;border-radius:50%;background:radial-gradient(circle,var(--glow-s),transparent 70%);
animation:ringPulse 3s ease-in-out infinite}
@keyframes ringPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.05)}}
.xp-area{flex:1;min-width:250px}
.xp-lv{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;margin-bottom:8px;color:var(--text-80)}
.xp-lv span{font-size:.75rem;color:var(--text-40);font-weight:400;margin-left:8px}
.xp-track{width:100%;height:8px;background:var(--card-b);border-radius:100px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--text-20),var(--text-60));border-radius:100px;
transition:width 1s cubic-bezier(.4,0,.2,1);position:relative}
.xp-fill::after{content:'';position:absolute;right:0;top:-2px;bottom:-2px;width:16px;
background:var(--text-80);border-radius:100px;filter:blur(4px);opacity:.6}
.xp-sub{font-size:11px;color:var(--text-20);margin-top:6px}
.streak-b{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--card-b);
border-radius:100px;padding:8px 18px;font-size:13px;margin-top:14px;color:var(--text-60)}
.flame{display:inline-block;animation:flame 1s ease infinite}
@keyframes flame{0%,100%{transform:scale(1) rotate(-3deg);filter:brightness(1)}
50%{transform:scale(1.15) rotate(3deg);filter:brightness(1.3)}}

/* WEEKLY CHALLENGE */
.wc-card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:24px;
margin-bottom:32px;position:relative;overflow:hidden;backdrop-filter:var(--blur-s)}
.wc-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;
background:linear-gradient(135deg,rgba(255,255,255,.05),transparent 40%);pointer-events:none}
.wc-tag{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-40);margin-bottom:10px;
display:flex;align-items:center;gap:6px}
.wc-goal{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:500;margin-bottom:16px;color:var(--text-80)}
.cd-row{display:flex;gap:10px;flex-wrap:wrap}
.cd-u{text-align:center;background:var(--card);border:1px solid var(--card-b);border-radius:10px;padding:10px 14px;min-width:58px}
.cd-n{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text-100);
display:inline-block;transition:transform .3s}
.cd-l{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-20);margin-top:3px}

/* BADGES */
.badges-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.badge{width:52px;height:52px;border-radius:50%;background:var(--card);border:1px solid var(--card-b);
display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .4s;position:relative;cursor:default}
.badge.locked{opacity:.25;filter:grayscale(1)}
.badge:not(.locked):hover{transform:scale(1.15);box-shadow:0 0 20px var(--glow);border-color:var(--text-20)}
.badge-tip{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:9px;
color:var(--text-40);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.badge:hover .badge-tip{opacity:1}
.badge-unlock{animation:badgeUnlock .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgeUnlock{0%{transform:scale(0) rotate(-180deg)}100%{transform:scale(1) rotate(0)}}

/* GOALS */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:600;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.filter-row{display:flex;gap:6px}
.filter-btn{background:transparent;border:1px solid var(--card-b);color:var(--text-40);font-size:11px;
padding:5px 14px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.filter-btn.act{background:var(--card-h);border-color:var(--text-20);color:var(--text-100)}
.add-btn{background:var(--card);border:1px solid var(--card-b);color:var(--text-60);font-size:13px;
padding:8px 20px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;
display:flex;align-items:center;gap:6px}
.add-btn:hover{background:var(--card-h);color:var(--text-100);border-color:var(--text-20)}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.goal-card{background:var(--card);backdrop-filter:var(--blur-s);border:1px solid var(--card-b);
border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px;
transition:all .4s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;overflow:hidden;
transform-style:preserve-3d;animation:cardIn .5s cubic-bezier(.4,0,.2,1) forwards;opacity:0}
.goal-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px}

/* MODAL */
.modal-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);

@keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:none}}

background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.modal-c textarea,.modal-c input[type="text"]{width:100%;padding:14px;background:var(--card);
border:1px solid var(--card-b);border-radius:8px;color:var(--text-100);font-size:14px;
font-family:'Inter',sans-serif;outline:none;resize:vertical;transition:border-color .3s;line-height:1.6}

cursor:pointer;transition:all .3s}

margin-bottom:32px;backdrop-filter:var(--blur-s)}

border-radius:50%;top:3px;left:3px;transition:all .3s}

/* COLLAPSIBLE */
.collapse-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;
padding:8px 0;margin-bottom:12px}

/* CONFETTI */

@keyframes cBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

animation:xpUp 1.2s cubic-bezier(.4,0,.2,1) forwards}

}
@media(max-width:400px){.stats-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<svg style="position:absolute;width:0;height:0">
<defs>
<linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#fff"/>
<stop offset="100%" stop-color="#666"/>
</linearGradient>
</defs>
</svg>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo,createContext,useContext,memo}=React;

// ====== CONSTANTS ======
const STORE='100b_data';const XP_GOAL=100;const XP_LV=500;const XP_DAILY=10;
const MORPH_FONTS=[
'Georgia,serif','"Courier New",monospace','Impact,sans-serif',
'"Oswald",sans-serif','"Playfair Display",serif','"JetBrains Mono",monospace',
'"Bebas Neue",sans-serif','"Anton",sans-serif','"Space Grotesk",sans-serif'
];
const THEMES=[
{id:'void',name:'Void',colors:['#000','#111','#222']},
{id:'slate',name:'Slate',colors:['#0f0f12','#1a1a22','#2a2a36']},
{id:'frost',name:'Frost',colors:['#e8e8ec','#f0f0f4','#fff']},
{id:'solar',name:'Solar',colors:['#0d0c0a','#1c1b17','#2e2d27']},
{id:'matte',name:'Matte',colors:['#161616','#222','#333']}
];
const BADGES=[
{id:'first',icon:'⭐',name:'First Step',desc:'Complete 1 goal',check:d=>d.goals.filter(g=>g.done).length>=1},
{id:'ten',icon:'🔥',name:'On Fire',desc:'Complete 10 goals',check:d=>d.goals.filter(g=>g.done).length>=10},
{id:'quarter',icon:'💎',name:'Quarter',desc:'Complete 25 goals',check:d=>d.goals.filter(g=>g.done).length>=25},
{id:'half',icon:'🏆',name:'Halfway',desc:'Complete 50 goals',check:d=>d.goals.filter(g=>g.done).length>=50},
{id:'hundred',icon:'👑',name:'Legend',desc:'Complete 100 goals',check:d=>d.goals.filter(g=>g.done).length>=100},
{id:'streak7',icon:'⚡',name:'Dedicated',desc:'7-day streak',check:d=>d.streak>=7},
{id:'streak30',icon:'🌟',name:'Unstoppable',desc:'30-day streak',check:d=>d.streak>=30},
{id:'lv5',icon:'🎯',name:'Leveled Up',desc:'Reach level 5',check:d=>Math.floor(d.xp/XP_LV)>=5},
];

// ====== HELPERS ======
function load(){try{const d=localStorage.getItem(STORE);return d?JSON.parse(d):null}catch(e){return null}}
function save(d){try{localStorage.setItem(STORE,JSON.stringify(d))}catch(e){}}
function initData(u){
const now=new Date().toISOString();
return{username:u,goals:[],xp:0,streak:1,lastActive:now.split('T')[0],avatar:null,
weeklyGoalIdx:null,weeklyEnd:new Date(Date.now()+7*864e5).toISOString(),
theme:'void',motionIntensity:1,bgEnabled:true,unlockedBadges:[],gsFilter:false};
}
function checkStreak(d){
const today=new Date().toISOString().split('T')[0];
if(d.lastActive===today)return d;
const y=new Date(Date.now()-864e5).toISOString().split('T')[0];
return{...d,streak:d.lastActive===y?d.streak+1:1,lastActive:today,xp:d.xp+XP_DAILY};
}

// ====== THEME CONTEXT ======
const ThemeCtx=createContext();
function ThemeProvider({children}){
const[theme,setTheme]=useState(()=>{const d=load();return d?.theme||'void'});
useEffect(()=>{document.documentElement.setAttribute('data-theme',theme)},[theme]);
const changeTheme=useCallback(t=>{setTheme(t);document.documentElement.setAttribute('data-theme',t)},[]);
return <ThemeCtx.Provider value={{theme,changeTheme}}>{children}</ThemeCtx.Provider>;
}

// ====== HOOKS ======
function useAnimNum(target,dur=800){
const[v,setV]=useState(target);const prev=useRef(target);
useEffect(()=>{
const s=prev.current;const st=performance.now();let af;
function tick(now){
const p=Math.min((now-st)/dur,1);const e=1-Math.pow(1-p,3);
setV(Math.round(s+(target-s)*e));
if(p<1)af=requestAnimationFrame(tick);else prev.current=target;
}
af=requestAnimationFrame(tick);return()=>cancelAnimationFrame(af);
},[target,dur]);
return v;
}

// ====== PARTICLE CANVAS ======
const ParticleCanvas=memo(function({intensity=1,isDark=true}){
const ref=useRef(null);const pts=useRef([]);const mouse=useRef({x:-9e3,y:-9e3});const raf=useRef(0);
useEffect(()=>{
const c=ref.current;const ctx=c.getContext('2d');
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();
const N=Math.min(Math.floor(60*intensity),100);
pts.current=Array.from({length:N},()=>({
x:Math.random()*c.width,y:Math.random()*c.height,
vx:(Math.random()-.5)*.3*intensity,vy:(Math.random()-.5)*.3*intensity,
sz:Math.random()*1.5+.4,op:Math.random()*.35+.05
}));
function draw(){
ctx.clearRect(0,0,c.width,c.height);
const ps=pts.current;const col=isDark?'255,255,255':'0,0,0';
for(let i=0;i<ps.length;i++){
const p=ps[i];p.x+=p.vx;p.y+=p.vy;
if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
const dx=mouse.current.x-p.x,dy=mouse.current.y-p.y,md=Math.sqrt(dx*dx+dy*dy);
if(md<100){p.x-=dx*.004;p.y-=dy*.004}
ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
ctx.fillStyle=`rgba(${col},${p.op})`;ctx.fill();
}
for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){
const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=dx*dx+dy*dy;
if(d<15000){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);
ctx.strokeStyle=`rgba(${col},${.04*(1-d/15000)})`;ctx.lineWidth=.5;ctx.stroke()}
}
raf.current=requestAnimationFrame(draw);
}
raf.current=requestAnimationFrame(draw);
const onM=e=>{mouse.current={x:e.clientX,y:e.clientY}};
const onL=()=>{mouse.current={x:-9e3,y:-9e3}};
addEventListener('resize',resize);addEventListener('mousemove',onM);addEventListener('mouseleave',onL);
return()=>{cancelAnimationFrame(raf.current);removeEventListener('resize',resize);
removeEventListener('mousemove',onM);removeEventListener('mouseleave',onL)};
},[intensity,isDark]);
return <canvas ref={ref} className="bg-canvas"/>;
});

// ====== SOLAR SYSTEM BG ======
const SolarSystemBG=memo(function({intensity=1,isDark=true}){
const ref=useRef(null);const raf=useRef(0);
useEffect(()=>{
const c=ref.current;const ctx=c.getContext('2d');
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();
const cx=()=>c.width/2,cy=()=>c.height/2;
const orbits=[
{r:80,speed:.0003*intensity,angle:0,sz:3},
{r:140,speed:.0002*intensity,angle:Math.PI/3,sz:2.5},
{r:210,speed:.00015*intensity,angle:Math.PI,sz:2},
{r:300,speed:.0001*intensity,angle:Math.PI*1.5,sz:1.8},
{r:400,speed:.00007*intensity,angle:.5,sz:1.5}
];
function draw(t){
ctx.clearRect(0,0,c.width,c.height);
const col=isDark?'255,255,255':'0,0,0';
const X=cx(),Y=cy();
// Central glow
const g=ctx.createRadialGradient(X,Y,0,X,Y,20);
g.addColorStop(0,`rgba(${col},.06)`);g.addColorStop(1,'transparent');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(X,Y,20,0,Math.PI*2);ctx.fill();
// Orbits
orbits.forEach(o=>{
ctx.beginPath();ctx.arc(X,Y,o.r,0,Math.PI*2);
ctx.strokeStyle=`rgba(${col},.04)`;ctx.lineWidth=.5;ctx.stroke();
o.angle+=o.speed;
const px=X+Math.cos(o.angle)*o.r,py=Y+Math.sin(o.angle)*o.r;
ctx.beginPath();ctx.arc(px,py,o.sz,0,Math.PI*2);
ctx.fillStyle=`rgba(${col},.15)`;ctx.fill();
// Glow on dot
const dg=ctx.createRadialGradient(px,py,0,px,py,o.sz*4);
dg.addColorStop(0,`rgba(${col},.08)`);dg.addColorStop(1,'transparent');
ctx.fillStyle=dg;ctx.beginPath();ctx.arc(px,py,o.sz*4,0,Math.PI*2);ctx.fill();
});
raf.current=requestAnimationFrame(draw);
}
raf.current=requestAnimationFrame(draw);
addEventListener('resize',resize);
return()=>{cancelAnimationFrame(raf.current);removeEventListener('resize',resize)};
},[intensity,isDark]);
return <canvas ref={ref} className="bg-canvas" style={{zIndex:0}}/>;
});

// ====== ANIMATED TEXT ======
function AnimText({text,visible,delay=0,rate=50}){
return(<div className={`intro-line ${visible?'vis':''}`}>
{text.split('').map((ch,i)=><span key={i} className="ch"
style={{transitionDelay:`${delay+i*rate}ms`}}>{ch===' '?'\u00A0':ch}</span>)}
</div>);
}

// ====== INTRO SEQUENCE ======
function IntroSequence({onDone}){
const[phase,setPhase]=useState(0);
const[show,setShow]=useState([false,false,false,false]);
const[morphFont,setMorphFont]=useState(MORPH_FONTS[0]);
const[locked,setLocked]=useState(false);
const[glitchActive,setGlitchActive]=useState(false);
const[glitchStable,setGlitchStable]=useState(false);
const[scanlines,setScanlines]=useState(false);
const[rays,setRays]=useState(false);
const timers=useRef([]);
const morphInterval=useRef(null);

useEffect(()=>{
const s=(fn,ms)=>{const t=setTimeout(fn,ms);timers.current.push(t);return t};
// Phase 0: first line
s(()=>setShow(p=>{const n=[...p];n[0]=true;return n}),800);
s(()=>setShow(p=>{const n=[...p];n[0]=false;return n}),3800);
// Phase 1: second line
s(()=>{setPhase(1);setShow(p=>{const n=[...p];n[1]=true;return n})},4800);
s(()=>setShow(p=>{const n=[...p];n[1]=false;return n}),8200);
// Phase 2: third line
s(()=>{setPhase(2);setShow(p=>{const n=[...p];n[2]=true;return n})},9200);
s(()=>setShow(p=>{const n=[...p];n[2]=false;return n}),12600);
// Phase 3: fourth line
s(()=>{setPhase(3);setShow(p=>{const n=[...p];n[3]=true;return n})},13600);
s(()=>setShow(p=>{const n=[...p];n[3]=false;return n}),17000);
// Phase 4: "100" font morphing
s(()=>{
setPhase(4);
let idx=0;
morphInterval.current=setInterval(()=>{
idx++;
if(idx>=MORPH_FONTS.length*2){
clearInterval(morphInterval.current);
setMorphFont(MORPH_FONTS[MORPH_FONTS.length-1]);
setLocked(true);
}else{
setMorphFont(MORPH_FONTS[idx%MORPH_FONTS.length]);
}
},100);
},18000);
// Rays after lock
s(()=>setRays(true),20200);
// Phase 5: "BEFORE" glitch
s(()=>{setPhase(5);setScanlines(true);setGlitchActive(true)},21000);
s(()=>{setGlitchActive(false);setGlitchStable(true);setScanlines(false)},21700);
// Transition out
s(()=>onDone(),24000);
return()=>{timers.current.forEach(clearTimeout);clearInterval(morphInterval.current)};
},[]);

function skip(){timers.current.forEach(clearTimeout);clearInterval(morphInterval.current);onDone()}

const rayAngles=useMemo(()=>[0,30,60,90,120,150],[]);

return(
<React.Fragment>
<div className={`intro-screen ${phase>=10?'out':''}`}>
<div className="intro-center">
{phase<=0&&show[0]!==undefined&&<AnimText text="You have 100 chances." visible={show[0]} delay={0} rate={55}/>}
{phase===1&&<AnimText text="Most people never finish." visible={show[1]} delay={0} rate={50}/>}
{phase===2&&<AnimText text="This is where you do." visible={show[2]} delay={0} rate={55}/>}
{phase===3&&<AnimText text="Your story starts now." visible={show[3]} delay={0} rate={60}/>}
{phase>=4&&(
<div style={{position:'relative',display:'inline-block'}}>
<div className={`morph-100 ${locked?'locked':''}`}
style={{fontFamily:morphFont,opacity:phase>=4?1:0,
transition:'opacity .3s, font-family 0s, text-shadow 1s',
transform:locked?'scale(1)':'scale(.95)'}}>
100
{rays&&rayAngles.map((a,i)=>(
<div key={i} className="ray" style={{
height:`${120+i*20}px`,transform:`rotate(${a}deg)`,
opacity:locked?.15:0,transition:`opacity ${1+i*.2}s ease ${i*.1}s`
}}/>
))}
</div>
{phase>=5&&(
<div style={{marginTop:4}}>
<div className={`glitch-before ${glitchActive?'active':''} ${glitchStable?'stable':''}`}
style={{opacity:phase>=5?1:0,transition:'opacity .3s',
transform:glitchActive?'scale(1.06)':'scale(1)'}}>
BEFORE
<div className="echo">BEFORE</div>
</div>
</div>
)}
</div>
)}
</div>
</div>
<div className={`scanlines ${scanlines?'vis':''}`}/>
<button className="skip-btn" onClick={skip} style={{zIndex:200}}>Skip →</button>
</React.Fragment>
);
}

// ====== CONFETTI ======
function Confetti({x,y,onDone}){
useEffect(()=>{const t=setTimeout(onDone,900);return()=>clearTimeout(t)},[]);
const ps=useMemo(()=>Array.from({length:20},(_,i)=>{
const a=Math.PI*2*i/20;const v=30+Math.random()*60;
const sh=160+Math.floor(Math.random()*95);
return{tx:Math.cos(a)*v,ty:Math.sin(a)*v,sz:2+Math.random()*3,sh}
}),[]);
return(<div className="confetti-c" style={{left:x,top:y}}>
{ps.map((p,i)=><div key={i} className="confetti-p" style={{
width:p.sz,height:p.sz,background:`rgb(${p.sh},${p.sh},${p.sh})`,
'--tx':p.tx+'px','--ty':p.ty+'px'}}/>)}
</div>);
}

// ====== XP BURST ======
function XPBurst({x,y,amount,onDone}){
useEffect(()=>{const t=setTimeout(onDone,1200);return()=>clearTimeout(t)},[]);
return <div className="xp-burst" style={{left:x-20,top:y-20}}>+{amount} XP</div>;
}

// ====== PROGRESS RING ======
function ProgressRing({done,total}){
const pct=total>0?done/total:0;
const circ=2*Math.PI*68;
const off=circ*(1-pct);
const dp=useAnimNum(Math.round(pct*100));
return(<div className="ring-w">
<div className="ring-glow"/>
<svg viewBox="0 0 160 160">
<circle cx="80" cy="80" r="68" className="ring-bg"/>
<circle cx="80" cy="80" r="68" className="ring-fg"
strokeDasharray={circ} strokeDashoffset={off}/>
</svg>
<div className="ring-center">
<div className="ring-pct">{dp}%</div>
<div className="ring-lbl">Complete</div>
</div>
</div>);
}

// ====== WEEKLY CHALLENGE ======
function WeeklyChallenge({goal,endDate}){
const[now,setNow]=useState(Date.now());
useEffect(()=>{const iv=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(iv)},[]);
if(!goal)return null;
const diff=Math.max(0,new Date(endDate).getTime()-now);
const d=Math.floor(diff/864e5),h=Math.floor(diff%864e5/36e5),
m=Math.floor(diff%36e5/6e4),s=Math.floor(diff%6e4/1e3);
return(<div className="wc-card">
<div className="wc-tag"><span className="flame">⚡</span> Weekly Challenge</div>
<div className="wc-goal">{goal.text}</div>
{goal.done?<div style={{fontSize:13,color:'var(--text-40)'}}>✓ Completed! New challenge coming soon.</div>
:<div className="cd-row">
{[[d,'Days'],[h,'Hours'],[m,'Mins'],[s,'Secs']].map(([n,l],i)=>
<div key={i} className="cd-u"><div className="cd-n">{String(n).padStart(2,'0')}</div><div className="cd-l">{l}</div></div>
)}
</div>}
</div>);
}

// ====== EMPTY STATE ======
function EmptyState({onAdd}){
return(<div className="empty-state">
<div className="empty-icon">◎</div>
<div className="empty-title">Your Journey Begins Here</div>
<div className="empty-sub">You have 100 chances to do something remarkable. Add your first goal and start building the life you want to live.</div>
<button className="empty-add" onClick={onAdd}>+ Add Your First Goal</button>
</div>);
}

// ====== ADD GOAL MODAL ======
function AddGoalModal({onAdd,onClose,count}){
const[text,setText]=useState('');
function submit(){
const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
if(lines.length)onAdd(lines);onClose();
}
return(<div className="modal-ov" onClick={onClose}>
<div className="modal-c" onClick={e=>e.stopPropagation()}>
<h3>Add New Goals</h3>
<div style={{fontSize:12,color:'var(--text-40)',marginBottom:14}}>{count}/100 goals • One per line</div>
<textarea value={text} onChange={e=>setText(e.target.value)}
placeholder={"Learn to surf\nVisit Japan\nWrite a song"} rows={5}/>
<div className="modal-actions">
<button className="cancel-b" onClick={onClose}>Cancel</button>
<button className="confirm-b" onClick={submit}>Add Goals</button>
</div>
</div>
</div>);
}

// ====== AVATAR UPLOAD ======
function AvatarUpload({avatar,onChange}){
const ref=useRef(null);
function handle(e){
const f=e.target.files[0];if(!f)return;
const r=new FileReader();r.onload=ev=>onChange(ev.target.result);r.readAsDataURL(f);
}
return(<React.Fragment>
<div className="avatar-sm" onClick={()=>ref.current.click()} title="Upload avatar">
{avatar?<img src={avatar} alt=""/>:data?.username?.[0]||'?'}
</div>
<input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={handle}/>
</React.Fragment>);
}

// ====== GOAL CARD ======
const GoalCard=memo(function({goal,index,onToggle,onDelete,onPhotoUpload,onPhotoRemove,gsFilter}){
const ref=useRef(null);const fileRef=useRef(null);
function tilt(e){
if(!ref.current||innerWidth<768)return;
const r=ref.current.getBoundingClientRect();
const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
ref.current.style.transform=`perspective(800px) rotateY(${x*8}deg) rotateX(${-y*8}deg) scale(1.02)`;
}
function resetTilt(){if(ref.current)ref.current.style.transform=''}
function handlePhoto(e){
const f=e.target.files[0];if(!f)return;
const r=new FileReader();r.onload=ev=>onPhotoUpload(goal.id,ev.target.result);r.readAsDataURL(f);
}
return(<div ref={ref} className={`goal-card ${goal.done?'done':''}`}
style={{animationDelay:`${index*35}ms`,'--gs':gsFilter?1:0}}
onMouseMove={tilt} onMouseLeave={resetTilt}>
<div className="goal-top" onClick={e=>onToggle(goal.id,e)}>
<div className={`gc-check ${goal.done?'on':''}`}>
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
<polyline points="20 6 9 17 4 12"/></svg>
</div>
<div className="goal-text">{goal.text}</div>
<button className="goal-del" onClick={e=>{e.stopPropagation();onDelete(goal.id)}} title="Remove">✕</button>
</div>
{goal.photo&&<img src={goal.photo} className="goal-img" alt="" style={{'--gs':gsFilter?1:0}}/>}
<div className="goal-img-actions">
<button className="goal-img-btn" onClick={()=>fileRef.current.click()}>
{goal.photo?'Change Photo':'📷 Add Photo'}
</button>
{goal.photo&&<button className="goal-img-btn" onClick={()=>onPhotoRemove(goal.id)}>Remove</button>}
</div>
<input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
</div>);
});

// ====== THEME SWITCHER ======
function ThemeSwitcher(){
const{theme,changeTheme}=useContext(ThemeCtx);
return(<div className="theme-row">
{THEMES.map(t=>(
<div key={t.id} className={`theme-opt ${theme===t.id?'act':''}`} onClick={()=>changeTheme(t.id)}>
<div className="theme-prev" style={{background:`linear-gradient(135deg,${t.colors[0]},${t.colors[1]},${t.colors[2]})`}}/>
<div className="theme-name">{t.name}</div>
</div>
))}
</div>);
}

// ====== COLLAPSIBLE ======
function Collapsible({title,children,defaultOpen=true}){
const[open,setOpen]=useState(defaultOpen);
return(<div>
<div className="collapse-hdr" onClick={()=>setOpen(!open)}>
<div className="section-title">{title}</div>
<span className={`arr ${open?'open':''}`}>▼</span>
</div>
<div className={`collapse-body ${open?'open':''}`}>{children}</div>
</div>);
}

// ====== DASHBOARD ======
function Dashboard({data,setData,onLogout}){
const{theme,changeTheme}=useContext(ThemeCtx);
const[modal,setModal]=useState(false);
const[confetti,setConfetti]=useState(null);
const[xpBurst,setXpBurst]=useState(null);
const[filter,setFilter]=useState('all');
const[newBadge,setNewBadge]=useState(null);
const fileRef=useRef(null);

const completed=data.goals.filter(g=>g.done).length;
const total=data.goals.length;
const level=Math.floor(data.xp/XP_LV);
const xpInLv=data.xp%XP_LV;
const animXP=useAnimNum(data.xp);
const animDone=useAnimNum(completed);
const animStreak=useAnimNum(data.streak);
const isDark=theme!=='frost';

function persist(nd){setData(nd);save(nd)}

function toggleGoal(id,e){
const g=data.goals.find(x=>x.id===id);if(!g)return;
const was=g.done;
const newGoals=data.goals.map(x=>x.id===id?{...x,done:!x.done,doneAt:!x.done?new Date().toISOString():null}:x);
const xpD=was?-XP_GOAL:XP_GOAL;
let nd={...data,goals:newGoals,xp:Math.max(0,data.xp+xpD)};
// Check new badges
if(!was){
const newlyUnlocked=BADGES.filter(b=>!nd.unlockedBadges.includes(b.id)&&b.check(nd));
if(newlyUnlocked.length>0){
nd.unlockedBadges=[...nd.unlockedBadges,...newlyUnlocked.map(b=>b.id)];
setNewBadge(newlyUnlocked[0]);
setTimeout(()=>setNewBadge(null),2000);
}
}
persist(nd);
if(!was){
const rect=e.currentTarget.getBoundingClientRect();
setConfetti({x:rect.left+rect.width/2,y:rect.top+rect.height/2,key:Date.now()});
setXpBurst({x:rect.left+rect.width/2,y:rect.top,amount:XP_GOAL,key:Date.now()});
}
}

function deleteGoal(id){
const was=data.goals.find(g=>g.id===id);
const newGoals=data.goals.filter(g=>g.id!==id);
const xpD=was?.done?-XP_GOAL:0;
let nd={...data,goals:newGoals,xp:Math.max(0,data.xp+xpD)};
if(nd.weeklyGoalIdx!==null&&nd.weeklyGoalIdx>=newGoals.length)nd.weeklyGoalIdx=newGoals.length>0?0:null;
persist(nd);
}

function addGoals(texts){
let nextId=data.goals.length>0?Math.max(...data.goals.map(g=>g.id))+1:1;
const rem=100-data.goals.length;
const newG=texts.slice(0,rem).map((t,i)=>({id:nextId+i,text:t,done:false,doneAt:null,photo:null}));
let nd={...data,goals:[...data.goals,...newG]};
if(nd.weeklyGoalIdx===null&&nd.goals.length>0){
const incomplete=nd.goals.filter(g=>!g.done);
nd.weeklyGoalIdx=incomplete.length>0?nd.goals.indexOf(incomplete[Math.floor(Math.random()*incomplete.length)]):0;
}
persist(nd);
}

function photoUpload(id,src){
const ng=data.goals.map(g=>g.id===id?{...g,photo:src}:g);
persist({...data,goals:ng});
}
function photoRemove(id){
const ng=data.goals.map(g=>g.id===id?{...g,photo:null}:g);
persist({...data,goals:ng});
}

function handleAvatarChange(src){persist({...data,avatar:src})}

function changeMotion(v){persist({...data,motionIntensity:v})}
function toggleBg(){persist({...data,bgEnabled:!data.bgEnabled})}
function toggleGsFilter(){persist({...data,gsFilter:!data.gsFilter})}

function handleThemeChange(t){changeTheme(t);persist({...data,theme:t})}

const filteredGoals=useMemo(()=>{
if(filter==='done')return data.goals.filter(g=>g.done);
if(filter==='todo')return data.goals.filter(g=>!g.done);
return data.goals;
},[data.goals,filter]);

const weeklyGoal=data.weeklyGoalIdx!==null&&data.goals[data.weeklyGoalIdx]?data.goals[data.weeklyGoalIdx]:null;

// Refresh weekly challenge if expired
useEffect(()=>{
if(new Date(data.weeklyEnd).getTime()<Date.now()&&data.goals.length>0){
const inc=data.goals.filter(g=>!g.done);
const pool=inc.length>0?inc:data.goals;
const idx=data.goals.indexOf(pool[Math.floor(Math.random()*pool.length)]);
persist({...data,weeklyGoalIdx:idx,weeklyEnd:new Date(Date.now()+7*864e5).toISOString()});
}
},[]);

return(<React.Fragment>
{data.bgEnabled&&<ParticleCanvas intensity={data.motionIntensity} isDark={isDark}/>}
{data.bgEnabled&&<SolarSystemBG intensity={data.motionIntensity} isDark={isDark}/>}
<div className="dashboard" style={{opacity:1}}>
<header className="dash-header">
<div className="dash-logo">100 BEFORE</div>
<div className="header-right">
<span style={{fontSize:12,color:'var(--text-40)'}}>{data.username}</span>
<AvatarUpload avatar={data.avatar} onChange={handleAvatarChange}/>
<button className="btn-sm" onClick={onLogout}>Log out</button>
</div>
</header>

<div className="dash-body">
{/* PROGRESS */}
<div className="progress-area">
<ProgressRing done={completed} total={total||1}/>
<div className="xp-area">
<div className="xp-lv">Level {level}<span>{animXP} XP total</span></div>
<div className="xp-track"><div className="xp-fill" style={{width:`${total>0?(xpInLv/XP_LV)*100:0}%`}}/></div>
<div className="xp-sub">{XP_LV-xpInLv} XP to next level</div>
<div className="streak-b"><span className="flame">🔥</span> {animStreak} day streak</div>
</div>
</div>

{/* STATS */}
<div className="stats-row">
<div className="stat-c"><div className="stat-label">Completed</div><div className="stat-val">{animDone}</div><div className="stat-sub">of {total} goals</div></div>
<div className="stat-c"><div className="stat-label">Remaining</div><div className="stat-val">{useAnimNum(Math.max(0,total-completed))}</div><div className="stat-sub">goals to go</div></div>
<div className="stat-c"><div className="stat-label">Level</div><div className="stat-val">{level}</div><div className="stat-sub">{total>0?Math.round(xpInLv/XP_LV*100):0}% to next</div></div>
<div className="stat-c"><div className="stat-label">Streak</div><div className="stat-val">{animStreak}</div><div className="stat-sub">consecutive days</div></div>
</div>

{/* BADGES */}
<Collapsible title="Achievements">
<div className="badges-row">
{BADGES.map(b=>{
const unlocked=data.unlockedBadges.includes(b.id);
return(<div key={b.id} className={`badge ${unlocked?'':'locked'} ${newBadge?.id===b.id?'badge-unlock':''}`}
title={`${b.name}: ${b.desc}`}>
{b.icon}
<div className="badge-tip">{b.name}</div>
</div>);
})}
</div>
</Collapsible>

{/* WEEKLY CHALLENGE */}
{weeklyGoal&&<WeeklyChallenge goal={weeklyGoal} endDate={data.weeklyEnd}/>}

{/* THEME & SETTINGS */}
<Collapsible title="Appearance" defaultOpen={false}>
<div className="settings-panel">
<div style={{fontSize:12,color:'var(--text-40)',marginBottom:12,textTransform:'uppercase',letterSpacing:'.1em'}}>Theme</div>
<ThemeSwitcher/>
<div className="setting-row" style={{marginTop:16}}>
<div className="setting-label">Background Animations</div>
<button className={`toggle-sw ${data.bgEnabled?'on':''}`} onClick={toggleBg}/>
</div>
<div className="setting-row">
<div className="setting-label">Motion Intensity</div>
<div className="slider-w">
<span style={{fontSize:11,color:'var(--text-20)'}}>Low</span>
<input type="range" min="0.1" max="2" step="0.1" value={data.motionIntensity}
onChange={e=>changeMotion(parseFloat(e.target.value))}/>
<span style={{fontSize:11,color:'var(--text-20)'}}>High</span>
</div>
</div>
<div className="setting-row">
<div className="setting-label">Grayscale Photos</div>
<button className={`toggle-sw ${data.gsFilter?'on':''}`} onClick={toggleGsFilter}/>
</div>
</div>
</Collapsible>

{/* GOALS */}
<Collapsible title="Goals">
{total>0&&(
<div className="section-hdr">
<div className="filter-row">
{[['all',`All (${total})`],['todo',`To Do (${total-completed})`],['done',`Done (${completed})`]].map(([f,l])=>
<button key={f} className={`filter-btn ${filter===f?'act':''}`} onClick={()=>setFilter(f)}>{l}</button>
)}
</div>
{total<100&&<button className="add-btn" onClick={()=>setModal(true)}>+ Add Goals</button>}
</div>
)}

{total===0?(
<EmptyState onAdd={()=>setModal(true)}/>
):(
<div className="goals-grid">
{filteredGoals.map((g,i)=>
<GoalCard key={g.id} goal={g} index={i} onToggle={toggleGoal} onDelete={deleteGoal}
onPhotoUpload={photoUpload} onPhotoRemove={photoRemove} gsFilter={data.gsFilter}/>
)}
</div>
)}

{total>0&&filteredGoals.length===0&&(
<div style={{textAlign:'center',padding:'50px 20px',color:'var(--text-20)',fontSize:14}}>
{filter==='done'?'No completed goals yet. Keep pushing!':'All goals completed! 🎉'}
</div>
)}
</Collapsible>
</div>
</div>

{modal&&<AddGoalModal onAdd={addGoals} onClose={()=>setModal(false)} count={total}/>}
{confetti&&<Confetti x={confetti.x} y={confetti.y} key={confetti.key} onDone={()=>setConfetti(null)}/>}
{xpBurst&&<XPBurst x={xpBurst.x} y={xpBurst.y} amount={xpBurst.amount} key={xpBurst.key} onDone={()=>setXpBurst(null)}/>}
</React.Fragment>);
}

// ====== LOGIN ======
function LoginScreen({onLogin}){
const[user,setUser]=useState('');
const[pass,setPass]=useState('');
const[err,setErr]=useState(false);
const[success,setSuccess]=useState(false);
const[vis,setVis]=useState(false);

useEffect(()=>{setTimeout(()=>setVis(true),100)},[]);

function submit(e){
e.preventDefault();
if(user==='Pranav'&&pass==='123'){
setErr(false);setSuccess(true);
setTimeout(()=>onLogin(user),1000);
}else{setErr(true);setSuccess(false);setTimeout(()=>setErr(false),600)}
}

function doRipple(e){
const btn=e.currentTarget;const r=btn.getBoundingClientRect();
const rip=document.createElement('span');rip.className='ripple-e';
rip.style.left=(e.clientX-r.left)+'px';rip.style.top=(e.clientY-r.top)+'px';
btn.appendChild(rip);setTimeout(()=>rip.remove(),700);
}

const streaks=useMemo(()=>Array.from({length:5},(_,i)=>({left:20+i*25+'%',delay:i*1.2+'s',h:60+Math.random()*40})),[]);

return(<div className="login-screen" style={{opacity:vis?1:0,transition:'opacity .8s'}}>
<form onSubmit={submit} className={`login-wrap ${err?'shake':''} ${success?'glow-success':''}`}
style={{opacity:vis?1:0,transform:vis?'none':'translateY(40px)',transition:'all .8s cubic-bezier(.34,1.56,.64,1) .2s'}}>
{/* Light streaks */}
{streaks.map((s,i)=><div key={i} className="light-streak"
style={{left:s.left,animationDelay:s.delay,height:s.h+'px'}}/>)}
<div className="login-left">
<div className="login-left-100">100</div>
<div className="login-before-vert">BEFORE</div>
</div>
<div className="login-right">
<div className="login-title">Welcome Back</div>
<div className="login-sub">Enter your credentials to continue your journey.</div>
<div className="input-g">
<input type="text" placeholder=" " value={user} onChange={e=>setUser(e.target.value)} className={err?'err':''}/>
<label>Username</label>
<div className="focus-line"/>
</div>
<div className="input-g">
<input type="password" placeholder=" " value={pass} onChange={e=>setPass(e.target.value)} className={err?'err':''}/>
<label>Password</label>
<div className="focus-line"/>
</div>
{err&&<div style={{fontSize:12,color:'rgba(180,80,80,.8)',marginBottom:10,marginTop:-8}}>Invalid credentials.</div>}
<button type="submit" className="btn-mag" onClick={doRipple}>
<span className="shine"/>Sign In
</button>
<div style={{textAlign:'center',marginTop:20,fontSize:11,color:'var(--text-20)'}}>Hint: Pranav / 123</div>
</div>
</form>
</div>);
}

// ====== APP ======
function App(){
const[phase,setPhase]=useState('intro');
const[data,setData]=useState(()=>{const d=load();return d?checkStreak(d):null});

useEffect(()=>{if(data)save(data)},[]);

function onIntroDone(){
setPhase(data?'dashboard':'login');
}
function onLogin(u){
const d=initData(u);setData(d);save(d);
setPhase('dashboard');
}
function onLogout(){
localStorage.removeItem(STORE);setData(null);setPhase('login');
}

return(<ThemeProvider>
<AppInner phase={phase} data={data} setData={setData}
onIntroDone={onIntroDone} onLogin={onLogin} onLogout={onLogout}/>
</ThemeProvider>);
}

function AppInner({phase,data,setData,onIntroDone,onLogin,onLogout}){
const{theme}=useContext(ThemeCtx);
const isDark=theme!=='frost';

return(<React.Fragment>
{phase==='intro'&&<React.Fragment>
<ParticleCanvas intensity={1} isDark={true}/>
<IntroSequence onDone={onIntroDone}/>
</React.Fragment>}
{phase==='login'&&<React.Fragment>
<ParticleCanvas intensity={.8} isDark={isDark}/>
<SolarSystemBG intensity={.6} isDark={isDark}/>
<LoginScreen onLogin={onLogin}/>
</React.Fragment>}
{phase==='dashboard'&&data&&
<Dashboard data={data} setData={d=>{setData(d);save(d)}} onLogout={onLogout}/>
}
</React.Fragment>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
