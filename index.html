<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After-Me</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333;overflow-x:hidden}
        button{cursor:pointer;border:none;font-family:inherit}
        input,textarea,select{font-family:inherit}
        a{color:inherit;text-decoration:none}
        #root{min-height:100vh}

        .particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

        .floating-shapes{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
        .shape{position:absolute;border-radius:50%;opacity:.08;background:white}
        .shape-0{width:80px;height:80px;top:10%;left:10%;animation:float 6s ease-in-out infinite}
        .shape-1{width:120px;height:120px;top:20%;right:10%;animation:float 8s ease-in-out infinite 1s}
        .shape-2{width:60px;height:60px;bottom:30%;left:20%;animation:float 7s ease-in-out infinite 2s}
        .shape-3{width:100px;height:100px;bottom:10%;right:20%;animation:float 9s ease-in-out infinite .5s}
        .shape-4{width:40px;height:40px;top:50%;left:50%;animation:float 5s ease-in-out infinite 1.5s}
        .shape-5{width:90px;height:90px;top:70%;left:70%;animation:float 10s ease-in-out infinite 3s}

        @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-25px) rotate(5deg)}66%{transform:translateY(15px) rotate(-5deg)}}
        @keyframes slideIn{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes staggerIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        @keyframes rippleEffect{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}
        @keyframes slideUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
        @keyframes slideToast{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideToastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
        @keyframes pageEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes emojiBounce{0%,100%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.3) rotate(-10deg)}50%{transform:scale(1.1) rotate(5deg)}75%{transform:scale(1.2) rotate(-5deg)}}
        @keyframes glow{0%,100%{box-shadow:0 0 5px rgba(102,126,234,.3)}50%{box-shadow:0 0 25px rgba(102,126,234,.6),0 0 50px rgba(102,126,234,.2)}}
        @keyframes modalOpen{from{transform:translateY(40px) scale(.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
        @keyframes modalClose{from{transform:translateY(0) scale(1);opacity:1}to{transform:translateY(40px) scale(.9);opacity:0}}
        @keyframes backdropIn{from{opacity:0}to{opacity:1}}
        @keyframes backdropOut{from{opacity:1}to{opacity:0}}
        @keyframes cardHover{from{transform:translateY(0)}to{transform:translateY(-10px)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}42%{transform:scale(1.15)}70%{transform:scale(1)}}
        @keyframes typeIn{from{width:0}to{width:100%}}
        @keyframes morphBg{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%}}
        @keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeSlideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes scaleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
        @keyframes wobble{0%{transform:rotate(0deg)}25%{transform:rotate(3deg)}50%{transform:rotate(-3deg)}75%{transform:rotate(1deg)}100%{transform:rotate(0deg)}}

        .animate-in{animation:slideIn .6s cubic-bezier(.16,1,.3,1) forwards}
        .slide-down{animation:slideDown .5s cubic-bezier(.16,1,.3,1) forwards}
        .fade-in{animation:fadeIn .5s ease-out forwards}
        .fade-in-delay{animation:fadeIn .8s ease-out .3s both}
        .slide-up-1{animation:slideUp .5s cubic-bezier(.16,1,.3,1) .4s both}
        .slide-up-2{animation:slideUp .5s cubic-bezier(.16,1,.3,1) .6s both}
        .slide-up-3{animation:slideUp .5s cubic-bezier(.16,1,.3,1) .8s both}
        .stagger-in{animation:staggerIn .5s cubic-bezier(.16,1,.3,1) both}
        .shake{animation:shake .5s ease-out}
        .float-anim{animation:float 3s ease-in-out infinite}
        .page-enter{animation:pageEnter .4s ease-out}
        .bounce-in{animation:bounceIn .6s cubic-bezier(.16,1,.3,1) both}
        .heartbeat{animation:heartbeat 1.5s ease-in-out infinite}
        .morph{animation:morphBg 8s ease-in-out infinite}
        .glow-anim{animation:glow 2s ease-in-out infinite}
        .wobble{animation:wobble .5s ease-out}

        .typewriter{display:inline}
        .cursor{animation:blink 1s infinite;font-weight:100;color:rgba(255,255,255,.7)}

        .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
        .spinner-dark{border-color:rgba(0,0,0,.1);border-top-color:#667eea}

        .ripple-btn{position:relative;overflow:hidden;cursor:pointer;border:none;font-family:inherit}
        .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.4);width:10px;height:10px;transform:translate(-50%,-50%);animation:rippleEffect .6s ease-out;pointer-events:none}

        .toast-container{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
        .toast{padding:14px 20px;border-radius:12px;color:#fff;font-weight:600;display:flex;align-items:center;gap:10px;min-width:280px;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,.25);animation:slideToast .5s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(10px);pointer-events:auto}
        .toast-exit{animation:slideToastOut .4s ease-in forwards}
        .toast-success{background:linear-gradient(135deg,rgba(39,174,96,.95),rgba(46,204,113,.95))}
        .toast-error{background:linear-gradient(135deg,rgba(231,76,60,.95),rgba(192,57,43,.95))}
        .toast-info{background:linear-gradient(135deg,rgba(52,152,219,.95),rgba(41,128,185,.95))}
        .toast-close{background:none;border:none;color:#fff;font-size:1.4em;cursor:pointer;margin-left:auto;opacity:.7;transition:opacity .2s}
        .toast-close:hover{opacity:1}

        .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;position:relative}
        .login-box{background:white;border-radius:20px;box-shadow:0 25px 80px rgba(0,0,0,.3);width:100%;max-width:420px;overflow:hidden;position:relative;z-index:1}
        .logo-section{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);background-size:200% 200%;animation:gradientShift 4s ease infinite;color:#fff;padding:45px 20px;text-align:center;position:relative;overflow:hidden}
        .logo-section::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%);animation:float 6s ease-in-out infinite}
        .logo-icon{font-size:3em;margin-bottom:10px;animation:float 3s ease-in-out infinite;display:inline-block}
        .logo-text{font-size:2.8em;margin-bottom:8px;text-shadow:2px 2px 4px rgba(0,0,0,.2);letter-spacing:1px}
        .tagline{font-size:1.1em;opacity:.9;min-height:1.5em}
        .login-content{padding:35px 30px 25px}
        .intro-text{color:#666;margin-bottom:25px;line-height:1.6;text-align:center;font-size:.95em}
        .login-form{display:flex;flex-direction:column;gap:20px}
        .form-group{display:flex;flex-direction:column}
        .form-group label{margin-bottom:8px;font-weight:600;color:#444;font-size:.95em}
        .form-group input,.form-group textarea,.form-group select{padding:12px 14px;border:2px solid #e8e8e8;border-radius:10px;font-size:1em;transition:all .3s cubic-bezier(.16,1,.3,1);background:#fafafa}
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.1);background:#fff;transform:translateY(-1px)}
        .input-wrapper{position:relative;display:flex;align-items:center}
        .input-icon{position:absolute;left:14px;font-size:1.1em;z-index:1}
        .input-with-icon{padding-left:42px!important}
        .login-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);background-size:200% 200%;animation:gradientShift 3s ease infinite;color:#fff;padding:14px 20px;border-radius:10px;font-size:1.1em;font-weight:600;transition:all .3s cubic-bezier(.16,1,.3,1);letter-spacing:.5px}
        .login-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 12px 35px rgba(102,126,234,.4)}
        .login-btn:active:not(:disabled){transform:translateY(-1px)}
        .btn-loading{display:flex;align-items:center;justify-content:center}
        .error-message{color:#e74c3c;text-align:center;min-height:20px;font-weight:500;margin-top:15px;padding:0 10px}
        .login-footer{background:#f8f9fa;padding:20px;text-align:center;border-top:1px solid #eee;font-size:.9em;color:#888}
        .credit{margin-top:8px;font-weight:600;color:#667eea;font-size:.85em}

        .dashboard-container{min-height:100vh;display:flex;flex-direction:column}
        .dashboard-header{background:rgba(255,255,255,.97);backdrop-filter:blur(20px);box-shadow:0 4px 30px rgba(0,0,0,.08);padding:18px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,.05)}
        .header-content{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
        .header-logo{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:1.8em;display:flex;align-items:center;gap:8px}
        .logo-emoji{-webkit-text-fill-color:initial;font-size:.8em}
        .header-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .user-password{color:#666;font-weight:600;padding:8px 14px;background:#f0f0f0;border-radius:8px;font-size:.9em}
        .access-mode{color:#fff;font-weight:600;padding:8px 16px;border-radius:8px;font-size:.85em;letter-spacing:.5px;transition:all .3s}
        .access-mode.editor{background:linear-gradient(135deg,#27ae60,#2ecc71)}
        .access-mode.viewer{background:linear-gradient(135deg,#e67e22,#f39c12)}
        .logout-btn{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;padding:10px 18px;border-radius:8px;transition:all .3s;font-weight:600;font-size:.9em}
        .logout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(231,76,60,.3)}

        .dashboard-main{flex:1;max-width:1200px;margin:0 auto;width:100%;padding:35px 24px}
        .dashboard-section{background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-radius:20px;padding:35px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:16px}
        .section-title-area{display:flex;align-items:baseline;gap:12px}
        .section-title-area h2{color:#333;font-size:1.8em}
        .profile-count{color:#999;font-size:.95em;font-weight:500}
        .section-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .search-box{position:relative;display:flex;align-items:center}
        .search-icon{position:absolute;left:12px;font-size:1em;z-index:1}
        .search-input{padding:10px 14px 10px 38px;border:2px solid #e8e8e8;border-radius:10px;font-size:.95em;transition:all .3s;width:200px;background:#fafafa}
        .search-input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1);width:250px;background:#fff}
        .filter-select{padding:10px 14px;border:2px solid #e8e8e8;border-radius:10px;font-size:.95em;transition:all .3s;background:#fafafa;cursor:pointer}
        .filter-select:focus{outline:none;border-color:#667eea}

        .profiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px}
        .empty-state{grid-column:1/-1;text-align:center;padding:70px 20px;color:#999}
        .empty-icon{font-size:4em;margin-bottom:15px;animation:float 3s ease-in-out infinite}
        .empty-state p{font-size:1.15em;line-height:1.6}

        .profile-card-item{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:all .4s cubic-bezier(.16,1,.3,1);cursor:pointer;position:relative}
        .profile-card-item:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 20px 50px rgba(0,0,0,.15)}
        .card-image{width:100%;height:200px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
        .card-image img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1)}
        .profile-card-item:hover .card-image img{transform:scale(1.1)}
        .card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .3s;backdrop-filter:blur(2px)}
        .card-overlay span{color:#fff;font-weight:600;font-size:1.1em;transform:translateY(10px);transition:transform .3s}
        .profile-card-item:hover .card-overlay{opacity:1}
        .profile-card-item:hover .card-overlay span{transform:translateY(0)}
        .no-image{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3.5em;transition:transform .3s}
        .no-image .emoji-bounce{animation:emojiBounce .6s ease-out}
        .card-content{padding:20px}
        .card-content h3{color:#333;margin-bottom:8px;font-size:1.3em;transition:color .3s}
        .profile-card-item:hover .card-content h3{color:#667eea}
        .theme-badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:.85em;margin-bottom:10px;font-weight:600}
        .card-preview{color:#888;font-size:.9em;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        .theme-love{border-top:4px solid #ff6b9d}.theme-love .card-image,.theme-love .no-image{background:linear-gradient(135deg,#ffe0e8,#ffd0dd)}
        .theme-friend{border-top:4px solid #4ecdc4}.theme-friend .card-image,.theme-friend .no-image{background:linear-gradient(135deg,#e0f7f6,#d0f0ee)}
        .theme-family{border-top:4px solid #ffa502}.theme-family .card-image,.theme-family .no-image{background:linear-gradient(135deg,#ffe8cc,#ffddb8)}
        .theme-colleague{border-top:4px solid #2c3e50}.theme-colleague .card-image,.theme-colleague .no-image{background:linear-gradient(135deg,#ecf0f1,#dfe6e9)}
        .theme-mentor{border-top:4px solid #8e44ad}.theme-mentor .card-image,.theme-mentor .no-image{background:linear-gradient(135deg,#f4e8ff,#eddcff)}
        .theme-other{border-top:4px solid #f39c12}.theme-other .card-image,.theme-other .no-image{background:linear-gradient(135deg,#fef5e7,#fdebd0)}

        .btn{padding:10px 20px;border-radius:10px;font-weight:600;transition:all .3s cubic-bezier(.16,1,.3,1);cursor:pointer;border:none;font-size:.95em;letter-spacing:.3px}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,.35)}
        .btn-secondary{background:#f0f0f0;color:#444}
        .btn-secondary:hover{background:#e0e0e0;transform:translateY(-1px)}
        .btn-danger{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
        .btn-danger:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(231,76,60,.35)}
        .btn-disabled{background:#95a5a6!important;color:#fff;cursor:not-allowed;opacity:.6;transform:none!important;box-shadow:none!important}
        .add-btn{display:flex;align-items:center;gap:6px}
        .btn-icon{font-size:1.3em;line-height:1}

        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;justify-content:center;align-items:center;z-index:1000;animation:backdropIn .3s ease-out;backdrop-filter:blur(4px)}
        .modal-closing{animation:backdropOut .3s ease-in forwards}
        .modal-content{background:#fff;border-radius:20px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.3);animation:modalOpen .4s cubic-bezier(.16,1,.3,1)}
        .modal-content-closing{animation:modalClose .3s ease-in forwards}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:22px 25px;border-bottom:1px solid #f0f0f0}
        .modal-header h2{color:#333;font-size:1.4em}
        .close-btn{background:none;font-size:1.8em;cursor:pointer;color:#bbb;transition:all .3s;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .close-btn:hover{color:#333;background:#f0f0f0;transform:rotate(90deg)}
        .profile-form{padding:25px}
        .profile-form .form-group{margin-bottom:18px}
        .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:10px}
        .form-actions button{flex:1}

        .image-preview{position:relative;margin-top:10px;border-radius:10px;overflow:hidden;height:120px;width:120px}
        .image-preview img{width:100%;height:100%;object-fit:cover;border-radius:10px}
        .remove-image{position:absolute;top:4px;right:4px;background:rgba(231,76,60,.9);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:1em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .remove-image:hover{transform:scale(1.1)}

        .confirm-delete{padding:25px}
        .confirm-delete p{margin-bottom:12px;line-height:1.6;font-size:1.05em}
        .delete-warning{color:#e74c3c;font-weight:600;font-size:.95em!important}
        .confirm-delete .form-actions{margin-top:20px}

        .profile-container{min-height:100vh;display:flex;flex-direction:column}
        .profile-header{background:rgba(255,255,255,.97);backdrop-filter:blur(20px);padding:18px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 30px rgba(0,0,0,.08);border-bottom:1px solid rgba(0,0,0,.05)}
        .profile-header h1{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:1.6em}
        .back-btn{background:#f0f0f0;padding:10px 20px;border-radius:10px;cursor:pointer;transition:all .3s;font-weight:600;font-size:.95em;border:none}
        .back-btn:hover{background:#e0e0e0;transform:translateX(-3px)}
        .profile-main{flex:1;display:flex;justify-content:center;align-items:center;padding:40px 24px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);position:relative;overflow:hidden}
        .profile-main::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,.05) 0%,transparent 50%);animation:float 10s ease-in-out infinite}
        .profile-display{background:#fff;border-radius:20px;overflow:hidden;width:100%;max-width:720px;box-shadow:0 25px 80px rgba(0,0,0,.3);position:relative;z-index:1}
        .profile-image-section{width:100%;height:300px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
        .profile-image{width:100%;height:100%;object-fit:cover}
        .profile-no-image{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
        .profile-emoji-large{font-size:5em;display:inline-block}
        .profile-info-section{padding:40px}
        .profile-info-section h2{color:#333;font-size:2em;margin-bottom:10px}
        .profile-name-animated{animation:fadeSlideIn .5s ease-out .2s both}
        .profile-theme-badge{display:inline-block;padding:8px 18px;border-radius:20px;font-weight:600;margin-bottom:28px;font-size:1em}
        .profile-message{margin-bottom:30px;animation:fadeIn .5s ease-out .4s both}
        .profile-message h3{color:#444;margin-bottom:15px;font-size:1.25em;display:flex;align-items:center;gap:8px}
        .profile-message p{color:#666;line-height:1.9;font-size:1.05em}
        .profile-actions{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px;animation:fadeIn .5s ease-out .6s both}
        .profile-actions .btn{flex:1;min-width:140px;text-align:center}

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo, Fragment } = React;

        // ═══════════════════════════════════
        // CONSTANTS
        // ═══════════════════════════════════
        const PASSWORDS = { editor: 'family2026', viewer: 'legacy2026' };
        const STORAGE_KEY = 'afterMeProfiles';
        const THEMES = {
            love:      { name: 'Love',      emoji: '❤️',          color: '#ff6b9d', bg: '#ffe0e8' },
            friend:    { name: 'Friend',    emoji: '👥',          color: '#4ecdc4', bg: '#e0f7f6' },
            family:    { name: 'Family',    emoji: '👨‍👩‍👧‍👦', color: '#ffa502', bg: '#ffe8cc' },
            colleague: { name: 'Colleague', emoji: '💼',          color: '#2c3e50', bg: '#ecf0f1' },
            mentor:    { name: 'Mentor',    emoji: '🎓',          color: '#8e44ad', bg: '#f4e8ff' },
            other:     { name: 'Other',     emoji: '⭐',          color: '#f39c12', bg: '#fef5e7' }
        };

        // ═══════════════════════════════════
        // PARTICLE BACKGROUND
        // ═══════════════════════════════════
        function ParticleBackground() {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animId, particles = [], mouse = { x: -999, y: -999 };
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);
                const onMove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
                window.addEventListener('mousemove', onMove);
                for (let i = 0; i < 60; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 2.5 + .8,
                        speedX: (Math.random() - .5) * .4,
                        speedY: (Math.random() - .5) * .4,
                        opacity: Math.random() * .4 + .15
                    });
                }
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach((p, i) => {
                        const dx = mouse.x - p.x, dy = mouse.y - p.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            p.x -= dx * .01;
                            p.y -= dy * .01;
                        }
                        p.x += p.speedX; p.y += p.speedY;
                        if (p.x < 0) p.x = canvas.width;
                        if (p.x > canvas.width) p.x = 0;
                        if (p.y < 0) p.y = canvas.height;
                        if (p.y > canvas.height) p.y = 0;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
                        ctx.fill();
                        for (let j = i + 1; j < particles.length; j++) {
                            const p2 = particles[j];
                            const d = Math.sqrt((p.x - p2.x) ** 2 + (p.y - p2.y) ** 2);
                            if (d < 130) {
                                ctx.beginPath();
                                ctx.moveTo(p.x, p.y);
                                ctx.lineTo(p2.x, p2.y);
                                ctx.strokeStyle = `rgba(255,255,255,${.08 * (1 - d / 130)})`;
                                ctx.lineWidth = .5;
                                ctx.stroke();
                            }
                        }
                    });
                    animId = requestAnimationFrame(animate);
                };
                animate();
                return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); window.removeEventListener('mousemove', onMove); };
            }, []);
            return <canvas ref={canvasRef} className="particle-canvas" />;
        }

        // ═══════════════════════════════════
        // FLOATING SHAPES
        // ═══════════════════════════════════
        function FloatingShapes() {
            return (
                <div className="floating-shapes">
                    {[...Array(6)].map((_, i) => <div key={i} className={`shape shape-${i}`} />)}
                </div>
            );
        }

        // ═══════════════════════════════════
        // TYPEWRITER
        // ═══════════════════════════════════
        function Typewriter({ text, speed = 80, delay = 0 }) {
            const [displayText, setDisplayText] = useState('');
            const [started, setStarted] = useState(false);
            useEffect(() => { const t = setTimeout(() => setStarted(true), delay); return () => clearTimeout(t); }, [delay]);
            useEffect(() => {
                if (!started) return;
                let i = 0;
                const timer = setInterval(() => {
                    if (i <= text.length) { setDisplayText(text.substring(0, i)); i++; }
                    else clearInterval(timer);
                }, speed);
                return () => clearInterval(timer);
            }, [text, speed, started]);
            return <span className="typewriter">{displayText}<span className="cursor">|</span></span>;
        }

        // ═══════════════════════════════════
        // TOAST NOTIFICATIONS
        // ═══════════════════════════════════
        function ToastContainer({ toasts, removeToast }) {
            return (
                <div className="toast-container">
                    {toasts.map(t => (
                        <div key={t.id} className={`toast toast-${t.type}`}>
                            <span>{t.message}</span>
                            <button className="toast-close" onClick={() => removeToast(t.id)}>×</button>
                        </div>
                    ))}
                </div>
            );
        }

        // ═══════════════════════════════════
        // ANIMATED COUNTER
        // ═══════════════════════════════════
        function AnimatedCounter({ end, duration = 800 }) {
            const [count, setCount] = useState(0);
            useEffect(() => {
                const start = Date.now();
                const timer = setInterval(() => {
                    const p = Math.min((Date.now() - start) / duration, 1);
                    setCount(Math.floor((1 - Math.pow(1 - p, 3)) * end));
                    if (p >= 1) clearInterval(timer);
                }, 16);
                return () => clearInterval(timer);
            }, [end, duration]);
            return <span>{count}</span>;
        }

        // ═══════════════════════════════════
        // RIPPLE BUTTON
        // ═══════════════════════════════════
        function RippleButton({ children, className = '', onClick, disabled, type = 'button', style }) {
            const [ripples, setRipples] = useState([]);
            const handleClick = (e) => {
                if (disabled) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const id = Date.now();
                setRipples(prev => [...prev, { x: e.clientX - rect.left, y: e.clientY - rect.top, id }]);
                setTimeout(() => setRipples(prev => prev.filter(r => r.id !== id)), 600);
                if (onClick) onClick(e);
            };
            return (
                <button type={type} className={`ripple-btn ${className} ${disabled ? 'btn-disabled' : ''}`}
                    onClick={handleClick} disabled={disabled} style={style}>
                    {children}
                    {ripples.map(r => <span key={r.id} className="ripple" style={{ left: r.x, top: r.y }} />)}
                </button>
            );
        }

        // ═══════════════════════════════════
        // MODAL
        // ═══════════════════════════════════
        function Modal({ isOpen, onClose, title, children }) {
            const [closing, setClosing] = useState(false);
            const handleClose = useCallback(() => {
                setClosing(true);
                setTimeout(() => { setClosing(false); onClose(); }, 300);
            }, [onClose]);
            useEffect(() => {
                if (!isOpen) return;
                const esc = (e) => { if (e.key === 'Escape') handleClose(); };
                window.addEventListener('keydown', esc);
                return () => window.removeEventListener('keydown', esc);
            }, [isOpen, handleClose]);
            if (!isOpen) return null;
            return (
                <div className={`modal ${closing ? 'modal-closing' : ''}`} onClick={handleClose}>
                    <div className={`modal-content ${closing ? 'modal-content-closing' : ''}`} onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>{title}</h2>
                            <button className="close-btn" onClick={handleClose}>×</button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════
        // PROFILE FORM
        // ═══════════════════════════════════
        function ProfileForm({ profile, onSave, onCancel }) {
            const [name, setName] = useState(profile?.name || '');
            const [theme, setTheme] = useState(profile?.theme || '');
            const [message, setMessage] = useState(profile?.message || '');
            const [image, setImage] = useState(profile?.image || null);
            const [saving, setSaving] = useState(false);

            const handleImage = (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setImage(ev.target.result);
                    reader.readAsDataURL(e.target.files[0]);
                }
            };
            const handleSubmit = (e) => {
                e.preventDefault();
                setSaving(true);
                setTimeout(() => { onSave({ name, theme, message, image }); setSaving(false); }, 400);
            };
            return (
                <form onSubmit={handleSubmit} className="profile-form">
                    <div className="form-group">
                        <label>Person's Name:</label>
                        <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Enter name" required />
                    </div>
                    <div className="form-group">
                        <label>Relationship Theme:</label>
                        <select value={theme} onChange={e => setTheme(e.target.value)} required>
                            <option value="">Select a theme</option>
                            {Object.entries(THEMES).map(([k, t]) => <option key={k} value={k}>{t.emoji} {t.name}</option>)}
                        </select>
                    </div>
                    <div className="form-group">
                        <label>Profile Picture:</label>
                        <input type="file" accept="image/*" onChange={handleImage} />
                        {image && (
                            <div className="image-preview bounce-in">
                                <img src={image} alt="Preview" />
                                <button type="button" className="remove-image" onClick={() => setImage(null)}>×</button>
                            </div>
                        )}
                    </div>
                    <div className="form-group">
                        <label>Your Message / Will:</label>
                        <textarea value={message} onChange={e => setMessage(e.target.value)}
                            placeholder="Write your message, memories, or wishes..." rows="6" required />
                    </div>
                    <div className="form-actions">
                        <RippleButton className="btn btn-secondary" onClick={onCancel}>Cancel</RippleButton>
                        <RippleButton type="submit" className="btn btn-primary" disabled={saving}>
                            {saving ? <span className="btn-loading"><span className="spinner" /> Saving...</span>
                                : (profile ? '✏️ Update Profile' : '💾 Save Profile')}
                        </RippleButton>
                    </div>
                </form>
            );
        }

        // ═══════════════════════════════════
        // PROFILE CARD
        // ═══════════════════════════════════
        function ProfileCard({ profile, index, onClick }) {
            const theme = THEMES[profile.theme] || THEMES.other;
            const [hovered, setHovered] = useState(false);
            const cardRef = useRef(null);

            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - .5;
                const y = (e.clientY - rect.top) / rect.height - .5;
                cardRef.current.style.transform = `perspective(600px) rotateY(${x * 8}deg) rotateX(${-y * 8}deg) translateY(-8px) scale(1.02)`;
            };
            const handleMouseLeave = () => {
                setHovered(false);
                if (cardRef.current) cardRef.current.style.transform = '';
            };
            return (
                <div ref={cardRef} className={`profile-card-item theme-${profile.theme} stagger-in`}
                    style={{ animationDelay: `${index * .1}s` }}
                    onClick={() => onClick(profile.id)}
                    onMouseEnter={() => setHovered(true)}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}>
                    <div className="card-image">
                        {profile.image
                            ? <img src={profile.image} alt={profile.name} />
                            : <div className="no-image"><span className={hovered ? 'emoji-bounce' : ''} style={{display:'inline-block'}}>{theme.emoji}</span></div>}
                        <div className="card-overlay"><span>View Profile →</span></div>
                    </div>
                    <div className="card-content">
                        <h3>{profile.name}</h3>
                        <span className="theme-badge" style={{ background: theme.bg, color: theme.color }}>{theme.emoji} {theme.name}</span>
                        <p className="card-preview">{profile.message.substring(0, 80)}...</p>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════
        // LOGIN PAGE
        // ═══════════════════════════════════
        function LoginPage({ onLogin }) {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [shaking, setShaking] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => {
                    let role = null;
                    if (password === PASSWORDS.editor) role = 'editor';
                    else if (password === PASSWORDS.viewer) role = 'viewer';
                    if (role) { setError(''); onLogin(password, role); }
                    else { setError('❌ Invalid password. Please try again.'); setShaking(true); setPassword(''); setTimeout(() => setShaking(false), 500); }
                    setLoading(false);
                }, 700);
            };
            return (
                <div className="login-container">
                    <ParticleBackground />
                    <FloatingShapes />
                    <div className={`login-box animate-in ${shaking ? 'shake' : ''}`}>
                        <div className="logo-section">
                            <div className="logo-icon">🕊️</div>
                            <h1 className="logo-text">After-Me</h1>
                            <p className="tagline"><Typewriter text="Your Digital Legacy" speed={90} delay={500} /></p>
                        </div>
                        <div className="login-content">
                            <p className="intro-text fade-in-delay">This is a secure space to leave messages for your loved ones</p>
                            <form onSubmit={handleSubmit} className="login-form">
                                <div className="form-group slide-up-1">
                                    <label htmlFor="pwd">Enter Master Password:</label>
                                    <div className="input-wrapper">
                                        <span className="input-icon">🔐</span>
                                        <input id="pwd" type="password" className="input-with-icon" value={password}
                                            onChange={e => setPassword(e.target.value)} placeholder="••••••••" required />
                                    </div>
                                </div>
                                <RippleButton type="submit" className="login-btn slide-up-2" disabled={loading}>
                                    {loading ? <span className="btn-loading"><span className="spinner" /> Authenticating...</span> : '🔓 Access Messages'}
                                </RippleButton>
                            </form>
                            {error && <div className="error-message animate-error">{error}</div>}
                        </div>
                        <div className="login-footer">
                            <p>Messages for when you're gone 💫</p>
                            <p className="credit">Crafted with ❤️ by Vishwajeeth V</p>
                        </div>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════
        // DASHBOARD PAGE
        // ═══════════════════════════════════
        function DashboardPage({ role, userPassword, profiles, onLogout, onViewProfile, onAddProfile }) {
            const [showModal, setShowModal] = useState(false);
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('all');

            const filtered = useMemo(() =>
                profiles.filter(p => {
                    const s = p.name.toLowerCase().includes(search.toLowerCase()) || p.message.toLowerCase().includes(search.toLowerCase());
                    const f = filter === 'all' || p.theme === filter;
                    return s && f;
                }), [profiles, search, filter]);

            return (
                <div className="dashboard-container page-enter">
                    <header className="dashboard-header slide-down">
                        <div className="header-content">
                            <h1 className="header-logo"><span className="logo-emoji">🕊️</span> After-Me</h1>
                            <div className="header-info">
                                <span className="user-password">🔑 {userPassword.substring(0, 3)}****</span>
                                <span className={`access-mode ${role}`}>
                                    {role === 'editor' ? '✏️ Editor Mode' : '👁️ Viewer Mode'}
                                </span>
                                <RippleButton className="logout-btn" onClick={onLogout}>🚪 Logout</RippleButton>
                            </div>
                        </div>
                    </header>
                    <main className="dashboard-main">
                        <div className="dashboard-section fade-in">
                            <div className="section-header">
                                <div className="section-title-area">
                                    <h2>My Profiles</h2>
                                    <span className="profile-count"><AnimatedCounter end={profiles.length} /> profiles</span>
                                </div>
                                <div className="section-controls">
                                    <div className="search-box">
                                        <span className="search-icon">🔍</span>
                                        <input type="text" placeholder="Search profiles..." value={search}
                                            onChange={e => setSearch(e.target.value)} className="search-input" />
                                    </div>
                                    <select value={filter} onChange={e => setFilter(e.target.value)} className="filter-select">
                                        <option value="all">🌐 All Themes</option>
                                        {Object.entries(THEMES).map(([k, t]) => <option key={k} value={k}>{t.emoji} {t.name}</option>)}
                                    </select>
                                    {role === 'editor' && (
                                        <RippleButton className="btn btn-primary add-btn" onClick={() => setShowModal(true)}>
                                            <span className="btn-icon">+</span> Add Profile
                                        </RippleButton>
                                    )}
                                </div>
                            </div>
                            <div className="profiles-grid">
                                {filtered.length === 0 ? (
                                    <div className="empty-state fade-in">
                                        <div className="empty-icon">📝</div>
                                        <p>{profiles.length === 0
                                            ? (role === 'editor' ? 'Create your first profile to get started!' : 'No profiles yet. Check back later.')
                                            : 'No profiles match your search.'}</p>
                                    </div>
                                ) : filtered.map((p, i) => <ProfileCard key={p.id} profile={p} index={i} onClick={onViewProfile} />)}
                            </div>
                        </div>
                    </main>
                    <Modal isOpen={showModal} onClose={() => setShowModal(false)} title="✨ Add New Profile">
                        <ProfileForm onSave={(data) => { onAddProfile(data); setShowModal(false); }}
                            onCancel={() => setShowModal(false)} />
                    </Modal>
                </div>
            );
        }

        // ═══════════════════════════════════
        // PROFILE VIEW PAGE
        // ═══════════════════════════════════
        function ProfileViewPage({ profileId, role, profiles, onBack, onLogout, onUpdate, onDelete }) {
            const [showEdit, setShowEdit] = useState(false);
            const [showConfirm, setShowConfirm] = useState(false);
            const profile = profiles.find(p => p.id === profileId);

            if (!profile) return (
                <div className="profile-container">
                    <div className="profile-main">
                        <div className="not-found fade-in">
                            <h2>Profile not found</h2>
                            <RippleButton className="btn btn-primary" onClick={onBack} style={{marginTop:20}}>← Back to Dashboard</RippleButton>
                        </div>
                    </div>
                </div>
            );

            const theme = THEMES[profile.theme] || THEMES.other;
            return (
                <div className="profile-container page-enter">
                    <header className="profile-header slide-down">
                        <RippleButton className="back-btn" onClick={onBack}>← Back</RippleButton>
                        <h1>🕊️ After-Me</h1>
                        <RippleButton className="logout-btn" onClick={onLogout}>🚪 Logout</RippleButton>
                    </header>
                    <main className="profile-main">
                        <ParticleBackground />
                        <div className={`profile-display theme-${profile.theme} animate-in`}>
                            <div className="profile-image-section">
                                {profile.image
                                    ? <img src={profile.image} alt={profile.name} className="profile-image" />
                                    : <div className="profile-no-image"><span className="profile-emoji-large float-anim">{theme.emoji}</span></div>}
                            </div>
                            <div className="profile-info-section">
                                <h2 className="profile-name-animated">{profile.name}</h2>
                                <span className="profile-theme-badge bounce-in" style={{ background: theme.bg, color: theme.color }}>
                                    {theme.emoji} {theme.name}
                                </span>
                                <div className="profile-message">
                                    <h3>💌 My Message</h3>
                                    <p>{profile.message.split('\n').map((line, i) => <Fragment key={i}>{line}<br /></Fragment>)}</p>
                                </div>
                                <div className="profile-actions">
                                    <RippleButton className="btn btn-secondary" onClick={onBack}>← Dashboard</RippleButton>
                                    {role === 'editor' && (
                                        <Fragment>
                                            <RippleButton className="btn btn-primary" onClick={() => setShowEdit(true)}>✏️ Edit</RippleButton>
                                            <RippleButton className="btn btn-danger" onClick={() => setShowConfirm(true)}>🗑️ Delete</RippleButton>
                                        </Fragment>
                                    )}
                                </div>
                                <div className="profile-meta">
                                    <small>📅 Created: {new Date(profile.createdAt).toLocaleDateString()}</small>
                                    <small>🔄 Modified: {new Date(profile.updatedAt).toLocaleDateString()}</small>
                                </div>
                            </div>
                        </div>
                    </main>

                    <Modal isOpen={showEdit} onClose={() => setShowEdit(false)} title="✏️ Edit Profile">
                        <ProfileForm profile={profile}
                            onSave={(data) => { onUpdate(profileId, data); setShowEdit(false); }}
                            onCancel={() => setShowEdit(false)} />
                    </Modal>

                    <Modal isOpen={showConfirm} onClose={() => setShowConfirm(false)} title="⚠️ Confirm Delete">
                        <div className="confirm-delete">
                            <p>Are you sure you want to delete <strong>{profile.name}</strong>'s profile?</p>
                            <p className="delete-warning">This action cannot be undone.</p>
                            <div className="form-actions">
                                <RippleButton className="btn btn-secondary" onClick={() => setShowConfirm(false)}>Cancel</RippleButton>
                                <RippleButton className="btn btn-danger" onClick={() => { onDelete(profileId); onBack(); }}>🗑️ Delete Forever</RippleButton>
                            </div>
                        </div>
                    </Modal>
                </div>
            );
        }

        // ═══════════════════════════════════
        // MAIN APP
        // ═══════════════════════════════════
        function App() {
            const [page, setPage] = useState('login');
            const [role, setRole] = useState(null);
            const [userPassword, setUserPassword] = useState('');
            const [selectedId, setSelectedId] = useState(null);
            const [toasts, setToasts] = useState([]);
            const [profiles, setProfiles] = useState(() => {
                try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; }
                catch { return []; }
            });

            useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); }, [profiles]);

            const addToast = useCallback((message, type = 'info') => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
            }, []);
            const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

            const handleLogin = useCallback((pwd, r) => {
                setUserPassword(pwd); setRole(r);
                addToast(`Welcome! Logged in as ${r === 'editor' ? 'Editor ✏️' : 'Viewer 👁️'}`, 'success');
                setPage('dashboard');
            }, [addToast]);

            const handleLogout = useCallback(() => {
                setRole(null); setUserPassword(''); setSelectedId(null);
                addToast('Logged out successfully 👋', 'info');
                setPage('login');
            }, [addToast]);

            const handleViewProfile = useCallback((id) => { setSelectedId(id); setPage('profile'); }, []);
            const handleBack = useCallback(() => { setSelectedId(null); setPage('dashboard'); }, []);

            const handleAddProfile = useCallback((data) => {
                setProfiles(prev => [...prev, {
                    id: 'profile_' + Date.now(),
                    ...data,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                }]);
                addToast('Profile created successfully! 🎉', 'success');
            }, [addToast]);

            const handleUpdateProfile = useCallback((id, data) => {
                setProfiles(prev => prev.map(p => p.id === id ? { ...p, ...data, updatedAt: new Date().toISOString() } : p));
                addToast('Profile updated! ✅', 'success');
            }, [addToast]);

            const handleDeleteProfile = useCallback((id) => {
                setProfiles(prev => prev.filter(p => p.id !== id));
                addToast('Profile deleted 🗑️', 'info');
            }, [addToast]);

            return (
                <div className="app">
                    <ToastContainer toasts={toasts} removeToast={removeToast} />
                    {page === 'login' && <LoginPage onLogin={handleLogin} />}
                    {page === 'dashboard' && (
                        <DashboardPage role={role} userPassword={userPassword} profiles={profiles}
                            onLogout={handleLogout} onViewProfile={handleViewProfile} onAddProfile={handleAddProfile} />
                    )}
                    {page === 'profile' && (
                        <ProfileViewPage profileId={selectedId} role={role} profiles={profiles}
                            onBack={handleBack} onLogout={handleLogout}
                            onUpdate={handleUpdateProfile} onDelete={handleDeleteProfile} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
