<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Before</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--font-display:'Space Grotesk',sans-serif;
--font-body:'Inter',sans-serif;
--black:#000;--d1:#0a0a0a;--d2:#111;--d3:#1a1a1a;
--g1:#222;--g2:#333;--g3:#444;--g4:#666;--g5:#888;--g6:#aaa;--g7:#ccc;
--white:#fff;
--glass:rgba(255,255,255,0.04);--glass-b:rgba(255,255,255,0.08);--glass-h:rgba(255,255,255,0.07);
--sh-s:0 2px 10px rgba(0,0,0,.4);--sh-m:0 8px 32px rgba(0,0,0,.5);--sh-g:0 0 40px rgba(255,255,255,.04);
--r-s:10px;--r-m:16px;--r-l:24px;
--ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1)
}
html{scroll-behavior:smooth}
html,body{width:100%;height:100%;overflow-x:hidden;background:var(--black);color:var(--white);font-family:var(--font-body);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#root{width:100%;min-height:100vh;position:relative}
canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grad{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 20%,#111 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,#0d0d0d 0%,transparent 60%),#000;animation:bgShift 20s ease infinite alternate}
@keyframes bgShift{0%{filter:brightness(1)}50%{filter:brightness(1.05)}100%{filter:brightness(.98)}}
.screen{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .8s var(--ease),transform .8s var(--ease)}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(1.02)}
.screen.below{transform:translateY(30px)}

/* INTRO */
.intro-wrap{text-align:center;z-index:2;position:relative}
.intro-line{font-family:var(--font-display);font-size:clamp(1.6rem,5vw,3.2rem);font-weight:300;letter-spacing:-.02em;margin-bottom:8px;min-height:1.3em;display:flex;align-items:center;justify-content:center;flex-wrap:wrap}
.intro-line .ch{display:inline-block;opacity:0;filter:blur(12px);transform:translateY(24px);transition:all .55s var(--ease)}
.intro-line.vis .ch{opacity:1;filter:blur(0);transform:translateY(0)}
.intro-line.out{transition:opacity .5s,transform .5s;opacity:0;transform:translateY(-18px)}
.logo-main{font-family:var(--font-display);font-weight:700;font-size:clamp(3rem,10vw,6rem);letter-spacing:.08em;position:relative;display:inline-block}
.logo-main .ch{display:inline-block;opacity:0;filter:blur(14px);transform:translateY(30px) scale(.9);transition:all .6s var(--spring)}
.logo-main.vis .ch{opacity:1;filter:blur(0);transform:translateY(0) scale(1);text-shadow:0 0 30px rgba(255,255,255,.25),0 0 60px rgba(255,255,255,.08)}
.halo{position:absolute;top:50%;left:25%;transform:translate(-50%,-50%);width:120px;height:120px;border:1.5px solid rgba(255,255,255,.15);border-radius:50%;opacity:0;animation:haloIn 1.2s ease forwards 1s,haloSpin 8s linear infinite 1.4s}
@keyframes haloIn{to{opacity:1}}
@keyframes haloSpin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.skip-btn{position:fixed;bottom:40px;right:40px;z-index:10;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:var(--font-body);font-size:13px;padding:10px 24px;border-radius:100px;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px)}
.skip-btn:hover{background:rgba(255,255,255,.12);color:#fff}

/* LOGIN */
.login-card{background:rgba(255,255,255,.035);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-l);padding:48px 40px;width:min(420px,90vw);box-shadow:var(--sh-m),var(--sh-g);transition:all .5s var(--ease);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 40%,transparent 60%,rgba(255,255,255,.05));pointer-events:none}
.login-card.glow{box-shadow:0 0 60px rgba(255,255,255,.15),0 0 120px rgba(255,255,255,.05);transform:scale(1.02)}
.login-card.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-6px)}30%,60%,90%{transform:translateX(6px)}}
.login-title{font-family:var(--font-display);font-size:1.8rem;font-weight:600;margin-bottom:8px;background:linear-gradient(135deg,#fff,#999);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:36px}
.input-group{position:relative;margin-bottom:24px}
.input-group input{width:100%;padding:16px 18px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-s);color:#fff;font-size:15px;font-family:var(--font-body);outline:none;transition:all .3s}
.input-group input:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);box-shadow:0 0 20px rgba(255,255,255,.05)}
.input-group input.err{border-color:rgba(200,80,80,.5)}
.input-group label{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:14px;color:rgba(255,255,255,.35);pointer-events:none;transition:all .25s var(--ease)}
.input-group input:focus+label,.input-group input:not(:placeholder-shown)+label{top:10px;transform:translateY(0);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.12);border-radius:var(--r-s);color:#fff;font-size:15px;font-weight:500;font-family:var(--font-body);cursor:pointer;transition:all .3s var(--ease);position:relative;overflow:hidden;margin-top:8px}
.btn-primary:hover{transform:scale(1.02);background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.1));box-shadow:0 4px 20px rgba(255,255,255,.08)}
.btn-primary:active{transform:scale(.98)}
.btn-primary .shine{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shine 3s infinite}
@keyframes shine{0%{left:-100%}50%,100%{left:100%}}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);transform:scale(0);animation:ripple .6s ease-out forwards;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* DASHBOARD */
.dashboard{position:relative;z-index:1;min-height:100vh;padding:0 0 100px}
.dash-header{position:sticky;top:0;z-index:20;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06)}
.dash-logo{font-family:var(--font-display);font-weight:700;font-size:1.2rem;letter-spacing:.06em;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.user-pill{display:flex;align-items:center;gap:12px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#444,#222);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,.1)}
.user-name{font-size:13px;color:rgba(255,255,255,.6)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-size:12px;padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:var(--font-body)}
.logout-btn:hover{border-color:rgba(255,255,255,.2);color:#fff}
.dash-content{max-width:1100px;margin:0 auto;padding:32px 20px}
.section-title{font-family:var(--font-display);font-size:1.3rem;font-weight:600;margin-bottom:20px;background:linear-gradient(135deg,#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:40px}
.stat-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:var(--r-m);padding:28px 24px;transition:all .4s var(--ease);cursor:default;position:relative;overflow:hidden;transform-style:preserve-3d}
.stat-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 50%);pointer-events:none}
.stat-card:hover{background:var(--glass-h);border-color:rgba(255,255,255,.12);box-shadow:var(--sh-g)}
.stat-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);margin-bottom:10px}
.stat-value{font-family:var(--font-display);font-size:2rem;font-weight:700;background:linear-gradient(135deg,#fff,#bbb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-sub{font-size:12px;color:rgba(255,255,255,.3);margin-top:6px}
.progress-section{display:flex;align-items:center;gap:40px;margin-bottom:40px;flex-wrap:wrap;justify-content:center}
.ring-wrap{position:relative;width:180px;height:180px;flex-shrink:0}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s var(--ease)}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:var(--font-display);font-size:2.2rem;font-weight:700}
.ring-label{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.xp-section{flex:1;min-width:260px}
.xp-level{font-family:var(--font-display);font-size:1.1rem;font-weight:600;margin-bottom:6px;display:flex;align-items:baseline;gap:8px}
.xp-level span{font-size:.75rem;color:rgba(255,255,255,.35);font-weight:400}
.xp-track{width:100%;height:10px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden;position:relative}
.xp-fill{height:100%;background:linear-gradient(90deg,rgba(255,255,255,.15),rgba(255,255,255,.35));border-radius:100px;transition:width 1s var(--ease);position:relative}
.xp-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:rgba(255,255,255,.4);border-radius:100px;filter:blur(4px)}
.xp-info{font-size:12px;color:rgba(255,255,255,.3);margin-top:6px}
.streak-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:8px 18px;font-size:13px;margin-top:16px;animation:pulse-g 3s infinite}
@keyframes pulse-g{0%,100%{box-shadow:0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 18px rgba(255,255,255,.07)}}
.challenge-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:var(--r-m);padding:28px;margin-bottom:40px;position:relative;overflow:hidden}
.challenge-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 40%);pointer-events:none}
.challenge-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:12px}
.challenge-goal{font-family:var(--font-display);font-size:1.2rem;font-weight:500;margin-bottom:16px}
.countdown{display:flex;gap:12px;flex-wrap:wrap}
.cd-unit{text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-s);padding:12px 16px;min-width:64px}
.cd-num{font-family:var(--font-display);font-size:1.5rem;font-weight:700;transition:all .3s}
.cd-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-top:4px}
.goals-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.goals-count{font-size:13px;color:rgba(255,255,255,.35)}
.add-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:13px;padding:8px 20px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:var(--font-body);display:flex;align-items:center;gap:6px}
.add-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.goal-card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:var(--r-m);padding:20px;display:flex;align-items:flex-start;gap:14px;transition:all .4s var(--ease);cursor:pointer;position:relative;overflow:hidden;transform-style:preserve-3d;opacity:0;animation:cardIn .5s var(--ease) forwards}
.goal-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 50%);pointer-events:none}
.goal-card:hover{background:var(--glass-h);border-color:rgba(255,255,255,.12);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.goal-card.done{border-color:rgba(255,255,255,.15)}
.goal-card.done .goal-text{text-decoration:line-through;color:rgba(255,255,255,.3)}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.goal-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s;margin-top:1px}
.goal-check.checked{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4)}
.goal-check svg{width:12px;height:12px;opacity:0;transition:opacity .3s}
.goal-check.checked svg{opacity:1}
.goal-text{font-size:14px;line-height:1.5;color:rgba(255,255,255,.7);transition:all .3s;flex:1}
.goal-del{opacity:0;background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:16px;padding:4px;transition:all .3s;flex-shrink:0}
.goal-card:hover .goal-del{opacity:1}
.goal-del:hover{color:rgba(255,255,255,.6)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;animation:fadeIn .3s forwards}
@keyframes fadeIn{to{opacity:1}}
.modal{background:rgba(20,20,20,.95);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-l);padding:40px;width:min(440px,90vw);animation:modalIn .4s var(--spring)}
@keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal h3{font-family:var(--font-display);font-size:1.3rem;margin-bottom:20px;background:linear-gradient(135deg,#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal textarea{width:100%;min-height:100px;padding:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-s);color:#fff;font-size:14px;font-family:var(--font-body);outline:none;resize:vertical;transition:border-color .3s;line-height:1.6}
.modal textarea:focus{border-color:rgba(255,255,255,.25)}
.modal-actions{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.modal-actions button{padding:10px 24px;border-radius:var(--r-s);font-size:13px;font-family:var(--font-body);cursor:pointer;transition:all .3s}
.cancel-btn{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.cancel-btn:hover{border-color:rgba(255,255,255,.2);color:#fff}
.confirm-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);color:#fff}
.confirm-btn:hover{background:rgba(255,255,255,.2)}

/* CONFETTI */
.confetti-container{position:fixed;pointer-events:none;z-index:9999}
.confetti-p{position:absolute;border-radius:50%;animation:confettiBurst .8s var(--ease) forwards}
@keyframes confettiBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* RESPONSIVE */
@media(max-width:640px){
.login-card{padding:36px 28px}
.stats-grid{grid-template-columns:1fr 1fr}
.goals-grid{grid-template-columns:1fr}
.progress-section{flex-direction:column;align-items:center;text-align:center}
.ring-wrap{width:150px;height:150px}
.countdown{justify-content:center}
.dash-header{padding:12px 16px}
.dash-content{padding:24px 16px}
.halo{width:80px;height:80px}
}
@media(max-width:400px){
.stats-grid{grid-template-columns:1fr}
.intro-line{font-size:1.3rem}
}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

const DEFAULT_GOALS=[
"Watch a sunrise from a mountaintop","Learn to play a musical instrument",
"Read 50 books in a year","Travel somewhere you don't speak the language",
"Write a letter to your future self","Run a 5K race",
"Cook a meal from every continent","Build a project from scratch",
"Volunteer for a cause you believe in","See the Northern Lights",
"Plant a tree and watch it grow","Take a spontaneous road trip",
"Learn a new language conversationally","Swim in the ocean at night",
"Write and finish a short story","Go camping under the stars",
"Master a complex recipe from scratch","Attend a live concert of your favorite artist",
"Complete a 30-day fitness challenge","Create something with your hands",
"Visit a world wonder","Meditate daily for 30 days",
"Take a photo every day for a month","Forgive someone and truly mean it",
"Start a passion project","Watch 50 classic films",
"Climb a mountain","Make a meaningful friend abroad",
"Go 24 hours without technology","Leave a positive mark on someone's life"
];

const STORAGE_KEY='100before_data';
const XP_PER_GOAL=100;const XP_PER_LEVEL=500;const XP_DAILY=10;

function loadData(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):null}catch(e){return null}}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch(e){}}

function initData(username){
const goals=DEFAULT_GOALS.map((t,i)=>({id:i+1,text:t,completed:false,completedAt:null}));
const now=new Date().toISOString();
const end=new Date(Date.now()+7*24*60*60*1000).toISOString();
return{username,goals,xp:0,streak:1,lastActive:now.split('T')[0],
weeklyChallenge:{goalId:goals[Math.floor(Math.random()*goals.length)].id,start:now,end}};
}

function updateStreak(data){
const today=new Date().toISOString().split('T')[0];
const last=data.lastActive;
if(last===today)return data;
const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
const newStreak=last===yesterday?data.streak+1:1;
return{...data,streak:newStreak,lastActive:today,xp:data.xp+XP_DAILY};
}

/* ===== PARTICLE CANVAS ===== */
function ParticleCanvas(){
const canvasRef=useRef(null);
const particles=useRef([]);
const raf=useRef(null);
const mouse=useRef({x:-1000,y:-1000});

useEffect(()=>{
const c=canvasRef.current;const ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
resize();
const N=Math.min(80,Math.floor(window.innerWidth*window.innerHeight/15000));
particles.current=[];
for(let i=0;i<N;i++){
particles.current.push({
x:Math.random()*c.width,y:Math.random()*c.height,
vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
size:Math.random()*1.8+.5,opacity:Math.random()*.4+.08
});}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
const pts=particles.current;
for(let i=0;i<pts.length;i++){
const p=pts[i];
p.x+=p.vx;p.y+=p.vy;
if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
const dx=mouse.current.x-p.x;const dy=mouse.current.y-p.y;
const md=Math.sqrt(dx*dx+dy*dy);
if(md<120){p.x-=dx*.005;p.y-=dy*.005;}
ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.fill();
}
for(let i=0;i<pts.length;i++){
for(let j=i+1;j<pts.length;j++){
const dx=pts[i].x-pts[j].x;const dy=pts[i].y-pts[j].y;
const d=dx*dx+dy*dy;
if(d<18000){
ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
ctx.strokeStyle=`rgba(255,255,255,${.06*(1-d/18000)})`;ctx.lineWidth=.5;ctx.stroke();}
}}
raf.current=requestAnimationFrame(draw);
}
raf.current=requestAnimationFrame(draw);
function onMove(e){mouse.current={x:e.clientX,y:e.clientY}}
function onLeave(){mouse.current={x:-1000,y:-1000}}
window.addEventListener('resize',resize);
window.addEventListener('mousemove',onMove);
window.addEventListener('mouseleave',onLeave);
return()=>{cancelAnimationFrame(raf.current);window.removeEventListener('resize',resize);
window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseleave',onLeave);};
},[]);
return <canvas ref={canvasRef} id="particles"/>;
}

/* ===== ANIMATED TEXT ===== */
function AnimText({text,visible,delay=0,cd=40,className=''}){
const chars=text.split('');
return(
<div className={`intro-line ${className} ${visible?'vis':''}`}>
{chars.map((ch,i)=>(
<span key={i} className="ch" style={{transitionDelay:`${delay+i*cd}ms`}}>
{ch===' '?'\u00A0':ch}</span>
))}
</div>);
}

/* ===== INTRO ===== */
function IntroSequence({onComplete}){
const[phase,setPhase]=useState(0);
const[show,setShow]=useState([false,false,false,false]);
const timers=useRef([]);

useEffect(()=>{
const s=(fn,ms)=>{const t=setTimeout(fn,ms);timers.current.push(t);return t;};
s(()=>setShow(p=>{const n=[...p];n[0]=true;return n;}),400);
s(()=>setShow(p=>{const n=[...p];n[0]=false;return n;}),2800);
s(()=>{setPhase(1);setShow(p=>{const n=[...p];n[1]=true;return n;});},3400);
s(()=>setShow(p=>{const n=[...p];n[1]=false;return n;}),5800);
s(()=>{setPhase(2);setShow(p=>{const n=[...p];n[2]=true;return n;});},6400);
s(()=>setShow(p=>{const n=[...p];n[2]=false;return n;}),8800);
s(()=>{setPhase(3);setShow(p=>{const n=[...p];n[3]=true;return n;});},9400);
s(()=>onComplete(),12500);
return()=>timers.current.forEach(clearTimeout);
},[]);

function skip(){timers.current.forEach(clearTimeout);onComplete();}

return(
<div className="screen" style={{zIndex:5}}>
<div className="bg-grad"/>
<div className="intro-wrap">
{phase<=0&&<AnimText text="You Have 100 Chances." visible={show[0]} className={!show[0]&&phase>0?'out':''}/>}
{phase===1&&<AnimText text="Most People Never Finish." visible={show[1]}/>}
{phase===2&&<AnimText text="This Is Where You Do." visible={show[2]}/>}
{phase>=3&&(
<div style={{position:'relative',display:'inline-block'}}>
<div className={`logo-main ${show[3]?'vis':''}`}>
{'100 BEFORE'.split('').map((ch,i)=>(
<span key={i} className="ch" style={{transitionDelay:`${i*70}ms`}}>
{ch===' '?'\u00A0':ch}</span>
))}
{show[3]&&<div className="halo"/>}
</div>
</div>
)}
</div>
<button className="skip-btn" onClick={skip}>Skip →</button>
</div>
);
}

const[success,setSuccess]=useState(false);

/* ===== ANIMATED NUMBER ===== */
function useAnimNum(target,dur=800){
const[val,setVal]=useState(target);const prev=useRef(target);const raf=useRef(null);
useEffect(()=>{
const start=prev.current;const startT=performance.now();
function tick(now){
const p=Math.min((now-startT)/dur,1);
const e=1-Math.pow(1-p,3);
setVal(Math.round(start+(target-start)*e));
if(p<1)raf.current=requestAnimationFrame(tick);
else prev.current=target;
}
raf.current=requestAnimationFrame(tick);
return()=>cancelAnimationFrame(raf.current);
},[target,dur]);
return val;
}

/* ===== PROGRESS RING ===== */
function ProgressRing({completed,total}){
const pct=total>0?completed/total:0;
const circ=2*Math.PI*72;
const offset=circ*(1-pct);
const dispPct=useAnimNum(Math.round(pct*100));
return(
<div className="ring-wrap">
<svg viewBox="0 0 160 160">
<defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stopColor="#fff"/><stop offset="100%" stopColor="#666"/>
</linearGradient></defs>
<circle cx="80" cy="80" r="72" className="ring-bg" strokeWidth="6"/>
<circle cx="80" cy="80" r="72" className="ring-fg" strokeWidth="6"
strokeDasharray={circ} strokeDashoffset={offset}/>
</svg>
<div className="ring-text">
<div className="ring-pct">{dispPct}%</div>
<div className="ring-label">Complete</div>
</div>
</div>);
}

/* ===== CONFETTI ===== */
function Confetti({x,y,onDone}){
useEffect(()=>{const t=setTimeout(onDone,900);return()=>clearTimeout(t);},[]);
const pts=useMemo(()=>Array.from({length:24},(_,i)=>{
const a=(Math.PI*2*i)/24;const v=40+Math.random()*70;
const s=3+Math.random()*4;const sh=160+Math.floor(Math.random()*95);
return{tx:Math.cos(a)*v,ty:Math.sin(a)*v,s,sh};
}),[]);
return(
<div className="confetti-container" style={{left:x,top:y}}>
{pts.map((p,i)=>(
<div key={i} className="confetti-p" style={{
width:p.s,height:p.s,background:`rgb(${p.sh},${p.sh},${p.sh})`,
'--tx':p.tx+'px','--ty':p.ty+'px'}}/>
))}
</div>);
}

/* ===== WEEKLY CHALLENGE ===== */
function WeeklyChallenge({challenge,goals,onComplete}){
const[now,setNow]=useState(Date.now());
useEffect(()=>{const iv=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(iv);},[]);
const goal=goals.find(g=>g.id===challenge.goalId);
const end=new Date(challenge.end).getTime();
const diff=Math.max(0,end-now);
const d=Math.floor(diff/86400000);
const h=Math.floor((diff%86400000)/3600000);
const m=Math.floor((diff%3600000)/60000);
const s=Math.floor((diff%60000)/1000);
if(!goal)return null;
return(
<div className="challenge-card">
<div className="challenge-label">⚡ Weekly Challenge</div>
<div className="challenge-goal">{goal.text}</div>
{goal.completed?(
<div style={{fontSize:13,color:'rgba(255,255,255,.5)'}}>✓ Completed! New challenge coming soon.</div>
):(
<div className="countdown">
<div className="cd-unit"><div className="cd-num">{String(d).padStart(2,'0')}</div><div className="cd-label">Days</div></div>
<div className="cd-unit"><div className="cd-num">{String(h).padStart(2,'0')}</div><div className="cd-label">Hours</div></div>
<div className="cd-unit"><div className="cd-num">{String(m).padStart(2,'0')}</div><div className="cd-label">Mins</div></div>
<div className="cd-unit"><div className="cd-num">{String(s).padStart(2,'0')}</div><div className="cd-label">Secs</div></div>
</div>
)}
</div>);
}

/* ===== GOAL CARD ===== */
function GoalCard({goal,index,onToggle,onDelete}){
const ref=useRef(null);
function handleTilt(e){
if(!ref.current||window.innerWidth<768)return;
const r=ref.current.getBoundingClientRect();
const x=(e.clientX-r.left)/r.width-.5;
const y=(e.clientY-r.top)/r.height-.5;
ref.current.style.transform=`perspective(800px) rotateY(${x*6}deg) rotateX(${-y*6}deg) scale(1.02)`;
}
function resetTilt(){if(ref.current)ref.current.style.transform='';}
return(
<div ref={ref} className={`goal-card ${goal.completed?'done':''}`}
style={{animationDelay:`${index*40}ms`}}
onMouseMove={handleTilt} onMouseLeave={resetTilt}
onClick={(e)=>onToggle(goal.id,e)}>
<div className={`goal-check ${goal.completed?'checked':''}`}>
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
<polyline points="20 6 9 17 4 12"/>
</svg>
</div>
<div className="goal-text">{goal.text}</div>
<button className="goal-del" onClick={(e)=>{e.stopPropagation();onDelete(goal.id);}} title="Delete">✕</button>
</div>);
}

/* ===== ADD GOAL MODAL ===== */
function AddGoalModal({onAdd,onClose,currentCount}){
const[text,setText]=useState('');
function submit(){
const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
if(lines.length>0)onAdd(lines);
onClose();
}
return(
<div className="modal-overlay" onClick={onClose}>
<div className="modal" onClick={e=>e.stopPropagation()}>
<h3>Add New Goals</h3>
<div style={{fontSize:13,color:'rgba(255,255,255,.4)',marginBottom:16}}>
{currentCount}/100 goals added. One goal per line.
</div>
<textarea value={text} onChange={e=>setText(e.target.value)}
placeholder="e.g. Learn to surf&#10;Visit Japan&#10;Write a song"/>
<div className="modal-actions">
<button className="cancel-btn" onClick={onClose}>Cancel</button>
<button className="confirm-btn" onClick={submit}>Add Goals</button>
</div>
</div>
</div>);
}

/* ===== DASHBOARD ===== */
function Dashboard({data,setData,onLogout}){
const[modal,setModal]=useState(false);
const[confetti,setConfetti]=useState(null);
const[filter,setFilter]=useState('all');

const completed=data.goals.filter(g=>g.completed).length;
const total=data.goals.length;
const level=Math.floor(data.xp/XP_PER_LEVEL);
const xpInLevel=data.xp%XP_PER_LEVEL;
const animXP=useAnimNum(data.xp);
const animCompleted=useAnimNum(completed);
const animStreak=useAnimNum(data.streak);

function toggleGoal(id,e){
const goal=data.goals.find(g=>g.id===id);if(!goal)return;
const wasCompleted=goal.completed;
const newGoals=data.goals.map(g=>g.id===id?{...g,completed:!g.completed,completedAt:!g.completed?new Date().toISOString():null}:g);
const xpDelta=wasCompleted?-XP_PER_GOAL:XP_PER_GOAL;
const nd={...data,goals:newGoals,xp:Math.max(0,data.xp+xpDelta)};
setData(nd);saveData(nd);
if(!wasCompleted){
const rect=e.currentTarget.getBoundingClientRect();
setConfetti({x:rect.left+rect.width/2,y:rect.top+rect.height/2,key:Date.now()});
}
}

function deleteGoal(id){
const newGoals=data.goals.filter(g=>g.id!==id);
const was=data.goals.find(g=>g.id===id);
const xpDelta=was&&was.completed?-XP_PER_GOAL:0;
let nd={...data,goals:newGoals,xp:Math.max(0,data.xp+xpDelta)};
if(data.weeklyChallenge.goalId===id&&newGoals.length>0){
const incomplete=newGoals.filter(g=>!g.completed);
const pool=incomplete.length>0?incomplete:newGoals;
nd.weeklyChallenge={...nd.weeklyChallenge,goalId:pool[Math.floor(Math.random()*pool.length)].id};
}
setData(nd);saveData(nd);
}

function addGoals(texts){
let nextId=data.goals.length>0?Math.max(...data.goals.map(g=>g.id))+1:1;
const remaining=100-data.goals.length;
const newOnes=texts.slice(0,remaining).map((t,i)=>({id:nextId+i,text:t,completed:false,completedAt:null}));
const nd={...data,goals:[...data.goals,...newOnes]};
setData(nd);saveData(nd);
}

const filteredGoals=useMemo(()=>{
if(filter==='done')return data.goals.filter(g=>g.completed);
if(filter==='todo')return data.goals.filter(g=>!g.completed);
return data.goals;
},[data.goals,filter]);

// Check if weekly challenge expired
useEffect(()=>{
if(new Date(data.weeklyChallenge.end).getTime()<Date.now()){
const incomplete=data.goals.filter(g=>!g.completed);
const pool=incomplete.length>0?incomplete:data.goals;
if(pool.length>0){
const nd={...data,weeklyChallenge:{
goalId:pool[Math.floor(Math.random()*pool.length)].id,
start:new Date().toISOString(),
end:new Date(Date.now()+7*86400000).toISOString()
}};
setData(nd);saveData(nd);
}}
},[]);

return(
<div className="dashboard">
<header className="dash-header">
<div className="dash-logo">100 BEFORE</div>
<div className="user-pill">
<div className="user-name">{data.username}</div>
<div className="user-avatar">{data.username[0]}</div>
<button className="logout-btn" onClick={onLogout}>Log out</button>
</div>
</header>

<div className="dash-content">
<div className="progress-section">
<ProgressRing completed={completed} total={total}/>
<div className="xp-section">
<div className="xp-level">Level {level} <span>{animXP} XP total</span></div>
<div className="xp-track"><div className="xp-fill" style={{width:`${(xpInLevel/XP_PER_LEVEL)*100}%`}}/></div>
<div className="xp-info">{XP_PER_LEVEL-xpInLevel} XP to next level</div>
<div className="streak-badge">🔥 {animStreak} day streak</div>
</div>
</div>

<div className="stats-grid">
<div className="stat-card">
<div className="stat-label">Completed</div>
<div className="stat-value">{animCompleted}</div>
<div className="stat-sub">of {total} goals</div>
</div>
<div className="stat-card">
<div className="stat-label">Remaining</div>
<div className="stat-value">{useAnimNum(total-completed)}</div>
<div className="stat-sub">goals to go</div>
</div>
<div className="stat-card">
<div className="stat-label">Current Level</div>
<div className="stat-value">{level}</div>
<div className="stat-sub">{Math.round((xpInLevel/XP_PER_LEVEL)*100)}% to next</div>
</div>
<div className="stat-card">
<div className="stat-label">Streak</div>
<div className="stat-value">{animStreak}</div>
<div className="stat-sub">consecutive days</div>
</div>
</div>

<WeeklyChallenge challenge={data.weeklyChallenge} goals={data.goals}/>

<div className="goals-header">
<div>
<div className="section-title" style={{marginBottom:8}}>Your Goals</div>
<div style={{display:'flex',gap:8}}>
{['all','todo','done'].map(f=>(
<button key={f} onClick={()=>setFilter(f)} style={{
background:filter===f?'rgba(255,255,255,.1)':'transparent',
border:`1px solid ${filter===f?'rgba(255,255,255,.15)':'rgba(255,255,255,.06)'}`,
color:filter===f?'#fff':'rgba(255,255,255,.4)',
padding:'5px 14px',borderRadius:100,fontSize:12,cursor:'pointer',
fontFamily:'var(--font-body)',transition:'all .3s'
}}>{f==='all'?`All (${total})`:f==='todo'?`To Do (${total-completed})`:`Done (${completed})`}</button>
))}
</div>
</div>
{total<100&&<button className="add-btn" onClick={()=>setModal(true)}>+ Add Goals</button>}
</div>

<div className="goals-grid">
{filteredGoals.map((g,i)=>(
<GoalCard key={g.id} goal={g} index={i} onToggle={toggleGoal} onDelete={deleteGoal}/>
))}
</div>

{filteredGoals.length===0&&(
<div style={{textAlign:'center',padding:'60px 20px',color:'rgba(255,255,255,.25)',fontSize:14}}>
{filter==='done'?'No completed goals yet. Start checking them off!':'All goals completed! 🎉'}
</div>
)}
</div>

{modal&&<AddGoalModal onAdd={addGoals} onClose={()=>setModal(false)} currentCount={total}/>}
{confetti&&<Confetti x={confetti.x} y={confetti.y} key={confetti.key} onDone={()=>setConfetti(null)}/>}
</div>);
}

/* ===== APP ===== */
function App(){
const[phase,setPhase]=useState('intro');
const[data,setData]=useState(()=>{const d=loadData();return d?updateStreak(d):null;});
const[fadeClass,setFadeClass]=useState('');

useEffect(()=>{if(data){saveData(data);}},[]);

function handleIntroComplete(){
setFadeClass('hidden');
setTimeout(()=>{
setPhase(data?'dashboard':'login');
setFadeClass('');
},600);
}

function handleLogin(username){
const d=initData(username);setData(d);saveData(d);
setFadeClass('hidden');
setTimeout(()=>{setPhase('dashboard');setFadeClass('');},600);
}

function handleLogout(){
localStorage.removeItem(STORAGE_KEY);
setData(null);
setFadeClass('hidden');
setTimeout(()=>{setPhase('login');setFadeClass('');},500);
}

return(
<React.Fragment>
<ParticleCanvas/>
<div className="bg-grad"/>
{phase==='intro'&&<IntroSequence onComplete={handleIntroComplete}/>}
{phase==='login'&&(
<div className={`screen ${fadeClass}`}>
<LoginScreen onLogin={handleLogin}/>
</div>
)}
{phase==='dashboard'&&data&&(
<div className={fadeClass} style={{position:'relative',zIndex:2,opacity:fadeClass?0:1,transition:'opacity .5s'}}>
<Dashboard data={data} setData={(d)=>{setData(d);saveData(d);}} onLogout={handleLogout}/>
</div>
)}
</React.Fragment>
);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
