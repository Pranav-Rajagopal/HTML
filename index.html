    <style>

        .cat-grid{display:flex;flex-wrap:wrap;gap:8px}

<body>
    <div class="body-gradient"></div>
    <canvas id="particle-canvas"></canvas>
    <canvas id="confetti-canvas"></canvas>
    <div id="root"></div>

    <script type="text/babel">
        const {useState,useEffect,useRef,useCallback,useMemo,memo}=React;

        // ═══════════════════ CONSTANTS ═══════════════════
        const CATS=['Travel','Career','Personal','Adventure','Creative','Social','Health','Learning'];
        const CAT_CLR={Travel:'#00d4ff',Career:'#ff6a00',Personal:'#a855f7',Adventure:'#ef4444',Creative:'#f59e0b',Social:'#10b981',Health:'#ec4899',Learning:'#6366f1'};
        const CHALLENGES=["Complete a goal you've been putting off","Add 5 new ambitious goals","Complete a goal from your weakest category","Finish something in the Adventure category","Maintain a 7-day completion streak","Complete 3 goals this week","Do something that genuinely scares you"];
        const FAKE_LB=[
            {name:'Phoenix',av:'PX',goals:87},{name:'Nexus',av:'NX',goals:73},{name:'Cipher',av:'CP',goals:68},
            {name:'Vortex',av:'VX',goals:54},{name:'Zenith',av:'ZN',goals:49},{name:'Pulse',av:'PL',goals:42},
            {name:'Nova',av:'NV',goals:38},{name:'Echo',av:'EC',goals:31}
        ];

        // ═══════════════════ PERSISTENCE ═══════════════════
        const load=()=>{try{const d=localStorage.getItem('hb_state');return d?JSON.parse(d):null}catch(e){return null}};
        const save=(s)=>localStorage.setItem('hb_state',JSON.stringify(s));
        const defaultState=()=>({goals:[],xp:0,streak:{cur:0,last:null}});
        const getLevel=(xp)=>Math.floor(xp/500)+1;
        const xpInLevel=(xp)=>{const l=getLevel(xp);return{progress:((xp-(l-1)*500)/500)*100,needed:l*500,current:xp-(l-1)*500}};

        // ═══════════════════ PARTICLES ═══════════════════
        function initParticles(){
            const c=document.getElementById('particle-canvas');if(!c)return;
            const ctx=c.getContext('2d');let ps=[];let id;
            const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight};
            resize();window.addEventListener('resize',resize);
            class P{
                constructor(){this.reset()}
                reset(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.s=Math.random()*1.8+.4;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.o=Math.random()*.4+.08;this.clr=Math.random()>.6?'0,200,255':'255,100,0'}
                update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1}
                draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=`rgba(${this.clr},${this.o})`;ctx.fill()}
            }
            const count=Math.min(90,Math.floor(window.innerWidth*window.innerHeight/15000));
            for(let i=0;i<count;i++)ps.push(new P());
            function loop(){
                ctx.clearRect(0,0,c.width,c.height);
                for(let i=0;i<ps.length;i++){ps[i].update();ps[i].draw();
                    for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);
                        if(d<110){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle=`rgba(0,180,255,${.04*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke()}
                    }
                }
                id=requestAnimationFrame(loop);
            }
            loop();
            return()=>{cancelAnimationFrame(id);window.removeEventListener('resize',resize)};
        }

        // ═══════════════════ CONFETTI ═══════════════════
        function boom(){
            const c=document.getElementById('confetti-canvas');if(!c)return;
            const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;
            const ps=[];const clrs=['#00d4ff','#ff6a00','#00ff88','#a855f7','#f59e0b','#fff','#ec4899'];
            for(let i=0;i<120;i++){
                ps.push({x:c.width/2+(Math.random()-.5)*160,y:c.height/2-40,vx:(Math.random()-.5)*18,vy:Math.random()*-18-4,
                    sz:Math.random()*7+3,clr:clrs[Math.floor(Math.random()*clrs.length)],rot:Math.random()*360,rv:(Math.random()-.5)*12,g:.35,o:1,d:.012+Math.random()*.008});
            }
            let id;
            function run(){
                ctx.clearRect(0,0,c.width,c.height);let alive=false;
                ps.forEach(p=>{if(p.o<=0)return;alive=true;p.x+=p.vx;p.vy+=p.g;p.y+=p.vy;p.rot+=p.rv;p.o-=p.d;p.vx*=.99;
                    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=Math.max(0,p.o);ctx.fillStyle=p.clr;
                    ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.55);ctx.restore()});
                if(alive)id=requestAnimationFrame(run);else ctx.clearRect(0,0,c.width,c.height);
            }
            run();
        }

        // ═══════════════════ ANIMATED COUNTER ═══════════════════
        const AnimNum=memo(({val,dur=1.2,className=''})=>{
            const[disp,setDisp]=useState(0);const prev=useRef(0);
            useEffect(()=>{
                const s=prev.current,e=val,st=performance.now(),ms=dur*1000;
                let id;
                function tick(now){const p=Math.min((now-st)/ms,1);const ez=1-Math.pow(1-p,3);setDisp(Math.round(s+(e-s)*ez));if(p<1)id=requestAnimationFrame(tick);else prev.current=e}
                id=requestAnimationFrame(tick);return()=>cancelAnimationFrame(id);
            },[val]);
            return <span className={className}>{disp}</span>;
        });

        // ═══════════════════ SCROLL REVEAL ═══════════════════
        function useReveal(delay=0){
            const ref=useRef(null);
            useEffect(()=>{
                if(!ref.current)return;
                const obs=new IntersectionObserver(([e])=>{
                    if(e.isIntersecting){gsap.to(ref.current,{opacity:1,y:0,duration:.7,ease:'power3.out',delay});obs.disconnect()}
                },{threshold:.15});
                obs.observe(ref.current);return()=>obs.disconnect();
            },[]);
            return ref;
        }

        // ═══════════════════ INTRO ═══════════════════
        function Intro({onDone}){
            const box=useRef(null),bar=useRef(null),fill=useRef(null),t1=useRef(null),t2=useRef(null),ttl=useRef(null);
            useEffect(()=>{
                const tl=gsap.timeline({onComplete:()=>{gsap.to(box.current,{opacity:0,scale:1.08,duration:.7,ease:'power2.inOut',onComplete:onDone})}});
                tl.to({},{}); // tiny pause
                tl.to(bar.current,{opacity:1,duration:.4});
                tl.to(fill.current,{width:'100%',duration:2.2,ease:'power1.inOut'});
                tl.add(()=>{if(t1.current){const ch=t1.current.querySelectorAll('.g-char');gsap.set(t1.current,{opacity:1});gsap.fromTo(ch,{opacity:0,y:28,filter:'blur(14px)',scale:.85},{opacity:1,y:0,filter:'blur(0px)',scale:1,stagger:.035,duration:.5,ease:'back.out(1.5)'})}},'-=.6');
                tl.add(()=>{if(t2.current){const ch=t2.current.querySelectorAll('.g-char');gsap.set(t2.current,{opacity:1});gsap.fromTo(ch,{opacity:0,y:28,filter:'blur(14px)',scale:.85},{opacity:1,y:0,filter:'blur(0px)',scale:1,stagger:.035,duration:.5,ease:'back.out(1.5)'})}},'-=.1');
                tl.to([t1.current,t2.current],{opacity:0,y:-18,duration:.45,delay:.9,ease:'power2.in'});
                tl.to(bar.current,{opacity:0,duration:.3},'-=.4');
                tl.add(()=>{if(ttl.current){const ch=ttl.current.querySelectorAll('.g-char');gsap.set(ttl.current,{opacity:1});gsap.fromTo(ch,{opacity:0,y:55,filter:'blur(22px)',scale:1.35},{opacity:1,y:0,filter:'blur(0px)',scale:1,stagger:.09,duration:.85,ease:'expo.out'})}});
                tl.to({},{duration:1.1});
                return()=>tl.kill();
            },[]);
            const chars=t=>t.split('').map((c,i)=><span key={i} className="g-char">{c===' '?'\u00A0':c}</span>);
            return(
                <div ref={box} className="intro-container">
                    <div ref={bar} className="intro-progress-wrap"><div ref={fill} className="intro-progress-fill"></div></div>
                    <div ref={t1} className="intro-text-line">{chars("DON'T JUST EXIST.")}</div>
                    <div ref={t2} className="intro-text-line" style={{marginBottom:48}}>{chars("COMPLETE YOUR 100.")}</div>
                    <div ref={ttl} className="intro-title">{chars("100 BEFORE")}</div>
                </div>
            );
        }

        // ═══════════════════ PROGRESS RING ═══════════════════
        function ProgressRing({done,total=100}){
            const r=78,sw=7,nr=r-sw,circ=nr*2*Math.PI,pct=Math.min(done/total,1)*100,off=circ-(pct/100)*circ;
            return(
                <div className="ring-wrap glass">
                    <svg width={r*2} height={r*2} className="ring-svg">
                        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#00d4ff"/><stop offset="100%" stopColor="#ff6a00"/></linearGradient></defs>
                        <circle className="ring-bg" strokeWidth={sw} fill="transparent" r={nr} cx={r} cy={r}/>
                        <circle className="ring-fill" stroke="url(#rg)" strokeWidth={sw} strokeLinecap="round" fill="transparent" r={nr} cx={r} cy={r}
                            strokeDasharray={circ} strokeDashoffset={off}/>
                    </svg>
                    <div className="ring-center">
                        <div className="ring-num"><AnimNum val={done}/></div>
                        <div className="ring-lbl">of {total} goals</div>
                    </div>
                </div>
            );
        }

        // ═══════════════════ XP SECTION ═══════════════════
        function XPSection({xp}){
            const lv=getLevel(xp),info=xpInLevel(xp);
            return(
                <div className="xp-wrap glass">
                    <div className="lvl-badge">⚡ LEVEL <AnimNum val={lv} dur={.5}/></div>
                    <div style={{marginTop:14}}>
                        <div className="xp-bar-outer"><div className="xp-bar-inner" style={{width:`${info.progress}%`}}></div></div>
                    </div>
                    <div className="xp-labels"><span><AnimNum val={xp}/> XP</span><span>{lv*500} XP</span></div>
                    <div style={{marginTop:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                        <div style={{textAlign:'center'}}><div style={{fontFamily:"'Orbitron'",fontSize:'1.4rem',fontWeight:800,color:'#00d4ff'}}><AnimNum val={lv}/></div><div className="ring-lbl">Level</div></div>
                        <div style={{textAlign:'center'}}><div style={{fontFamily:"'Orbitron'",fontSize:'1.4rem',fontWeight:800,color:'#ff6a00'}}><AnimNum val={xp}/></div><div className="ring-lbl">Total XP</div></div>
                    </div>
                </div>
            );
        }

        // ═══════════════════ STREAK ═══════════════════
        function StreakSection({streak}){
            return(
                <div className="glass" style={{display:'flex',flexDirection:'column',justifyContent:'center'}}>
                    <div className="streak-box">
                        <div className="streak-flame">🔥</div>
                        <div><div className="streak-num"><AnimNum val={streak.cur} dur={.8}/></div><div className="streak-lbl">Day Streak</div></div>
                    </div>
                    <div style={{marginTop:20,display:'flex',gap:6}}>
                        {[...Array(7)].map((_,i)=>(
                            <div key={i} style={{flex:1,height:6,borderRadius:3,background:i<streak.cur?'linear-gradient(90deg,#ff6a00,#ff8c00)':'rgba(255,255,255,0.04)',transition:'background .5s',boxShadow:i<streak.cur?'0 0 8px rgba(255,100,0,0.3)':'none'}}/>
                        ))}
                    </div>
                    <div style={{marginTop:18,fontSize:'.72rem',color:'rgba(255,255,255,0.2)',letterSpacing:'.12em'}}>
                        {streak.cur>=7?'🏆 LEGENDARY STREAK!':streak.cur>=3?'🔥 Keep it going!':'Complete a goal daily to build streaks'}
                    </div>
                </div>
            );
        }

        // ═══════════════════ WEEKLY CHALLENGE ═══════════════════
        function Challenge(){
            const[tl,setTl]=useState({d:0,h:0,m:0,s:0});
            const ref=useReveal(.1);
            const ci=useMemo(()=>Math.floor(Date.now()/(7*864e5))%CHALLENGES.length,[]);
            useEffect(()=>{
                function eow(){const n=new Date(),e=new Date(n);e.setDate(n.getDate()+(7-n.getDay()));e.setHours(23,59,59,999);return e}
                const t=setInterval(()=>{const df=eow()-Date.now();if(df<=0)return;
                    setTl({d:Math.floor(df/864e5),h:Math.floor(df/36e5%24),m:Math.floor(df/6e4%60),s:Math.floor(df/1e3%60)})},1000);
                return()=>clearInterval(t);
            },[]);
            return(
                <div ref={ref} className="challenge-card">
                    <div className="challenge-inner">
                        <div className="challenge-tag">⚡ WEEKLY CHALLENGE</div>
                        <div className="challenge-text">{CHALLENGES[ci]}</div>
                        <div className="cd-row">
                            {[['d','Days'],['h','Hrs'],['m','Min'],['s','Sec']].map(([k,l])=>(
                                <div key={k} className="cd-item"><div className="cd-num">{String(tl[k]).padStart(2,'0')}</div><div className="cd-lbl">{l}</div></div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ═══════════════════ LEADERBOARD ═══════════════════
        function LBoard({goals}){
            const ref=useRef(null);const titleRef=useReveal(.05);
            const done=goals.filter(g=>g.completed).length;
            const all=useMemo(()=>{
                const e=[...FAKE_LB,{name:'You',av:'ME',goals:done}];return e.sort((a,b)=>b.goals-a.goals);
            },[done]);
            useEffect(()=>{
                if(!ref.current)return;
                const obs=new IntersectionObserver(([e])=>{
                    if(e.isIntersecting){const items=ref.current.querySelectorAll('.lb-entry');
                        gsap.to(items,{opacity:1,x:0,stagger:.06,duration:.55,ease:'power3.out'});obs.disconnect()}
                },{threshold:.1});
                obs.observe(ref.current);return()=>obs.disconnect();
            },[]);
            const gradients=['linear-gradient(135deg,#ffd700,#ffaa00)','linear-gradient(135deg,#c0c0c0,#e0e0e0)','linear-gradient(135deg,#cd7f32,#daa520)'];
            return(
                <div>
                    <div ref={titleRef} className="sec-title">LEADERBOARD</div>
                    <div ref={ref} className="lb-list">
                        {all.map((e,i)=>(
                            <div key={e.name} className={`lb-entry ${i===0?'t1':i===1?'t2':i===2?'t3':''} ${e.name==='You'?'me':''}`}>
                                <div className="lb-rank" style={{color:i<3?['#ffd700','#c0c0c0','#cd7f32'][i]:'rgba(255,255,255,0.2)'}}>
                                    {i===0?'👑':`#${i+1}`}
                                </div>
                                <div className="lb-avatar" style={{background:e.name==='You'?'linear-gradient(135deg,#00d4ff,#00ff88)':i<3?gradients[i]:`linear-gradient(135deg,${CAT_CLR[CATS[i%8]]},${CAT_CLR[CATS[(i+3)%8]]})`}}>
                                    {e.av}
                                </div>
                                <div className="lb-name" style={{fontWeight:e.name==='You'?700:400,color:e.name==='You'?'#00d4ff':'inherit'}}>{e.name}</div>
                                <div className="lb-goals">{e.goals}/100</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ═══════════════════ ADD MODAL ═══════════════════
        function AddModal({onClose,onAdd}){
            const[txt,setTxt]=useState('');const[cat,setCat]=useState('Personal');
            const bg=useRef(null),body=useRef(null);
            useEffect(()=>{
                gsap.to(bg.current,{opacity:1,duration:.3});
                gsap.to(body.current,{y:'0%',duration:.5,ease:'back.out(1.1)'});
            },[]);
            const close=()=>{gsap.to(body.current,{y:'100%',duration:.3,ease:'power2.in'});gsap.to(bg.current,{opacity:0,duration:.3,onComplete:onClose})};
            const submit=e=>{e.preventDefault();if(!txt.trim())return;onAdd({text:txt.trim(),category:cat});close()};
            return(
                <div ref={bg} className="modal-bg" onClick={close}>
                    <div ref={body} className="modal-body" onClick={e=>e.stopPropagation()}>
                        <div className="modal-title">ADD NEW GOAL</div>
                        <form onSubmit={submit}>
                            <div className="inp-grp">
                                <label className="inp-lbl">What do you want to accomplish?</label>
                                <input className="inp-field" placeholder="e.g., See the Northern Lights" value={txt} onChange={e=>setTxt(e.target.value)} autoFocus maxLength={120}/>
                            </div>
                            <div className="inp-grp">
                                <label className="inp-lbl">Category</label>
                                <div className="cat-grid">
                                    {CATS.map(c=>(
                                        <button key={c} type="button" className={`cat-btn ${cat===c?'on':''}`}
                                            style={cat===c?{borderColor:CAT_CLR[c],color:CAT_CLR[c],background:`${CAT_CLR[c]}12`}:{}}
                                            onClick={()=>setCat(c)}>{c}</button>
                                    ))}
                                </div>
                            </div>
                            <button type="submit" className="submit-btn" disabled={!txt.trim()}>ADD TO MY 100</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ═══════════════════ ACHIEVEMENT ═══════════════════
        function Achievement({xpGain,onDone}){
            const ref=useRef(null);
            useEffect(()=>{
                const tl=gsap.timeline({onComplete:onDone});
                tl.to(ref.current,{opacity:1,scale:1,y:0,duration:.55,ease:'back.out(1.8)'});
                tl.to(ref.current,{opacity:0,scale:1.15,y:-25,duration:.45,ease:'power2.in',delay:1.6});
                return()=>tl.kill();
            },[]);
            return(
                <div className="ach-overlay">
                    <div ref={ref} className="ach-card">
                        <span className="ach-icon">🏆</span>
                        <div className="ach-title">ACHIEVEMENT UNLOCKED</div>
                        <div className="ach-xp">+{xpGain} XP</div>
                    </div>
                </div>
            );
        }

        // ═══════════════════ GOAL CARD ═══════════════════
        const GoalCard=memo(({goal,idx,onToggle,onDelete})=>{
            const ref=useRef(null);const[hs,setHs]=useState({});
            useEffect(()=>{
                if(!ref.current)return;
                const obs=new IntersectionObserver(([e])=>{
                    if(e.isIntersecting){gsap.to(ref.current,{opacity:1,y:0,duration:.5,ease:'power3.out',delay:Math.min(idx*.04,.4)});obs.disconnect()}
                },{threshold:.1});
                obs.observe(ref.current);return()=>obs.disconnect();
            },[]);
            const mm=e=>{const r=ref.current.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,cx=r.width/2,cy=r.height/2;
                setHs({transform:`perspective(700px) rotateX(${(y-cy)/18}deg) rotateY(${(cx-x)/18}deg) translateY(-3px) scale(1.012)`})};
            const ml=()=>setHs({transform:'perspective(700px) rotateX(0) rotateY(0) translateY(0) scale(1)'});
            return(
                <div ref={ref} className={`goal-card ${goal.completed?'done':''}`} style={{...hs}} onMouseMove={mm} onMouseLeave={ml} onClick={()=>onToggle(goal.id)}>
                    <div className="g-idx">#{String(idx+1).padStart(3,'0')}</div>
                    <div className="g-text">{goal.text}</div>
                    <div className="g-cat" style={{color:CAT_CLR[goal.category],borderColor:`${CAT_CLR[goal.category]}30`,background:`${CAT_CLR[goal.category]}10`,border:`1px solid ${CAT_CLR[goal.category]}30`}}>{goal.category}</div>
                    <div className={`g-check ${goal.completed?'on':''}`}>{goal.completed?'✓':''}</div>
                    <button className="g-del" onClick={e=>{e.stopPropagation();onDelete(goal.id)}}>remove</button>
                </div>
            );
        });

        // ═══════════════════ DASHBOARD ═══════════════════
        function Dashboard({state,setState}){
            const[modal,setModal]=useState(false);
            const[ach,setAch]=useState(null);
            const[filter,setFilter]=useState('All');
            const ref=useRef(null);
            const{goals,xp,streak}=state;
            const done=goals.filter(g=>g.completed).length;

            useEffect(()=>{if(ref.current)gsap.to(ref.current,{opacity:1,duration:.8,ease:'power2.out',delay:.15})},[]);

            const addGoal=useCallback(({text,category})=>{
                if(goals.length>=100)return;
                const ns={...state,goals:[...goals,{id:Date.now().toString(),text,category,completed:false,completedAt:null,createdAt:new Date().toISOString()}]};
                setState(ns);save(ns);
            },[state]);

            const toggleGoal=useCallback(id=>{
                const g=goals.find(x=>x.id===id);if(!g)return;
                const was=g.completed;
                const ng=goals.map(x=>x.id===id?{...x,completed:!x.completed,completedAt:!x.completed?new Date().toISOString():null}:x);
                let nx=xp,ns={...streak};
                if(!was){
                    nx+=100;boom();setAch(100);
                    const today=new Date().toDateString();
                    if(streak.last!==today){
                        const yd=new Date(Date.now()-864e5).toDateString();
                        ns=streak.last===yd?{cur:streak.cur+1,last:today}:{cur:1,last:today};
                        nx+=50;
                    }
                }else{nx=Math.max(0,xp-100)}
                const newState={...state,goals:ng,xp:nx,streak:ns};setState(newState);save(newState);
            },[state]);

            const deleteGoal=useCallback(id=>{
                const g=goals.find(x=>x.id===id);if(!g)return;
                let nx=xp;if(g.completed)nx=Math.max(0,xp-100);
                const ns={...state,goals:goals.filter(x=>x.id!==id),xp:nx};setState(ns);save(ns);
            },[state]);

            const filtered=useMemo(()=>{
                if(filter==='All')return goals;if(filter==='Active')return goals.filter(g=>!g.completed);
                if(filter==='Done')return goals.filter(g=>g.completed);return goals.filter(g=>g.category===filter);
            },[goals,filter]);

            const goalsTitleRef=useReveal(.1);
            const filterRef=useReveal(.15);

            return(
                <div ref={ref} className="dashboard-wrap">
                    <header className="hdr">
                        <div className="hdr-title">100 BEFORE</div>
                        <div className="hdr-right"><div className="lvl-badge">⚡ LVL {getLevel(xp)}</div></div>
                    </header>

                    <div className="stats-row">
                        <ProgressRing done={done}/>
                        <XPSection xp={xp}/>
                        <StreakSection streak={streak}/>
                    </div>

                    <Challenge/>

                    <div ref={goalsTitleRef} className="sec-title">MY GOALS ({goals.length}/100)</div>
                    <div ref={filterRef} className="filter-bar">
                        {['All','Active','Done',...CATS].map(f=>(
                            <button key={f} className={`flt-btn ${filter===f?'on':''}`} onClick={()=>setFilter(f)}>{f}</button>
                        ))}
                    </div>

                    <div className="goals-grid">
                        {filtered.length>0?filtered.map((g,i)=>(
                            <GoalCard key={g.id} goal={g} idx={goals.indexOf(g)} onToggle={toggleGoal} onDelete={deleteGoal}/>
                        )):(
                            <div className="empty-state">
                                {goals.length===0?<>YOUR JOURNEY BEGINS HERE.<br/><span className="empty-sub">Tap + to add your first goal</span></>:<>NO GOALS MATCH THIS FILTER.</>}
                            </div>
                        )}
                    </div>

                    <LBoard goals={goals}/>

                    <div className="footer">100 BEFORE — LIVE FULLY</div>

                    {goals.length<100&&<button className="add-fab" onClick={()=>setModal(true)} aria-label="Add goal">+</button>}
                    {modal&&<AddModal onClose={()=>setModal(false)} onAdd={addGoal}/>}
                    {ach!==null&&<Achievement xpGain={ach} onDone={()=>setAch(null)}/>}
                </div>
            );
        }

        // ═══════════════════ APP ═══════════════════
        function App(){
            const[phase,setPhase]=useState('intro');
            const[state,setState]=useState(()=>load()||defaultState());
            useEffect(()=>{initParticles()},[]);
            return(
                <>
                    {phase==='intro'&&<Intro onDone={()=>setPhase('dash')}/>}
                    {phase==='dash'&&<Dashboard state={state} setState={setState}/>}
                </>
            );
        }

        const root=ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
