<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav Rajagopal | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* ===== CSS RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --charcoal: #1a1a2e;
            --dark-grey: #16213e;
            --mid-grey: #2c2c54;
            --soft-grey: #b0b0b0;
            --light-grey: #e0e0e0;
            --white: #ffffff;
            --accent: #6c63ff;
            --accent-light: #8b83ff;
            --accent-dark: #4a42d4;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--charcoal);
        }

        html::-webkit-scrollbar {
            width: 8px;
        }

        html::-webkit-scrollbar-track {
            background: var(--charcoal);
        }

        html::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        body {
            font-family: var(--font-main);
            background: var(--black);
            color: var(--white);
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
            transition: var(--transition-smooth);
            backdrop-filter: blur(0px);
        }

        .navbar.scrolled {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.7rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--soft-grey);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: var(--transition-smooth);
        }

        .nav-links a:hover {
            color: var(--white);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--white);
        }

        .mobile-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: none;
            padding: 5px;
        }

        .mobile-toggle span {
            width: 25px;
            height: 2px;
            background: var(--white);
            transition: var(--transition-smooth);
            display: block;
        }

        .mobile-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .mobile-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .mobile-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(180deg, #000000 0%, #0a0a1a 40%, #1a1a2e 100%);
            overflow: hidden;
        }

        .hero-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        .hero-grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(108, 99, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 99, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .hero-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glowPulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 0 2rem;
            max-width: 900px;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent-light);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            font-family: var(--font-mono);
        }

        .hero-tag .dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hero-name {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
        }

        .hero-name .gradient-text {
            background: linear-gradient(135deg, var(--white) 0%, var(--accent-light) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: var(--soft-grey);
            max-width: 650px;
            margin: 0 auto 2.5rem;
            font-weight: 300;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
            font-family: var(--font-main);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            background: var(--glass-bg);
            color: var(--white);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
            font-family: var(--font-main);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .hero-scroll {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--soft-grey);
            font-size: 0.75rem;
            animation: scrollBounce 2s ease-in-out infinite;
            cursor: pointer;
            text-decoration: none;
        }

        .hero-scroll .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent), transparent);
        }

        @keyframes scrollBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* ===== SECTION STYLES ===== */
        .section {
            padding: 6rem 2rem;
            position: relative;
        }

        .section-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-tag {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        .section-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            margin: 0 auto;
            border-radius: 2px;
        }

        /* ===== ABOUT SECTION ===== */
        .about-section {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-image-container {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .about-avatar {
            width: 300px;
            height: 300px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(108, 99, 255, 0.3);
        }

        .about-avatar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.1), transparent 30%);
            animation: avatarRotate 4s linear infinite;
        }

        @keyframes avatarRotate {
            100% { transform: rotate(360deg); }
        }

        .about-avatar-inner {
            position: relative;
            z-index: 1;
            width: 280px;
            height: 280px;
            border-radius: 25px;
            background: linear-gradient(135deg, #1a1a2e, #2c2c54);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
        }

        .about-floating-badge {
            position: absolute;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            padding: 0.8rem 1.2rem;
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: badgeFloat 3s ease-in-out infinite;
            white-space: nowrap;
        }

        .about-floating-badge:nth-child(2) {
            top: -10px;
            right: -20px;
            animation-delay: 0s;
        }

        .about-floating-badge:nth-child(3) {
            bottom: 20px;
            left: -30px;
            animation-delay: 1s;
        }

        .about-floating-badge:nth-child(4) {
            bottom: -10px;
            right: 10px;
            animation-delay: 2s;
        }

        @keyframes badgeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .about-text p {
            color: var(--soft-grey);
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-item {
            text-align: center;
            padding: 1.2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        .stat-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-light);
            font-family: var(--font-mono);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--soft-grey);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.3rem;
        }

        /* ===== INTERESTS SECTION ===== */
        .interests-section {
            background: linear-gradient(180deg, #0f0f23 0%, #0a0a1a 100%);
        }

        .interests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .interest-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .interest-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.1), transparent);
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .interest-card:hover::before {
            opacity: 1;
        }

        .interest-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(108, 99, 255, 0.2);
        }

        .interest-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .interest-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .interest-card p {
            font-size: 0.85rem;
            color: var(--soft-grey);
            position: relative;
            line-height: 1.6;
        }

        /* ===== PROJECTS SECTION ===== */
        .projects-section {
            background: linear-gradient(180deg, #0a0a1a 0%, #111128 100%);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition-smooth);
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .project-preview {
            height: 200px;
            background: linear-gradient(135deg, var(--charcoal), var(--dark-grey));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .project-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .project-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
        }

        .status-coming {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .status-progress {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .project-info {
            padding: 1.5rem;
        }

        .project-info h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .project-info p {
            color: var(--soft-grey);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .project-tech {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .tech-tag {
            padding: 0.3rem 0.7rem;
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent-light);
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-light);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .project-link:hover {
            color: var(--white);
            gap: 0.8rem;
        }

        /* ===== SKILLS SECTION ===== */
        .skills-section {
            background: linear-gradient(180deg, #111128 0%, #1a1a2e 100%);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .skill-category {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        .skill-category:hover {
            border-color: rgba(108, 99, 255, 0.3);
        }

        .skill-category h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .skill-item {
            margin-bottom: 1.2rem;
        }

        .skill-item:last-child {
            margin-bottom: 0;
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .skill-name {
            font-weight: 500;
        }

        .skill-percent {
            color: var(--accent-light);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .skill-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 3px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .skill-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: skillShine 2s ease-in-out infinite;
        }

        @keyframes skillShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== GOALS SECTION ===== */
        .goals-section {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1f 100%);
        }

        .goals-timeline {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .goals-timeline::before {
            content: '';
            position: absolute;
            left: 30px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent), transparent);
        }

        .goal-item {
            display: flex;
            gap: 2rem;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .goal-icon-wrapper {
            width: 60px;
            height: 60px;
            min-width: 60px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            z-index: 2;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .goal-content {

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ===== PARTICLE COMPONENT =====
        const Particles = () => {
            const particles = Array.from({ length: 50 }, (_, i) => ({
                id: i,
                left: `${Math.random() * 100}%`,
                animationDuration: `${Math.random() * 10 + 8}s`,
                animationDelay: `${Math.random() * 10}s`,
                size: `${Math.random() * 3 + 1}px`,
                opacity: Math.random() * 0.5 + 0.1,
            }));

            return (
                <div className="hero-particles">
                    {particles.map((p) => (
                        <div
                            key={p.id}
                            className="particle"
                            style={{
                                left: p.left,
                                width: p.size,
                                height: p.size,
                                animationDuration: p.animationDuration,
                                animationDelay: p.animationDelay,
                            }}
                        />
                    ))}
                </div>
            );
        };

        // ===== TYPED TEXT COMPONENT =====
        const TypedText = ({ texts, speed = 100, deleteSpeed = 50, pause = 2000 }) => {
            const [displayText, setDisplayText] = useState('');
            const [textIndex, setTextIndex] = useState(0);
            const [charIndex, setCharIndex] = useState(0);
            const [isDeleting, setIsDeleting] = useState(false);

            useEffect(() => {
                const currentText = texts[textIndex];
                let timeout;

                if (!isDeleting && charIndex < currentText.length) {
                    timeout = setTimeout(() => {
                        setDisplayText(currentText.substring(0, charIndex + 1));
                        setCharIndex(charIndex + 1);
                    }, speed);
                } else if (!isDeleting && charIndex === currentText.length) {
                    timeout = setTimeout(() => setIsDeleting(true), pause);
                } else if (isDeleting && charIndex > 0) {
                    timeout = setTimeout(() => {
                        setDisplayText(currentText.substring(0, charIndex - 1));
                        setCharIndex(charIndex - 1);
                    }, deleteSpeed);
                } else if (isDeleting && charIndex === 0) {
                    setIsDeleting(false);
                    setTextIndex((textIndex + 1) % texts.length);
                }

                return () => clearTimeout(timeout);
            }, [charIndex, isDeleting, textIndex, texts, speed, deleteSpeed, pause]);

            return (
                <span>
                    {displayText}
                    <span className="type-cursor" />
                </span>
            );
        };

        // ===== SCROLL ANIMATION HOOK =====
        const useScrollAnimation = (threshold = 0.15) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    },
                    { threshold }
                );

                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [threshold]);

            return [ref, isVisible];
        };

        // ===== NAVBAR COMPONENT =====
        const Navbar = ({ activeSection }) => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navItems = [

                const el = document.getElementById(id);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth' });

            return (

        };

        // ===== INTERESTS SECTION =====

        // ===== SKILLS SECTION =====
        const SkillsSection = () => {

            const skillCategories = [

                        { name: 'HTML5', level: 85 },
                        { name: 'CSS3', level: 80 },
                        { name: 'JavaScript', level: 70 },
                        { name: 'React', level: 60 },
                    ],
                },
                {
                    title: '⚙️ Backend & Tools',
                    skills: [
                        { name: 'Node.js', level: 50 },
                        { name: 'Server Management', level: 65 },
                        { name: 'Git & GitHub', level: 60 },
                        { name: 'Database Basics', level: 45 },
                    ],
                },
                {
                    title: '🧠 Soft Skills',
                    skills: [
                        { name: 'Problem Solving', level: 80 },
                        { name: 'Creative Thinking', level: 85 },
                        { name: 'Self-Learning', level: 90 },
                        { name: 'Team Collaboration', level: 75 },
                    ],
                },
                {
                    title: '🎮 Other Skills',
                    skills: [
                        { name: 'Minecraft Server Admin', level: 85 },
                        { name: 'Plugin Configuration', level: 70 },
                        { name: 'UI/UX Design Sense', level: 65 },
                        { name: 'Content Creation', level: 55 },
                    ],
                },
            ];

            return (
                <section className="section skills-section" id="skills">
                    <div className="section-container" ref={ref}>
                        <div className={`section-header fade-in ${isVisible ? 'visible' : ''}`}>
                            <span className="section-tag">// Skills</span>
                            <h2 className="section-title">My Toolkit</h2>
                            <div className="section-line" />
                        </div>
                        <div className="skills-grid">
                            {skillCategories.map((cat, index) => (
                                <div
                                    key={index}
                                    className={`skill-category fade-in ${isVisible ? 'visible' : ''}`}
                                    style={{ transitionDelay: `${index * 0.15}s` }}
                                >
                                    <h3>{cat.title}</h3>
                                    {cat.skills.map((skill, i) => (
                                        <SkillBar
                                            key={i}
                                            name={skill.name}
                                            level={skill.level}
                                            isVisible={isVisible}
                                        />
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ===== GOALS SECTION =====
        const GoalsSection = () => {
            const [ref, isVisible] = useScrollAnimation();

            const goals = [
                {
                    icon: '🚀',
                    title: 'Master Programming',
                    desc: 'Dive deep into Python, TypeScript, and learn full-stack development to build powerful web applications and tools.',
                },
                {
                    icon: '🎨',
                    title: 'Build Creative Projects',
                    desc: 'Launch meaningful projects that solve real problems — from apps and websites to Minecraft servers and community tools.',
                },
                {
                    icon: '🌍',
                    title: 'Travel & Explore',
                    desc: 'Visit Japan, explore new cultures, attend tech conferences, and experience the world beyond the screen.',
                },
                {
                    icon: '📈',
                    title: 'Continuous Growth',
                    desc: 'Stay disciplined, build strong habits, keep learning, and become someone my parents and I can truly be proud of.',
                },
                {
                    icon: '🤝',
                    title: 'Give Back',
                    desc: 'Share knowledge, mentor others, contribute to open source, and build communities that inspire young developers.',
                },
            ];

            return (
                <section className="section goals-section" id="goals">
                    <div className="section-container" ref={ref}>
                        <div className={`section-header fade-in ${isVisible ? 'visible' : ''}`}>
                            <span className="section-tag">// Goals & Vision</span>
                            <h2 className="section-title">Where I'm Headed</h2>
                            <div className="section-line" />
                        </div>
                        <div className="goals-timeline">
                            {goals.map((goal, index) => (
                                <div
                                    key={index}
                                    className={`goal-item fade-in ${isVisible ? 'visible' : ''}`}
                                    style={{ transitionDelay: `${index * 0.15}s` }}
                                >
                                    <div className="goal-icon-wrapper">{goal.icon}</div>
                                    <div className="goal-content">
                                        <h3>{goal.title}</h3>
                                        <p>{goal.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ===== CONTACT SECTION =====
        const ContactSection = () => {
            const [ref, isVisible] = useScrollAnimation();
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });
            const [formMessage, setFormMessage] = useState(null);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.email || !formData.message) {
                    setFormMessage({ type: 'error', text: 'Please fill in all fields.' });
                    return;
                }
                setFormMessage({ type: 'success', text: "Thanks for reaching out! I'll get back to you soon. 🚀" });
                setFormData({ name: '', email: '', message: '' });
                setTimeout(() => setFormMessage(null), 5000);
            };

            return (
                <section className="section contact-section" id="contact">
                    <div className="section-container" ref={ref}>
                        <div className={`section-header fade-in ${isVisible ? 'visible' : ''}`}>
                            <span className="section-tag">// Contact</span>
                            <h2 className="section-title">Let's Connect</h2>
                            <div className="section-line" />
                        </div>
                        <div className="contact-grid">
                            <div className={`contact-info fade-in-left ${isVisible ? 'visible' : ''}`}>
                                <h3>Got a question or want to work together?</h3>
                                <p>
                                    I'm always excited to connect with like-minded people, collaborate on
                                    projects, or just chat about tech, anime, and everything in between.
                                    Don't hesitate to reach out!
                                </p>
                                <div className="contact-details">
                                    <div className="contact-detail-item">
                                        <i className="fas fa-map-marker-alt" />
                                        <span>India</span>
                                    </div>
                                    <div className="contact-detail-item">
                                        <i className="fas fa-envelope" />
                                        <span>pranav@example.com</span>
                                    </div>
                                    <div className="contact-detail-item">
                                        <i className="fas fa-clock" />
                                        <span>Usually responds within 24 hours</span>
                                    </div>
                                </div>
                            </div>
                            <div className={`fade-in-right ${isVisible ? 'visible' : ''}`}>
                                <form className="contact-form" onSubmit={handleSubmit}>
                                    <div className="form-group">
                                        <label>Your Name</label>
                                        <input
                                            type="text"
                                            name="name"
                                            placeholder="John Doe"
                                            value={formData.name}
                                            onChange={handleChange}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Your Email</label>
                                        <input
                                            type="email"
                                            name="email"
                                            placeholder="john@example.com"
                                            value={formData.email}
                                            onChange={handleChange}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Your Message</label>
                                        <textarea
                                            name="message"
                                            placeholder="Hey Pranav, I'd love to..."
                                            value={formData.message}
                                            onChange={handleChange}
                                        />
                                    </div>
                                    <button type="submit" className="form-submit">
                                        <i className="fas fa-paper-plane" /> Send Message
                                    </button>
                                    {formMessage && (
                                        <div className={`form-message ${formMessage.type}`}>
                                            {formMessage.text}
                                        </div>
                                    )}
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ===== FOOTER COMPONENT =====
        const Footer = () => {
            return (
                <footer className="footer">
                    <div className="footer-content">
                        <p className="footer-text">
                            © {new Date().getFullYear()} Pranav Rajagopal. Built with 💜 and React.
                        </p>
                        <div className="footer-socials">
                            <a href="#" className="social-icon" title="GitHub">
                                <i className="fab fa-github" />
                            </a>
                            <a href="#" className="social-icon" title="Discord">
                                <i className="fab fa-discord" />
                            </a>
                            <a href="#" className="social-icon" title="Twitter">
                                <i className="fab fa-twitter" />
                            </a>
                            <a href="#" className="social-icon" title="Instagram">
                                <i className="fab fa-instagram" />
                            </a>
                        </div>
                    </div>
                </footer>
            );
        };

        // ===== MAIN APP COMPONENT =====
        const App = () => {
            const [activeSection, setActiveSection] = useState('');

            useEffect(() => {
                const sections = ['about', 'interests', 'projects', 'skills', 'goals', 'contact'];
                const observers = [];

                sections.forEach((id) => {
                    const el = document.getElementById(id);
                    if (el) {
                        const observer = new IntersectionObserver(
                            ([entry]) => {
                                if (entry.isIntersecting) {
                                    setActiveSection(id);
                                }
                            },
                            { threshold: 0.3, rootMargin: '-80px 0px 0px 0px' }
                        );
                        observer.observe(el);
                        observers.push(observer);
                    }
                });

                return () => observers.forEach((o) => o.disconnect());
            }, []);

            return (
                <>
                    <Navbar activeSection={activeSection} />
                    <HeroSection />
                    <AboutSection />
                    <InterestsSection />
                    <ProjectsSection />
                    <SkillsSection />
                    <GoalsSection />
                    <ContactSection />
                    <Footer />
                </>
            );
        };

        // ===== RENDER =====
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
  </html>
