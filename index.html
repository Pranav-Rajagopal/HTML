<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Before</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;700&family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="void"]{
--bg-0:#000;--bg-1:#050505;--bg-2:#0a0a0a;--bg-3:#111;--bg-4:#1a1a1a;
--card:rgba(255,255,255,.03);--card-b:rgba(255,255,255,.06);--card-h:rgba(255,255,255,.08);
--text-100:#fff;--text-80:rgba(255,255,255,.8);--text-60:rgba(255,255,255,.6);
--text-40:rgba(255,255,255,.4);--text-20:rgba(255,255,255,.2);--text-10:rgba(255,255,255,.1);
--glow:rgba(255,255,255,.12);--glow-s:rgba(255,255,255,.06);
--accent:#fff;--accent-dim:#888;--blur:blur(40px);--blur-s:blur(20px)
}
[data-theme="slate"]{
--bg-0:#0f0f12;--bg-1:#14141a;--bg-2:#1a1a22;--bg-3:#22222c;--bg-4:#2a2a36;
--card:rgba(255,255,255,.04);--card-b:rgba(255,255,255,.07);--card-h:rgba(255,255,255,.1)
}
[data-theme="frost"]{
--bg-0:#e8e8ec;--bg-1:#f0f0f4;--bg-2:#f5f5f8;--bg-3:#fafafe;--bg-4:#fff;
--card:rgba(0,0,0,.04);--card-b:rgba(0,0,0,.08);--card-h:rgba(0,0,0,.06);
--text-100:#111;--text-80:rgba(0,0,0,.8);--text-60:rgba(0,0,0,.55);
--text-40:rgba(0,0,0,.35);--text-20:rgba(0,0,0,.15);--text-10:rgba(0,0,0,.08);
--glow:rgba(0,0,0,.08);--glow-s:rgba(0,0,0,.04);--accent:#000;--accent-dim:#666
}
[data-theme="solar"]{
--bg-0:#0d0c0a;--bg-1:#141310;--bg-2:#1c1b17;--bg-3:#24231e;--bg-4:#2e2d27;
--card:rgba(255,245,230,.04);--card-b:rgba(255,245,230,.07);--card-h:rgba(255,245,230,.1);
--text-100:#f5f0e8;--text-80:rgba(245,240,232,.8);--text-60:rgba(245,240,232,.55);
--text-40:rgba(245,240,232,.35);--text-20:rgba(245,240,232,.15);--text-10:rgba(245,240,232,.08);
--glow:rgba(255,245,230,.1);--accent:#f5f0e8;--accent-dim:#998
}
[data-theme="matte"]{
--bg-0:#161616;--bg-1:#1c1c1c;--bg-2:#222;--bg-3:#2a2a2a;--bg-4:#333;
--card:rgba(255,255,255,.035);--card-b:rgba(255,255,255,.06);--card-h:rgba(255,255,255,.08)
}
html{scroll-behavior:smooth}
body{width:100%;min-height:100vh;overflow-x:hidden;background:var(--bg-0);color:var(--text-100);
font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .6s,color .6s}
#root{min-height:100vh;position:relative}
canvas.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

.intro-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
background:#000;transition:opacity 1.4s cubic-bezier(.4,0,.2,1);overflow:hidden}
.intro-screen.out{opacity:0;pointer-events:none}
.intro-center{text-align:center;position:relative;z-index:2}
.intro-line{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.4rem,4.5vw,3rem);font-weight:300;
letter-spacing:-.02em;min-height:1.4em;display:flex;align-items:center;justify-content:center;
flex-wrap:wrap;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;width:max-content}
.intro-line .ch{display:inline-block;opacity:0;filter:blur(18px);transform:translateY(32px);
transition:opacity .8s,filter .9s,transform .8s;transition-timing-function:cubic-bezier(.25,.46,.45,.94)}
.intro-line.vis .ch{opacity:1;filter:blur(0);transform:translateY(0)}

.morph-100{font-size:clamp(5rem,18vw,12rem);font-weight:700;position:relative;display:inline-block;
transition:text-shadow 1.2s;letter-spacing:-.02em;line-height:1;color:#fff}
.morph-100.locked{text-shadow:0 0 60px rgba(255,255,255,.5),0 0 120px rgba(255,255,255,.2),0 0 200px rgba(255,255,255,.1);
font-family:'Space Grotesk',sans-serif!important}
.ray{position:absolute;top:50%;left:50%;width:2px;
background:linear-gradient(to bottom,rgba(255,255,255,.35),transparent);
transform-origin:top center;opacity:0;transition:opacity 1.8s ease}
.ray.on{opacity:1}

.glitch-before{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,7vw,5rem);font-weight:700;
letter-spacing:.3em;position:relative;display:inline-block;margin-top:8px;color:#fff}
.glitch-before.active{animation:glitchText .7s steps(1) forwards}
.glitch-before .echo{position:absolute;inset:0;opacity:0;filter:blur(10px);transition:opacity .6s}
.glitch-before.stable{text-shadow:0 0 40px rgba(255,255,255,.35),0 0 80px rgba(255,255,255,.12)}
.glitch-before.stable .echo{opacity:.2}

@keyframes glitchText{
0%{clip-path:inset(0);transform:translate(0);text-shadow:3px 0 rgba(255,100,100,.4),-3px 0 rgba(100,100,255,.4)}
10%{clip-path:inset(40% 0 20% 0);transform:translate(-5px,2px);text-shadow:5px 0 rgba(255,80,80,.5),-5px 0 rgba(80,80,255,.5)}
20%{clip-path:inset(10% 0 60% 0);transform:translate(4px,-1px);text-shadow:-4px 0 rgba(255,120,120,.3),4px 0 rgba(120,120,255,.3)}
30%{clip-path:inset(0);transform:translate(0);text-shadow:none}
45%{clip-path:inset(60% 0 10% 0);transform:translate(-3px,1px) scaleX(1.03);text-shadow:3px 0 rgba(255,100,100,.4),-3px 0 rgba(100,100,255,.4)}
55%{clip-path:inset(0);transform:translate(0) scale(1.06);text-shadow:none}
65%{clip-path:inset(20% 0 40% 0);transform:translate(3px,-2px);text-shadow:-4px 0 rgba(255,80,80,.3),4px 0 rgba(80,80,255,.3)}
75%,100%{clip-path:inset(0);transform:translate(0) scale(1);text-shadow:0 0 40px rgba(255,255,255,.3)}
}

.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.02) 2px,rgba(255,255,255,.02) 4px);
pointer-events:none;z-index:101;opacity:0;transition:opacity .6s}
.scanlines.vis{opacity:1}

.skip-btn{position:fixed;bottom:32px;right:32px;z-index:200;background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-family:'Inter',sans-serif;
font-size:12px;padding:10px 24px;border-radius:100px;cursor:pointer;transition:all .3s;
backdrop-filter:blur(10px);letter-spacing:.05em}
.skip-btn:hover{background:rgba(255,255,255,.12);color:#fff;transform:scale(1.05)}

.login-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
transition:opacity .8s,transform .8s}
.login-screen.out{opacity:0;pointer-events:none;transform:scale(1.03)}
.login-wrap{display:flex;width:min(880px,92vw);min-height:460px;border-radius:24px;overflow:hidden;
background:var(--card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
border:1px solid var(--card-b);box-shadow:0 8px 60px rgba(0,0,0,.5),0 0 80px var(--glow-s);
position:relative;animation:loginIn .8s cubic-bezier(.34,1.56,.64,1)}
@keyframes loginIn{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:none}}
.login-left{flex:1;display:flex;align-items:center;justify-content:center;position:relative;
background:linear-gradient(135deg,rgba(255,255,255,.02),rgba(255,255,255,.005));overflow:hidden;min-height:200px}
.login-left-100{font-family:'Space Grotesk',sans-serif;font-size:clamp(6rem,12vw,10rem);font-weight:700;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:2;
filter:drop-shadow(0 0 40px var(--glow));animation:float100 6s ease-in-out infinite}
@keyframes float100{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-left::after{content:'';position:absolute;width:200%;height:200%;
background:radial-gradient(circle,var(--glow) 0%,transparent 60%);animation:leftGlow 8s ease infinite;opacity:.5}
@keyframes leftGlow{0%,100%{transform:translate(-30%,-30%)}50%{transform:translate(-20%,-20%)}}
.login-before-vert{position:absolute;right:20px;top:50%;transform:translateY(-50%);
writing-mode:vertical-rl;font-family:'Space Grotesk',sans-serif;font-size:clamp(1rem,2vw,1.5rem);
font-weight:700;letter-spacing:.4em;
background:linear-gradient(180deg,var(--text-40),var(--text-10));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.login-right{flex:1;padding:48px 40px;display:flex;flex-direction:column;justify-content:center}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:600;margin-bottom:6px;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:13px;color:var(--text-40);margin-bottom:32px}
.input-g{position:relative;margin-bottom:22px}
.input-g input{width:100%;padding:16px 18px 8px;background:var(--card);border:1px solid var(--card-b);
border-radius:10px;color:var(--text-100);font-size:15px;font-family:'Inter',sans-serif;outline:none;
transition:all .4s cubic-bezier(.4,0,.2,1)}
.input-g input:focus{border-color:rgba(255,255,255,.25);background:var(--card-h);
box-shadow:0 0 0 3px var(--glow-s),0 0 30px var(--glow-s)}
.input-g input.err{border-color:rgba(180,60,60,.5);box-shadow:0 0 20px rgba(180,60,60,.1)}
.input-g label{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:14px;
color:var(--text-40);pointer-events:none;transition:all .3s cubic-bezier(.4,0,.2,1)}
.input-g input:focus+label,.input-g input:not(:placeholder-shown)+label{
top:10px;transform:translateY(0);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-60)}
.focus-line{position:absolute;bottom:0;left:50%;width:0;height:2px;
background:linear-gradient(90deg,transparent,var(--text-40),transparent);transition:all .4s;border-radius:2px}
.input-g input:focus~.focus-line{left:10%;width:80%}
.btn-mag{width:100%;padding:16px;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));
border:1px solid var(--card-b);border-radius:10px;color:var(--text-100);font-size:15px;font-weight:500;
font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);
position:relative;overflow:hidden;margin-top:8px}
.btn-mag:hover{transform:scale(1.02) translateY(-1px);box-shadow:0 8px 30px var(--glow-s);
background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.08));border-color:var(--text-20)}
.btn-mag:active{transform:scale(.98)}
.btn-mag .shine{position:absolute;top:0;left:-100%;width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shine 4s infinite}
@keyframes shine{0%{left:-100%}40%,100%{left:100%}}
.ripple-e{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);
transform:scale(0);animation:ripple .6s ease-out forwards;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}
.login-wrap.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-6px)}30%,60%{transform:translateX(6px)}}
.login-wrap.glow-success{box-shadow:0 0 80px rgba(255,255,255,.15),0 0 160px rgba(255,255,255,.05)!important;
border-color:rgba(255,255,255,.2)!important}
.light-streak{position:absolute;width:1px;height:80px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.08),transparent);
animation:streak 5s linear infinite;opacity:.5}
@keyframes streak{0%{transform:translateY(-100px);opacity:0}20%{opacity:.5}80%{opacity:.5}100%{transform:translateY(500px);opacity:0}}

.dashboard{position:relative;z-index:1;min-height:100vh;transition:opacity .6s}
.dash-header{position:sticky;top:0;z-index:30;padding:14px 24px;display:flex;align-items:center;
justify-content:space-between;background:rgba(0,0,0,.6);backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--card-b);transition:background .5s}
[data-theme="frost"] .dash-header{background:rgba(255,255,255,.8)}
.dash-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.06em;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;align-items:center;gap:12px}
.avatar-sm{width:32px;height:32px;border-radius:50%;background:var(--card-h);border:1px solid var(--card-b);
display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;
overflow:hidden;transition:all .3s;color:var(--text-60)}
.avatar-sm:hover{border-color:var(--text-20)}
.avatar-sm img{width:100%;height:100%;object-fit:cover}
.btn-sm{background:none;border:1px solid var(--card-b);color:var(--text-40);font-size:11px;
padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.btn-sm:hover{border-color:var(--text-20);color:var(--text-100)}
.dash-body{max-width:1100px;margin:0 auto;padding:32px 20px 120px}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-c{background:var(--card);backdrop-filter:var(--blur-s);border:1px solid var(--card-b);
border-radius:16px;padding:24px 20px;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.stat-c::before{content:'';position:absolute;inset:-1px;border-radius:inherit;
background:linear-gradient(135deg,rgba(255,255,255,.05),transparent 50%);pointer-events:none}
.stat-c:hover{background:var(--card-h);border-color:var(--text-20);transform:translateY(-2px);
box-shadow:0 8px 30px rgba(0,0,0,.3)}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-40);margin-bottom:8px}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.stat-sub{font-size:11px;color:var(--text-20);margin-top:4px}

.progress-area{display:flex;gap:32px;margin-bottom:36px;flex-wrap:wrap;align-items:center;justify-content:center}
.ring-w{position:relative;width:170px;height:170px;flex-shrink:0}
.ring-w svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--card-b);stroke-width:6}
.ring-fg{fill:none;stroke:url(#rg);stroke-width:6;stroke-linecap:round;
transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 8px var(--glow))}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;color:var(--text-100)}
.ring-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-40);margin-top:2px}
.ring-glow{position:absolute;inset:20px;border-radius:50%;background:radial-gradient(circle,var(--glow-s),transparent 70%);
animation:ringPulse 3s ease-in-out infinite}
@keyframes ringPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.05)}}
.xp-area{flex:1;min-width:250px}
.xp-lv{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;margin-bottom:8px;color:var(--text-80)}
.xp-lv span{font-size:.75rem;color:var(--text-40);font-weight:400;margin-left:8px}
.xp-track{width:100%;height:8px;background:var(--card-b);border-radius:100px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--text-20),var(--text-60));border-radius:100px;
transition:width 1s cubic-bezier(.4,0,.2,1);position:relative}
.xp-fill::after{content:'';position:absolute;right:0;top:-2px;bottom:-2px;width:16px;
background:var(--text-80);border-radius:100px;filter:blur(4px);opacity:.6}
.xp-sub{font-size:11px;color:var(--text-20);margin-top:6px}
.streak-b{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--card-b);
border-radius:100px;padding:8px 18px;font-size:13px;margin-top:14px;color:var(--text-60)}
.flame-icon{display:inline-block;animation:flame 1s ease infinite}
@keyframes flame{0%,100%{transform:scale(1) rotate(-3deg);filter:brightness(1)}
50%{transform:scale(1.2) rotate(3deg);filter:brightness(1.4)}}

.wc-card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:24px;
margin-bottom:32px;position:relative;overflow:hidden;backdrop-filter:var(--blur-s)}
.wc-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;
background:linear-gradient(135deg,rgba(255,255,255,.05),transparent 40%);pointer-events:none}
.wc-tag{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-40);margin-bottom:10px;
display:flex;align-items:center;gap:6px}
.wc-goal{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:500;margin-bottom:16px;color:var(--text-80)}
.cd-row{display:flex;gap:10px;flex-wrap:wrap}
.cd-u{text-align:center;background:var(--card);border:1px solid var(--card-b);border-radius:10px;padding:10px 14px;min-width:58px}
.cd-n{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text-100)}
.cd-l{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-20);margin-top:3px}

.badges-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.badge{width:52px;height:52px;border-radius:50%;background:var(--card);border:1px solid var(--card-b);
display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .4s;position:relative;cursor:default}
.badge.locked{opacity:.25;filter:grayscale(1)}
.badge:not(.locked):hover{transform:scale(1.15);box-shadow:0 0 20px var(--glow);border-color:var(--text-20)}
.badge-tip{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:9px;
color:var(--text-40);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.badge:hover .badge-tip{opacity:1}
.badge-pop{animation:badgePop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgePop{0%{transform:scale(0) rotate(-180deg)}100%{transform:scale(1) rotate(0)}}

.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:600;
background:linear-gradient(135deg,var(--text-100),var(--accent-dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.filter-row{display:flex;gap:6px}
.filter-btn{background:transparent;border:1px solid var(--card-b);color:var(--text-40);font-size:11px;
padding:5px 14px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.filter-btn.act{background:var(--card-h);border-color:var(--text-20);color:var(--text-100)}
.add-btn{background:var(--card);border:1px solid var(--card-b);color:var(--text-60);font-size:13px;
padding:8px 20px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;
display:flex;align-items:center;gap:6px}
.add-btn:hover{background:var(--card-h);color:var(--text-100);border-color:var(--text-20)}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.goal-card{background:var(--card);backdrop-filter:var(--blur-s);border:1px solid var(--card-b);
border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px;
transition:all .4s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;overflow:hidden;
animation:cardSlide .5s cubic-bezier(.4,0,.2,1) forwards;opacity:0}
.goal-card::before{content:'';position:absolute;inset:-1px;border-radius:inherit;
background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 50%);pointer-events:none}
.goal-card:hover{background:var(--card-h);border-color:var(--text-20);
box-shadow:0 8px 30px rgba(0,0,0,.3),0 0 30px var(--glow-s)}
.goal-card.done .goal-text{text-decoration:line-through;opacity:.35}
@keyframes cardSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

<body>
<div id="root"></div>
<svg style="position:absolute;width:0;height:0">
<defs>
<linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#fff"/>
<stop offset="100%" stop-color="#666"/>
</linearGradient>
</defs>
</svg>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo,createContext,useContext,memo}=React;

const STORE_KEY='100b_v2';
const XP_GOAL=100;
const XP_LV=500;
const XP_DAILY=10;
const MORPH_FONTS=[
  'Georgia, serif',
  '"Courier New", monospace',
  'Impact, sans-serif',
  '"Oswald", sans-serif',
  '"Playfair Display", serif',
  '"JetBrains Mono", monospace',
  '"Bebas Neue", sans-serif',
  '"Anton", sans-serif',
  '"Space Grotesk", sans-serif'
];
const THEMES=[
  {id:'void',name:'Void',colors:['#000','#111','#222']},
  {id:'slate',name:'Slate',colors:['#0f0f12','#1a1a22','#2a2a36']},
  {id:'frost',name:'Frost',colors:['#e8e8ec','#f0f0f4','#fff']},
  {id:'solar',name:'Solar',colors:['#0d0c0a','#1c1b17','#2e2d27']},
  {id:'matte',name:'Matte',colors:['#161616','#222','#333']}
];
const BADGES=[
  {id:'first',icon:'⭐',name:'First Step',desc:'Complete 1 goal',req:d=>d.goals.filter(g=>g.done).length>=1},
  {id:'ten',icon:'🔥',name:'On Fire',desc:'Complete 10 goals',req:d=>d.goals.filter(g=>g.done).length>=10},
  {id:'quarter',icon:'💎',name:'Quarter',desc:'Complete 25 goals',req:d=>d.goals.filter(g=>g.done).length>=25},
  {id:'half',icon:'🏆',name:'Halfway',desc:'Complete 50 goals',req:d=>d.goals.filter(g=>g.done).length>=50},
  {id:'all',icon:'👑',name:'Legend',desc:'Complete 100 goals',req:d=>d.goals.filter(g=>g.done).length>=100},
  {id:'s7',icon:'⚡',name:'Dedicated',desc:'7-day streak',req:d=>d.streak>=7},
  {id:'s30',icon:'🌟',name:'Unstoppable',desc:'30-day streak',req:d=>d.streak>=30},
  {id:'lv5',icon:'🎯',name:'High Level',desc:'Reach level 5',req:d=>Math.floor(d.xp/XP_LV)>=5}
];

/* === Storage helpers === */
function loadStore(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw) return null;
    const d=JSON.parse(raw);
    return{
      username:d.username||'User',
      goals:Array.isArray(d.goals)?d.goals:[],
      xp:d.xp||0,
      streak:d.streak||1,
      lastActive:d.lastActive||new Date().toISOString().split('T')[0],
      avatar:d.avatar||null,
      weeklyGoalIdx:d.weeklyGoalIdx!=null?d.weeklyGoalIdx:null,
      weeklyEnd:d.weeklyEnd||new Date(Date.now()+7*864e5).toISOString(),
      theme:d.theme||'void',
      motionIntensity:d.motionIntensity!=null?d.motionIntensity:1,
      bgEnabled:d.bgEnabled!=null?d.bgEnabled:true,
      unlockedBadges:Array.isArray(d.unlockedBadges)?d.unlockedBadges:[],
      gsFilter:!!d.gsFilter
    };
  }catch(e){return null}
}
function saveStore(d){try{localStorage.setItem(STORE_KEY,JSON.stringify(d))}catch(e){}}

function createData(username){
  return{
    username,goals:[],xp:0,streak:1,
    lastActive:new Date().toISOString().split('T')[0],
    avatar:null,weeklyGoalIdx:null,
    weeklyEnd:new Date(Date.now()+7*864e5).toISOString(),
    theme:'void',motionIntensity:1,bgEnabled:true,
    unlockedBadges:[],gsFilter:false
  };
}

function refreshStreak(d){
  const today=new Date().toISOString().split('T')[0];
  if(d.lastActive===today) return d;
  const yesterday=new Date(Date.now()-864e5).toISOString().split('T')[0];
  return{...d,streak:d.lastActive===yesterday?d.streak+1:1,lastActive:today,xp:d.xp+XP_DAILY};
}

/* === Theme Context === */
const ThemeCtx=createContext({theme:'void',setTheme:()=>{}});

function ThemeProvider({initial,children}){
  const[theme,setTheme]=useState(initial||'void');
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme)},[theme]);
  return <ThemeCtx.Provider value={{theme,setTheme}}>{children}</ThemeCtx.Provider>;
}

/* === Hooks === */
function useAnimNum(target,duration=800){
  const[val,setVal]=useState(target);
  const prevRef=useRef(target);
  const rafRef=useRef(0);
  useEffect(()=>{
    const from=prevRef.current;
    const start=performance.now();
    function tick(now){
      const p=Math.min((now-start)/duration,1);
      const ease=1-Math.pow(1-p,3);
      setVal(Math.round(from+(target-from)*ease));
      if(p<1) rafRef.current=requestAnimationFrame(tick);
      else prevRef.current=target;
    }
    rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[target,duration]);
  return val;
}

/* === Particle Canvas === */
const ParticleCanvas=memo(function ParticleCanvas({intensity,isDark}){
  const canvasRef=useRef(null);
  const ptsRef=useRef([]);
  const mouseRef=useRef({x:-9e3,y:-9e3});
  const rafRef=useRef(0);
  const int=intensity||1;
  const dark=isDark!==false;

  useEffect(()=>{
    const c=canvasRef.current;
    if(!c) return;
    const ctx=c.getContext('2d');
    function resize(){c.width=innerWidth;c.height=innerHeight}
    resize();
    const count=Math.min(Math.floor(55*int),90);
    ptsRef.current=Array.from({length:count},()=>({
      x:Math.random()*c.width,y:Math.random()*c.height,
      vx:(Math.random()-.5)*.3*int,vy:(Math.random()-.5)*.3*int,
      sz:Math.random()*1.4+.4,op:Math.random()*.3+.06
    }));
    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      const col=dark?'255,255,255':'0,0,0';
      const ps=ptsRef.current;
      for(const p of ps){
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
        if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
        const dx=mouseRef.current.x-p.x,dy=mouseRef.current.y-p.y;
        if(dx*dx+dy*dy<10000){p.x-=dx*.003;p.y-=dy*.003}
        ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
        ctx.fillStyle=`rgba(${col},${p.op})`;ctx.fill();
      }
      for(let i=0;i<ps.length;i++){
        for(let j=i+1;j<ps.length;j++){
          const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d2=dx*dx+dy*dy;
          if(d2<14000){
            ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);
            ctx.strokeStyle=`rgba(${col},${.04*(1-d2/14000)})`;ctx.lineWidth=.5;ctx.stroke();
          }
        }
      }
      rafRef.current=requestAnimationFrame(draw);
    }
    rafRef.current=requestAnimationFrame(draw);
    const mm=e=>{mouseRef.current={x:e.clientX,y:e.clientY}};
    const ml=()=>{mouseRef.current={x:-9e3,y:-9e3}};
    addEventListener('resize',resize);addEventListener('mousemove',mm);addEventListener('mouseleave',ml);
    return()=>{cancelAnimationFrame(rafRef.current);removeEventListener('resize',resize);
    removeEventListener('mousemove',mm);removeEventListener('mouseleave',ml)};
  },[int,dark]);
  return <canvas ref={canvasRef} className="bg-canvas"/>;
});

/* === Solar System BG === */
const SolarBG=memo(function SolarBG({intensity,isDark}){
  const canvasRef=useRef(null);
  const rafRef=useRef(0);
  const int=intensity||1;
  const dark=isDark!==false;
  useEffect(()=>{
    const c=canvasRef.current;
    if(!c) return;
    const ctx=c.getContext('2d');
    function resize(){c.width=innerWidth;c.height=innerHeight}
    resize();
    const orbits=[
      {r:80,spd:.0003*int,a:0,sz:3},
      {r:140,spd:.0002*int,a:1,sz:2.5},
      {r:210,spd:.00015*int,a:2.1,sz:2},
      {r:300,spd:.0001*int,a:3.5,sz:1.8},
      {r:400,spd:.00007*int,a:5,sz:1.5}
    ];
    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      const cx=c.width/2,cy=c.height/2;
      const col=dark?'255,255,255':'0,0,0';
      const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,18);
      grd.addColorStop(0,`rgba(${col},.06)`);grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);ctx.fill();
      for(const o of orbits){
        ctx.beginPath();ctx.arc(cx,cy,o.r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(${col},.035)`;ctx.lineWidth=.5;ctx.stroke();
        o.a+=o.spd;
        const px=cx+Math.cos(o.a)*o.r,py=cy+Math.sin(o.a)*o.r;
        ctx.beginPath();ctx.arc(px,py,o.sz,0,Math.PI*2);
        ctx.fillStyle=`rgba(${col},.12)`;ctx.fill();
      }
      rafRef.current=requestAnimationFrame(draw);
    }
    rafRef.current=requestAnimationFrame(draw);
    addEventListener('resize',resize);
    return()=>{cancelAnimationFrame(rafRef.current);removeEventListener('resize',resize)};
  },[int,dark]);
  return <canvas ref={canvasRef} className="bg-canvas"/>;
});

/* === AnimText for Intro === */
function AnimText({text,visible,delay,rate}){
  const d=delay||0;
  const r=rate||50;
  return(
    <div className={`intro-line ${visible?'vis':''}`}>
      {text.split('').map((ch,i)=>(
        <span key={i} className="ch" style={{transitionDelay:`${d+i*r}ms`}}>
          {ch===' '?'\u00A0':ch}
        </span>
      ))}
    </div>
  );
}

/* === INTRO SEQUENCE === */
function IntroSequence({onDone}){
  const[phase,setPhase]=useState(-1);
  const[lineVis,setLineVis]=useState([false,false,false,false]);
  const[morphFont,setMorphFont]=useState(MORPH_FONTS[0]);
  const[locked,setLocked]=useState(false);
  const[glitchOn,setGlitchOn]=useState(false);
  const[glitchStable,setGlitchStable]=useState(false);
  const[showScanlines,setShowScanlines]=useState(false);
  const[raysOn,setRaysOn]=useState(false);
  const timersRef=useRef([]);
  const morphRef=useRef(null);

  useEffect(()=>{
    const t=(fn,ms)=>{const id=setTimeout(fn,ms);timersRef.current.push(id);return id};
    t(()=>{setPhase(0);setLineVis(p=>[true,p[1],p[2],p[3]])},600);
    t(()=>setLineVis(p=>[false,p[1],p[2],p[3]]),3600);
    t(()=>{setPhase(1);setLineVis(p=>[p[0],true,p[2],p[3]])},4600);
    t(()=>setLineVis(p=>[p[0],false,p[2],p[3]]),7800);
    t(()=>{setPhase(2);setLineVis(p=>[p[0],p[1],true,p[3]])},8800);
    t(()=>setLineVis(p=>[p[0],p[1],false,p[3]]),12200);
    t(()=>{setPhase(3);setLineVis(p=>[p[0],p[1],p[2],true])},13200);
    t(()=>setLineVis(p=>[p[0],p[1],p[2],false]),16600);
    t(()=>{
      setPhase(4);
      let idx=0;
      morphRef.current=setInterval(()=>{
        idx++;
        if(idx>=MORPH_FONTS.length*2){
          clearInterval(morphRef.current);
          setMorphFont('"Space Grotesk", sans-serif');
          setLocked(true);
        }else{
          setMorphFont(MORPH_FONTS[idx%MORPH_FONTS.length]);
        }
      },110);
    },17500);
    t(()=>setRaysOn(true),19800);
    t(()=>{setPhase(5);setShowScanlines(true);setGlitchOn(true)},20800);
    t(()=>{setGlitchOn(false);setGlitchStable(true);setShowScanlines(false)},21600);
    t(()=>onDone(),24200);
    return()=>{timersRef.current.forEach(clearTimeout);clearInterval(morphRef.current)};
  },[onDone]);

  function skip(){timersRef.current.forEach(clearTimeout);clearInterval(morphRef.current);onDone()}

  const rayAngles=useMemo(()=>[0,30,60,90,120,150],[]);

  return(
    <React.Fragment>
      <div className="intro-screen">
        <div className="intro-center">
          {phase===0&&<AnimText text="You have 100 chances." visible={lineVis[0]} rate={55}/>}
          {phase===1&&<AnimText text="Most people never finish." visible={lineVis[1]} rate={50}/>}
          {phase===2&&<AnimText text="This is where you do." visible={lineVis[2]} rate={55}/>}
          {phase===3&&<AnimText text="Your story starts now." visible={lineVis[3]} rate={60}/>}
          {phase>=4&&(
            <div style={{position:'relative',display:'inline-block'}}>
              <div className={`morph-100 ${locked?'locked':''}`}
                style={{fontFamily:morphFont,
                  transition:'text-shadow 1.2s',
                  transform:locked?'scale(1)':'scale(0.95)'}}>
                100
                {rayAngles.map((angle,i)=>(
                  <div key={i} className={`ray ${raysOn?'on':''}`} style={{
                    height:`${100+i*20}px`,
                    transform:`rotate(${angle}deg)`,
                    transitionDelay:`${i*0.12}s`
                  }}/>
                ))}
              </div>
              {phase>=5&&(
                <div style={{marginTop:6}}>
                  <div className={`glitch-before ${glitchOn?'active':''} ${glitchStable?'stable':''}`}
                    style={{transform:glitchOn?'scale(1.06)':'scale(1)',transition:'transform .3s'}}>
                    BEFORE
                    <div className="echo">BEFORE</div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
      <div className={`scanlines ${showScanlines?'vis':''}`}/>
      <button className="skip-btn" onClick={skip}>Skip →</button>
    </React.Fragment>
  );
}

/* === Confetti === */
function Confetti({x,y,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,900);return()=>clearTimeout(t)},[onDone]);
  const dots=useMemo(()=>Array.from({length:20},(_,i)=>{
    const a=Math.PI*2*i/20;const v=30+Math.random()*55;
    return{tx:Math.cos(a)*v,ty:Math.sin(a)*v,sz:2+Math.random()*3,c:160+Math.floor(Math.random()*95)};
  }),[]);
  return(
    <div className="confetti-c" style={{left:x,top:y}}>
      {dots.map((d,i)=><div key={i} className="confetti-p" style={{
        width:d.sz,height:d.sz,background:`rgb(${d.c},${d.c},${d.c})`,
        '--tx':d.tx+'px','--ty':d.ty+'px'
      }}/>)}
    </div>
  );
}

/* === XP Burst text === */
function XPBurstEl({x,y,amount,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,1200);return()=>clearTimeout(t)},[onDone]);
  return <div className="xp-burst" style={{left:x-20,top:y-20}}>+{amount} XP</div>;
}

/* === Progress Ring === */
function ProgressRing({done,total}){
  const pct=total>0?done/total:0;
  const circ=2*Math.PI*68;
  const offset=circ*(1-pct);
  const displayPct=useAnimNum(Math.round(pct*100));
  return(
    <div className="ring-w">
      <div className="ring-glow"/>
      <svg viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="68" className="ring-bg"/>
        <circle cx="80" cy="80" r="68" className="ring-fg"
          strokeDasharray={circ} strokeDashoffset={offset}/>
      </svg>
      <div className="ring-center">
        <div className="ring-pct">{displayPct}%</div>
        <div className="ring-lbl">Complete</div>
      </div>
    </div>
  );
}

/* === Weekly Challenge === */
function WeeklyChallenge({goal,endDate}){
  const[now,setNow]=useState(Date.now());
  useEffect(()=>{const iv=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(iv)},[]);
  if(!goal) return null;
  const diff=Math.max(0,new Date(endDate).getTime()-now);
  const d=Math.floor(diff/864e5);
  const h=Math.floor(diff%864e5/36e5);
  const m=Math.floor(diff%36e5/6e4);
  const s=Math.floor(diff%6e4/1e3);
  return(
    <div className="wc-card">
      <div className="wc-tag"><span className="flame-icon">⚡</span> Weekly Challenge</div>
      <div className="wc-goal">{goal.text}</div>
      {goal.done
        ?<div style={{fontSize:13,color:'var(--text-40)'}}>✓ Completed!</div>
        :<div className="cd-row">
          {[[d,'Days'],[h,'Hours'],[m,'Mins'],[s,'Secs']].map(([n,l],i)=>(
            <div key={i} className="cd-u">
              <div className="cd-n">{String(n).padStart(2,'0')}</div>
              <div className="cd-l">{l}</div>
            </div>
          ))}
        </div>
      }
    </div>
  );
}

/* === Collapsible === */
function Collapsible({title,children,startOpen}){
  const[open,setOpen]=useState(startOpen!==false);
  return(
    <div>
      <div className="collapse-hdr" onClick={()=>setOpen(!open)}>
        <div className="section-title">{title}</div>
        <span className={`collapse-arr ${open?'open':''}`}>▼</span>
      </div>
      <div className={`collapse-body ${open?'open':''}`}>{children}</div>
    </div>
  );
}

/* === GoalCard === */
const GoalCard=memo(function GoalCard({goal,index,onToggle,onDelete,onPhoto,onRemovePhoto,grayScale}){
  const cardRef=useRef(null);
  const fileRef=useRef(null);

  function handleTilt(e){
    if(!cardRef.current||innerWidth<768) return;
    const r=cardRef.current.getBoundingClientRect();
    const rx=(e.clientX-r.left)/r.width-.5;
    const ry=(e.clientY-r.top)/r.height-.5;
    cardRef.current.style.transform=`perspective(800px) rotateY(${rx*8}deg) rotateX(${-ry*8}deg) scale(1.02)`;
  }
  function clearTilt(){if(cardRef.current) cardRef.current.style.transform=''}

  function handleFileChange(e){
    const f=e.target.files&&e.target.files[0];
    if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>onPhoto(goal.id,ev.target.result);
    reader.readAsDataURL(f);
    e.target.value='';
  }

  return(
    <div ref={cardRef} className={`goal-card ${goal.done?'done':''}`}
      style={{animationDelay:`${index*35}ms`}}
      onMouseMove={handleTilt} onMouseLeave={clearTilt}>
      <div className="goal-top" onClick={e=>onToggle(goal.id,e)}>
        <div className={`gc-check ${goal.done?'on':''}`}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"
            strokeLinecap="round" strokeLinejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div className="goal-text">{goal.text}</div>
        <button className="goal-del" onClick={e=>{e.stopPropagation();onDelete(goal.id)}} title="Delete">✕</button>
      </div>
      {goal.photo&&(
        <img src={goal.photo} className="goal-img" alt=""
          style={{filter:grayScale?'grayscale(1)':'none'}}/>
      )}
      <div className="goal-img-row">
        <button className="goal-img-btn" onClick={()=>fileRef.current&&fileRef.current.click()}>
          {goal.photo?'Change':'📷 Photo'}
        </button>
        {goal.photo&&(
          <button className="goal-img-btn" onClick={()=>onRemovePhoto(goal.id)}>Remove</button>
        )}
      </div>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFileChange}/>
    </div>
  );
});

      <div className="empty-icon">◎</div>
      <div className="empty-title">Your Journey Begins Here</div>
      <div className="empty-sub">
        You have 100 chances to do something remarkable.
        Add your first goal and start building the life you want to live.

/* === Add Goal Modal === */
function AddGoalModal({count,onAdd,onClose}){
  const[text,setText]=useState('');
  function submit(){
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length>0) onAdd(lines);
    onClose();
  }
  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-c" onClick={e=>e.stopPropagation()}>
        <h3>Add New Goals</h3>
        <div style={{fontSize:12,color:'var(--text-40)',marginBottom:14}}>
          {count}/100 goals — one per line
        </div>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder={"Learn to surf\nVisit Japan\nWrite a song"} rows={5}/>
        <div className="modal-acts">
          <button className="cancel-b" onClick={onClose}>Cancel</button>
          <button className="confirm-b" onClick={submit}>Add Goals</button>
        </div>
      </div>
    </div>
  );
}

/* === LOGIN === */
function LoginScreen({onLogin}){
  const[user,setUser]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState(false);
  const[success,setSuccess]=useState(false);
  const[vis,setVis]=useState(false);

  useEffect(()=>{setTimeout(()=>setVis(true),100)},[]);

  function submit(e){
    e.preventDefault();
    if(user==='Pranav'&&pass==='123'){
      setErr(false);setSuccess(true);
      setTimeout(()=>onLogin(user),900);
    }else{
      setErr(true);setSuccess(false);
      setTimeout(()=>setErr(false),600);
    }
  }

  function doRipple(e){
    const btn=e.currentTarget;
    const rect=btn.getBoundingClientRect();
    const rip=document.createElement('span');
    rip.className='ripple-e';
    rip.style.left=(e.clientX-rect.left)+'px';
    rip.style.top=(e.clientY-rect.top)+'px';
    btn.appendChild(rip);
    setTimeout(()=>rip.remove(),700);
  }

  const streaks=useMemo(()=>Array.from({length:5},(_,i)=>({
    left:15+i*20+'%',delay:i*1.1+'s',h:50+Math.random()*50
  })),[]);

  return(
    <div className="login-screen" style={{opacity:vis?1:0,transition:'opacity .8s'}}>
      <form onSubmit={submit}
        className={`login-wrap ${err?'shake':''} ${success?'glow-success':''}`}
        style={{opacity:vis?1:0,transform:vis?'none':'translateY(40px)',
          transition:'opacity .8s cubic-bezier(.34,1.56,.64,1) .2s, transform .8s cubic-bezier(.34,1.56,.64,1) .2s'}}>
        {streaks.map((s,i)=>(
          <div key={i} className="light-streak"
            style={{left:s.left,animationDelay:s.delay,height:s.h+'px'}}/>
        ))}
        <div className="login-left">
          <div className="login-left-100">100</div>
          <div className="login-before-vert">BEFORE</div>
        </div>
        <div className="login-right">
          <div className="login-title">Welcome Back</div>
          <div className="login-sub">Enter your credentials to continue your journey.</div>
          <div className="input-g">
            <input type="text" placeholder=" " value={user}
              onChange={e=>setUser(e.target.value)} className={err?'err':''}/>
            <label>Username</label>
            <div className="focus-line"/>
          </div>
          <div className="input-g">
            <input type="password" placeholder=" " value={pass}
              onChange={e=>setPass(e.target.value)} className={err?'err':''}/>
            <label>Password</label>
            <div className="focus-line"/>
          </div>
          {err&&<div style={{fontSize:12,color:'rgba(180,80,80,.8)',marginBottom:10,marginTop:-8}}>
            Invalid credentials.</div>}
          <button type="submit" className="btn-mag" onClick={doRipple}>
            <span className="shine"/>Sign In
          </button>
          <div style={{textAlign:'center',marginTop:20,fontSize:11,color:'var(--text-20)'}}>
            Hint: Pranav / 123
          </div>
        </div>
      </form>
    </div>
  );
}

/* === DASHBOARD === */
function Dashboard({data,onUpdate,onLogout}){
  const{theme,setTheme}=useContext(ThemeCtx);
  const[modal,setModal]=useState(false);
  const[confettiData,setConfettiData]=useState(null);
  const[xpBurstData,setXpBurstData]=useState(null);
  const[filter,setFilter]=useState('all');
  const[popBadge,setPopBadge]=useState(null);

  /* derived values — all at top level before any hooks */
  const completed=data.goals.filter(g=>g.done).length;
  const total=data.goals.length;
  const level=Math.floor(data.xp/XP_LV);
  const xpInLevel=data.xp%XP_LV;
  const remaining=Math.max(0,total-completed);
  const isDark=theme!=='frost';

  /* animated numbers — all hooks called unconditionally at top level */
  const animXP=useAnimNum(data.xp);
  const animDone=useAnimNum(completed);
  const animStreak=useAnimNum(data.streak);
  const animRemaining=useAnimNum(remaining);

  const weeklyGoal=data.weeklyGoalIdx!=null&&data.goals[data.weeklyGoalIdx]
    ?data.goals[data.weeklyGoalIdx]:null;

  const filteredGoals=useMemo(()=>{
    if(filter==='done') return data.goals.filter(g=>g.done);
    if(filter==='todo') return data.goals.filter(g=>!g.done);
    return data.goals;
  },[data.goals,filter]);

  function persist(nd){onUpdate(nd)}

  /* Refresh weekly challenge if expired */
  useEffect(()=>{
    if(data.goals.length>0&&new Date(data.weeklyEnd).getTime()<Date.now()){
      const inc=data.goals.filter(g=>!g.done);
      const pool=inc.length>0?inc:data.goals;
      const idx=data.goals.indexOf(pool[Math.floor(Math.random()*pool.length)]);
      persist({...data,weeklyGoalIdx:idx,weeklyEnd:new Date(Date.now()+7*864e5).toISOString()});
    }
  },[]);

  function toggleGoal(id,e){
    const goal=data.goals.find(g=>g.id===id);
    if(!goal) return;
    const wasDone=goal.done;
    const newGoals=data.goals.map(g=>
      g.id===id?{...g,done:!g.done,doneAt:!g.done?new Date().toISOString():null}:g
    );
    const xpDelta=wasDone?-XP_GOAL:XP_GOAL;
    let nd={...data,goals:newGoals,xp:Math.max(0,data.xp+xpDelta)};

    if(!wasDone){
      const newBadges=BADGES.filter(b=>!nd.unlockedBadges.includes(b.id)&&b.req(nd));
      if(newBadges.length>0){
        nd={...nd,unlockedBadges:[...nd.unlockedBadges,...newBadges.map(b=>b.id)]};
        setPopBadge(newBadges[0]);
        setTimeout(()=>setPopBadge(null),2000);
      }
      const rect=e.currentTarget.getBoundingClientRect();
      setConfettiData({x:rect.left+rect.width/2,y:rect.top+rect.height/2,key:Date.now()});
      setXpBurstData({x:rect.left+rect.width/2,y:rect.top,amount:XP_GOAL,key:Date.now()});
    }
    persist(nd);
  }

  function deleteGoal(id){
    const goal=data.goals.find(g=>g.id===id);
    const newGoals=data.goals.filter(g=>g.id!==id);
    const xpDelta=goal&&goal.done?-XP_GOAL:0;
    let nd={...data,goals:newGoals,xp:Math.max(0,data.xp+xpDelta)};
    if(nd.weeklyGoalIdx!=null&&nd.weeklyGoalIdx>=newGoals.length){
      nd={...nd,weeklyGoalIdx:newGoals.length>0?0:null};
    }
    persist(nd);
  }

  function addGoals(texts){
    let nextId=data.goals.length>0?Math.max(...data.goals.map(g=>g.id))+1:1;
    const capacity=100-data.goals.length;
    const newGoals=texts.slice(0,capacity).map((t,i)=>({
      id:nextId+i,text:t,done:false,doneAt:null,photo:null
    }));
    let nd={...data,goals:[...data.goals,...newGoals]};
    if(nd.weeklyGoalIdx==null&&nd.goals.length>0){
      const inc=nd.goals.filter(g=>!g.done);
      const pool=inc.length>0?inc:nd.goals;
      nd={...nd,weeklyGoalIdx:nd.goals.indexOf(pool[Math.floor(Math.random()*pool.length)])};
    }
    persist(nd);
  }

  function setGoalPhoto(id,src){
    persist({...data,goals:data.goals.map(g=>g.id===id?{...g,photo:src}:g)});
  }
  function removeGoalPhoto(id){
    persist({...data,goals:data.goals.map(g=>g.id===id?{...g,photo:null}:g)});
  }
  function handleAvatarChange(src){persist({...data,avatar:src})}
  function handleThemeChange(tid){
    setTheme(tid);
    persist({...data,theme:tid});
  }

  /* Avatar file input */
  const avatarInputRef=useRef(null);
  function onAvatarFile(e){
    const f=e.target.files&&e.target.files[0];
    if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>handleAvatarChange(ev.target.result);
    reader.readAsDataURL(f);
    e.target.value='';
  }

  return(
    <React.Fragment>
      {data.bgEnabled&&<ParticleCanvas intensity={data.motionIntensity} isDark={isDark}/>}
      {data.bgEnabled&&<SolarBG intensity={data.motionIntensity} isDark={isDark}/>}

      <div className="dashboard">
        <header className="dash-header">
          <div className="dash-logo">100 BEFORE</div>
          <div className="header-right">
            <span style={{fontSize:12,color:'var(--text-40)'}}>{data.username}</span>
            <div className="avatar-sm"
              onClick={()=>avatarInputRef.current&&avatarInputRef.current.click()}
              title="Upload avatar">
              {data.avatar
                ?<img src={data.avatar} alt=""/>
                :(data.username?data.username[0].toUpperCase():'?')
              }
            </div>
            <input ref={avatarInputRef} type="file" accept="image/*"
              style={{display:'none'}} onChange={onAvatarFile}/>
            <button className="btn-sm" onClick={onLogout}>Log out</button>
          </div>
        </header>

        <div className="dash-body">
          {/* Progress */}
          <div className="progress-area">
            <ProgressRing done={completed} total={total||1}/>
            <div className="xp-area">
              <div className="xp-lv">Level {level}<span>{animXP} XP total</span></div>
              <div className="xp-track">
                <div className="xp-fill" style={{width:`${total>0?(xpInLevel/XP_LV)*100:0}%`}}/>
              </div>
              <div className="xp-sub">{XP_LV-xpInLevel} XP to next level</div>
              <div className="streak-b">
                <span className="flame-icon">🔥</span> {animStreak} day streak
              </div>
            </div>
          </div>

          {/* Stats */}
          <div className="stats-row">
            <div className="stat-c">
              <div className="stat-label">Completed</div>
              <div className="stat-val">{animDone}</div>
              <div className="stat-sub">of {total} goals</div>
            </div>
            <div className="stat-c">
              <div className="stat-label">Remaining</div>
              <div className="stat-val">{animRemaining}</div>
              <div className="stat-sub">goals to go</div>
            </div>
            <div className="stat-c">
              <div className="stat-label">Level</div>
              <div className="stat-val">{level}</div>
              <div className="stat-sub">{total>0?Math.round(xpInLevel/XP_LV*100):0}% to next</div>
            </div>
            <div className="stat-c">
              <div className="stat-label">Streak</div>
              <div className="stat-val">{animStreak}</div>
              <div className="stat-sub">consecutive days</div>
            </div>
          </div>

          {/* Badges */}
          <Collapsible title="Achievements">
            <div className="badges-row">
              {BADGES.map(b=>{
                const unlocked=data.unlockedBadges.includes(b.id);
                return(
                  <div key={b.id}
                    className={`badge ${unlocked?'':'locked'} ${popBadge&&popBadge.id===b.id?'badge-pop':''}`}
                    title={`${b.name}: ${b.desc}`}>
                    {b.icon}
                    <div className="badge-tip">{b.name}</div>
                  </div>
                );
              })}
            </div>
          </Collapsible>

          {/* Weekly Challenge */}
          {weeklyGoal&&<WeeklyChallenge goal={weeklyGoal} endDate={data.weeklyEnd}/>}

          {/* Appearance */}
          <Collapsible title="Appearance" startOpen={false}>
            <div className="settings-panel">
              <div style={{fontSize:12,color:'var(--text-40)',marginBottom:12,
                textTransform:'uppercase',letterSpacing:'.1em'}}>Theme</div>
              <div className="theme-row">
                {THEMES.map(t=>(
                  <div key={t.id} className={`theme-opt ${theme===t.id?'act':''}`}
                    onClick={()=>handleThemeChange(t.id)}>
                    <div className="theme-prev"
                      style={{background:`linear-gradient(135deg,${t.colors[0]},${t.colors[1]},${t.colors[2]})`}}/>
                    <div className="theme-name">{t.name}</div>
                  </div>
                ))}
              </div>
              <div className="setting-row" style={{marginTop:16}}>
                <div className="setting-label">Background Animations</div>
                <button className={`toggle-sw ${data.bgEnabled?'on':''}`}
                  onClick={()=>persist({...data,bgEnabled:!data.bgEnabled})}/>
              </div>
              <div className="setting-row">
                <div className="setting-label">Motion Intensity</div>
                <div className="slider-w">
                  <span style={{fontSize:11,color:'var(--text-20)'}}>Low</span>
                  <input type="range" min="0.1" max="2" step="0.1"
                    value={data.motionIntensity}
                    onChange={e=>persist({...data,motionIntensity:parseFloat(e.target.value)})}/>
                  <span style={{fontSize:11,color:'var(--text-20)'}}>High</span>
                </div>
              </div>
              <div className="setting-row">
                <div className="setting-label">Grayscale Photos</div>
                <button className={`toggle-sw ${data.gsFilter?'on':''}`}
                  onClick={()=>persist({...data,gsFilter:!data.gsFilter})}/>
              </div>
            </div>
          </Collapsible>

          {/* Goals */}
          <Collapsible title="Goals">
            {total>0&&(
              <div className="section-hdr">
                <div className="filter-row">
                  {[['all',`All (${total})`],['todo',`To Do (${total-completed})`],['done',`Done (${completed})`]].map(([f,label])=>(
                    <button key={f} className={`filter-btn ${filter===f?'act':''}`}
                      onClick={()=>setFilter(f)}>{label}</button>
                  ))}
                </div>
                {total<100&&<button className="add-btn" onClick={()=>setModal(true)}>+ Add Goals</button>}
              </div>
            )}

            {total===0?(
              <EmptyState onAdd={()=>setModal(true)}/>
            ):(
              <React.Fragment>
                <div className="goals-grid">
                  {filteredGoals.map((g,i)=>(
                    <GoalCard key={g.id} goal={g} index={i}
                      onToggle={toggleGoal} onDelete={deleteGoal}
                      onPhoto={setGoalPhoto} onRemovePhoto={removeGoalPhoto}
                      grayScale={data.gsFilter}/>
                  ))}
                </div>
                {filteredGoals.length===0&&(
                  <div style={{textAlign:'center',padding:'50px 20px',color:'var(--text-20)',fontSize:14}}>
                    {filter==='done'?'No completed goals yet. Keep pushing!':'All goals completed! 🎉'}
                  </div>
                )}
              </React.Fragment>
            )}
          </Collapsible>
        </div>
      </div>

      {modal&&<AddGoalModal count={total} onAdd={addGoals} onClose={()=>setModal(false)}/>}
      {confettiData&&<Confetti x={confettiData.x} y={confettiData.y}
        key={confettiData.key} onDone={()=>setConfettiData(null)}/>}
      {xpBurstData&&<XPBurstEl x={xpBurstData.x} y={xpBurstData.y}
        amount={xpBurstData.amount} key={xpBurstData.key} onDone={()=>setXpBurstData(null)}/>}
    </React.Fragment>
  );
}

/* ====== ROOT APP ====== */
function App(){
  const[phase,setPhase]=useState('intro');
  const[data,setData]=useState(()=>{
    const loaded=loadStore();
    return loaded?refreshStreak(loaded):null;
  });

  /* Save initial streak-refreshed data */
  useEffect(()=>{if(data) saveStore(data)},[]);

  const introDone=useCallback(()=>{
    setPhase(data?'dashboard':'login');
  },[data]);

  function handleLogin(username){
    const nd=createData(username);
    setData(nd);
    saveStore(nd);
    setPhase('dashboard');
  }

  function handleUpdate(nd){
    setData(nd);
    saveStore(nd);
  }

  function handleLogout(){
    localStorage.removeItem(STORE_KEY);
    setData(null);
    setPhase('login');
  }

  const currentTheme=(data&&data.theme)||'void';

  return(
    <ThemeProvider initial={currentTheme}>
      <AppContent phase={phase} data={data}
        onIntroDone={introDone} onLogin={handleLogin}
        onUpdate={handleUpdate} onLogout={handleLogout}/>
    </ThemeProvider>
  );
}

function AppContent({phase,data,onIntroDone,onLogin,onUpdate,onLogout}){
  const{theme}=useContext(ThemeCtx);
  const isDark=theme!=='frost';

  if(phase==='intro'){
    return(
      <React.Fragment>
        <ParticleCanvas intensity={1} isDark={true}/>
        <IntroSequence onDone={onIntroDone}/>
      </React.Fragment>
    );
  }

  if(phase==='login'){
    return(
      <React.Fragment>
        <ParticleCanvas intensity={0.8} isDark={isDark}/>
        <SolarBG intensity={0.6} isDark={isDark}/>
        <LoginScreen onLogin={onLogin}/>
      </React.Fragment>
    );
  }

  if(phase==='dashboard'&&data){
    return <Dashboard data={data} onUpdate={onUpdate} onLogout={onLogout}/>;
  }

  return null;
}

/* MOUNT */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
  </html>
