<!DOCTYPE html>
<html lang="en" data-theme="void">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Before — Your Bucket List</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Playfair+Display:ital,wght@0,700;1,400&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;700&family=Bebas+Neue&family=Anton&family=Barlow+Condensed:wght@700;900&family=DM+Serif+Display:ital@0;1&family=Black+Han+Sans&family=Righteous&family=Russo+One&family=Teko:wght@600;700&family=Fjalla+One&family=Changa:wght@700;800&family=Boogaloo&family=Lilita+One&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #000;
            --bg2: #0a0a0a;
            --bg3: #111;
            --card: rgba(255, 255, 255, .03);
            --card-b: rgba(255, 255, 255, .07);
            --card-h: rgba(255, 255, 255, .08);
            --t100: #fff;
            --t80: rgba(255, 255, 255, .8);
            --t60: rgba(255, 255, 255, .6);
            --t40: rgba(255, 255, 255, .4);
            --t20: rgba(255, 255, 255, .2);
            --t10: rgba(255, 255, 255, .1);
            --glow: rgba(255, 255, 255, .12);
            --glow-s: rgba(255, 255, 255, .06);
            --dim: #888;
            --acc: #fff;
            --acc2: #666;
            --is-dark: 1;
            --card-rad: 14px;
            --trans: .3s
        }

        /* THEMES */
        [data-theme="void"] {
            --bg: #000;
            --bg2: #0a0a0a;
            --bg3: #111;
            --acc: #fff;
            --acc2: #666
        }

        [data-theme="slate"] {
            --bg: #0f0f12;
            --bg2: #14141a;
            --bg3: #22222c;
            --card: rgba(255, 255, 255, .04);
            --card-b: rgba(255, 255, 255, .07)
        }

        [data-theme="frost"] {
            --bg: #e8e8ec;
            --bg2: #f0f0f4;
            --bg3: #fafafe;
            --card: rgba(0, 0, 0, .04);
            --card-b: rgba(0, 0, 0, .08);
            --card-h: rgba(0, 0, 0, .06);
            --t100: #111;
            --t80: rgba(0, 0, 0, .8);
            --t60: rgba(0, 0, 0, .55);
            --t40: rgba(0, 0, 0, .35);
            --t20: rgba(0, 0, 0, .15);
            --t10: rgba(0, 0, 0, .08);
            --glow: rgba(0, 0, 0, .08);
            --glow-s: rgba(0, 0, 0, .04);
            --dim: #666;
            --acc: #111;
            --acc2: #666;
            --is-dark: 0
        }

        [data-theme="solar"] {
            --bg: #0d0c0a;
            --bg2: #1c1b17;
            --bg3: #24231e;
            --card: rgba(255, 245, 230, .04);
            --card-b: rgba(255, 245, 230, .07);
            --card-h: rgba(255, 245, 230, .1);
            --t100: #f5f0e8;
            --t80: rgba(245, 240, 232, .8);
            --t60: rgba(245, 240, 232, .55);
            --t40: rgba(245, 240, 232, .35);
            --t20: rgba(245, 240, 232, .15);
            --t10: rgba(245, 240, 232, .08);
            --glow: rgba(255, 245, 230, .1);
            --dim: #998;
            --acc: #f5f0e8
        }

        [data-theme="matte"] {
            --bg: #161616;
            --bg2: #222;
            --bg3: #2a2a2a
        }

        [data-theme="neon"] {
            --bg: #060612;
            --bg2: #0a0a1e;
            --bg3: #111128;
            --card: rgba(120, 80, 255, .06);
            --card-b: rgba(120, 80, 255, .15);
            --card-h: rgba(120, 80, 255, .1);
            --t100: #e8e0ff;
            --t80: rgba(232, 224, 255, .8);
            --t60: rgba(232, 224, 255, .55);
            --t40: rgba(232, 224, 255, .35);
            --t20: rgba(232, 224, 255, .15);
            --t10: rgba(232, 224, 255, .08);
            --glow: rgba(120, 80, 255, .2);
            --glow-s: rgba(120, 80, 255, .1);
            --dim: #9070dd;
            --acc: #b090ff;
            --acc2: #6040bb
        }

        [data-theme="sakura"] {
            --bg: #1a0a12;
            --bg2: #210f19;
            --bg3: #2e1525;
            --card: rgba(255, 150, 180, .05);
            --card-b: rgba(255, 150, 180, .12);
            --card-h: rgba(255, 150, 180, .08);
            --t100: #ffe8f0;
            --t80: rgba(255, 232, 240, .8);
            --t60: rgba(255, 232, 240, .55);
            --t40: rgba(255, 232, 240, .35);
            --t20: rgba(255, 232, 240, .15);
            --t10: rgba(255, 232, 240, .08);
            --glow: rgba(255, 100, 150, .15);
            --glow-s: rgba(255, 100, 150, .08);
            --dim: #cc7090;
            --acc: #ff9ab4;
            --acc2: #a0506a
        }

        [data-theme="forest"] {
            --bg: #050f05;
            --bg2: #0a180a;
            --bg3: #0f200f;
            --card: rgba(80, 200, 80, .05);
            --card-b: rgba(80, 200, 80, .12);
            --card-h: rgba(80, 200, 80, .08);
            --t100: #e0f5e0;
            --t80: rgba(224, 245, 224, .8);
            --t60: rgba(224, 245, 224, .55);
            --t40: rgba(224, 245, 224, .35);
            --t20: rgba(224, 245, 224, .15);
            --t10: rgba(224, 245, 224, .08);
            --glow: rgba(80, 200, 80, .15);
            --glow-s: rgba(80, 200, 80, .08);
            --dim: #50a050;
            --acc: #80d880;
            --acc2: #308030
        }

        [data-theme="gold"] {
            --bg: #0a0800;
            --bg2: #141000;
            --bg3: #1e1800;
            --card: rgba(255, 200, 50, .05);
            --card-b: rgba(255, 200, 50, .12);
            --card-h: rgba(255, 200, 50, .08);
            --t100: #fff8e0;
            --t80: rgba(255, 248, 224, .8);
            --t60: rgba(255, 248, 224, .55);
            --t40: rgba(255, 248, 224, .35);
            --t20: rgba(255, 248, 224, .15);
            --t10: rgba(255, 248, 224, .08);
            --glow: rgba(255, 200, 50, .15);
            --glow-s: rgba(255, 200, 50, .08);
            --dim: #aa8020;
            --acc: #ffd060;
            --acc2: #806010
        }

        [data-theme="cyber"] {
            --bg: #000806;
            --bg2: #001210;
            --bg3: #001a18;
            --card: rgba(0, 255, 180, .05);
            --card-b: rgba(0, 255, 180, .15);
            --card-h: rgba(0, 255, 180, .08);
            --t100: #e0fff8;
            --t80: rgba(224, 255, 248, .8);
            --t60: rgba(224, 255, 248, .55);
            --t40: rgba(224, 255, 248, .35);
            --t20: rgba(224, 255, 248, .15);
            --t10: rgba(224, 255, 248, .08);
            --glow: rgba(0, 255, 180, .2);
            --glow-s: rgba(0, 255, 180, .1);
            --dim: #00aa80;
            --acc: #00ffb4;
            --acc2: #008060
        }

        [data-theme="crimson"] {
            --bg: #0a0000;
            --bg2: #140000;
            --bg3: #1e0000;
            --card: rgba(255, 50, 50, .05);
            --card-b: rgba(255, 50, 50, .12);
            --card-h: rgba(255, 50, 50, .08);
            --t100: #ffe8e8;
            --t80: rgba(255, 232, 232, .8);
            --t60: rgba(255, 232, 232, .55);
            --t40: rgba(255, 232, 232, .35);
            --t20: rgba(255, 232, 232, .15);
            --t10: rgba(255, 232, 232, .08);
            --glow: rgba(255, 50, 50, .18);
            --glow-s: rgba(255, 50, 50, .08);
            --dim: #aa3030;
            --acc: #ff6060;
            --acc2: #801010
        }

        html {
            scroll-behavior: smooth
        }

        body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            background: var(--bg);
            color: var(--t100);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background .6s, color .6s
        }

        canvas.bgc {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        /* ===================== INTRO ===================== */
        .intro {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            transition: opacity 1.8s ease;
            overflow: hidden
        }

        .intro.out {
            opacity: 0;
            pointer-events: none
        }

        .intro-center {
            text-align: center;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px
        }

        .i-line {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.1rem, 3.5vw, 2.2rem);
            font-weight: 700;
            min-height: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
            white-space: nowrap;
            color: #fff;
            letter-spacing: .02em;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.4s ease, transform 1.4s cubic-bezier(.2, 1, .4, 1)
        }

        .i-line.vis {
            opacity: 1;
            transform: translateY(0)
        }

        .i-line.hide {
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 1s ease, transform 1s ease
        }

        .main-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            opacity: 0;
            transform: scale(.85);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(.2, 1, .4, 1)
        }

        .main-logo.vis {
            opacity: 1;
            transform: scale(1)
        }

        .logo-100 {
            font-size: clamp(5rem, 14vw, 10rem);
            font-weight: 900;
            line-height: 1;
            color: #fff;
            font-family: 'Anton', sans-serif;
            letter-spacing: -.02em;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 60px rgba(255, 255, 255, .4)
        }

        .logo-before {
            font-size: clamp(5rem, 14vw, 10rem);
            font-weight: 900;
            line-height: 1;
            color: #fff;
            font-family: 'Anton', sans-serif;
            letter-spacing: -.02em;
            position: relative;
            display: inline-block
        }

        .logo-before.glitch-on {
            animation: glitch-big .7s steps(1) infinite
        }

        .logo-before.stable {
            animation: glitch-stable 4s steps(1) infinite;
            text-shadow: 0 0 60px rgba(255, 255, 255, .4)
        }

        @keyframes glitch-big {
            0% {
                clip-path: inset(0);
                transform: translate(0);
                text-shadow: none
            }

            10% {
                clip-path: inset(30% 0 40% 0);
                transform: translate(-6px, 2px);
                text-shadow: 8px 0 rgba(255, 60, 60, .7), -8px 0 rgba(60, 60, 255, .7)
            }

            20% {
                clip-path: inset(60% 0 10% 0);
                transform: translate(5px, -3px);
                text-shadow: -6px 0 rgba(255, 100, 100, .5), 6px 0 rgba(100, 100, 255, .5)
            }

            30% {
                clip-path: inset(0);
                transform: translate(0);
                text-shadow: none
            }

            40% {
                clip-path: inset(45% 0 20% 0);
                transform: translate(-4px) scaleX(1.04);
                text-shadow: 5px 0 rgba(255, 80, 80, .6)
            }

            50% {
                clip-path: inset(0);
                transform: scale(1.02);
                text-shadow: none
            }

            60% {
                clip-path: inset(10% 0 70% 0);
                transform: translate(3px, -1px)
            }

            70%,
            100% {
                clip-path: inset(0);
                transform: none;
                text-shadow: 0 0 40px rgba(255, 255, 255, .3)
            }
        }

        @keyframes glitch-stable {

            0%,
            90% {
                clip-path: inset(0);
                transform: translate(0)
            }

            91% {
                clip-path: inset(40% 0 30% 0);
                transform: translate(-3px)
            }

            92% {
                clip-path: inset(0);
                transform: translate(2px)
            }

            93%,
            100% {
                clip-path: inset(0);
                transform: none
            }
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, .012) 2px, rgba(255, 255, 255, .012) 4px);
            pointer-events: none;
            z-index: 101;
            opacity: 0;
            transition: opacity .5s
        }

        .scanlines.vis {
            opacity: 1
        }

        .skip-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            color: rgba(255, 255, 255, .45);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            padding: 9px 20px;
            border-radius: 100px;
            cursor: pointer;
            transition: all .3s;
            backdrop-filter: blur(12px);
            letter-spacing: .06em;
            text-transform: uppercase
        }

        .skip-btn:hover {
            background: rgba(255, 255, 255, .15);
            color: #fff
        }

        /* Font cycle indicator */
        .font-ring {
            position: absolute;
            inset: -6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, .1);
            animation: fring .15s ease infinite;
            pointer-events: none
        }

        @keyframes fring {

            0%,
            100% {
                border-color: rgba(255, 255, 255, .05)
            }

            50% {
                border-color: rgba(255, 255, 255, .2)
            }
        }

        /* ===================== LOGIN ===================== */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .lw {
            display: flex;
            width: min(900px, 94vw);
            min-height: 460px;
            border-radius: 24px;
            overflow: hidden;
            background: var(--card);
            backdrop-filter: blur(40px);
            border: 1px solid var(--card-b);
            box-shadow: 0 16px 80px rgba(0, 0, 0, .6);
            position: relative;
            animation: lIn .8s cubic-bezier(.34, 1.4, .64, 1)
        }

        @keyframes lIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(.93)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .lw.shake {
            animation: shake .5s
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20%,
            60% {
                transform: translateX(-7px)
            }

            40%,
            80% {
                transform: translateX(7px)
            }
        }

        .lw.glow-ok {
            box-shadow: 0 0 100px rgba(255, 255, 255, .12) !important;
            border-color: rgba(255, 255, 255, .2) !important
        }

        .ll {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, .025), rgba(255, 255, 255, .005));
            overflow: hidden;
            min-height: 200px;
            gap: 8px
        }

        .ll-big {
            font-family: 'Anton', sans-serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--t100), var(--dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px var(--glow));
            animation: fl 6s ease-in-out infinite
        }

        @keyframes fl {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }
        }

        .ll-sub {
            font-family: 'Syne', sans-serif;
            font-size: clamp(.7rem, 1.6vw, 1rem);
            font-weight: 700;
            letter-spacing: .5em;
            color: var(--t40);
            text-transform: uppercase
        }

        .ll::after {
            content: '';
            position: absolute;
            width: 250%;
            height: 250%;
            background: radial-gradient(circle, var(--glow), transparent 55%);
            animation: lg 9s ease infinite;
            opacity: .3
        }

        @keyframes lg {

            0%,
            100% {
                transform: translate(-35%, -35%)
            }

            50% {
                transform: translate(-25%, -25%)
            }
        }

        .lr {
            flex: 1;
            padding: 44px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center
        }

        .lr-t {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--t100), var(--dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .lr-s {
            font-size: 13px;
            color: var(--t40);
            margin-bottom: 28px;
            line-height: 1.6
        }

        .ig {
            position: relative;
            margin-bottom: 18px
        }

        .ig input {
            width: 100%;
            padding: 18px 16px 10px;
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: 10px;
            color: var(--t100);
            font-size: 15px;
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
            transition: all .3s
        }

        .ig input:focus {
            border-color: rgba(255, 255, 255, .25);
            background: var(--card-h);
            box-shadow: 0 0 24px var(--glow-s)
        }

        .ig input.err {
            border-color: rgba(200, 60, 60, .5);
            background: rgba(200, 60, 60, .03)
        }

        .ig label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--t40);
            pointer-events: none;
            transition: all .25s;
            font-family: 'Space Grotesk', sans-serif
        }

        .ig input:focus+label,
        .ig input:not(:placeholder-shown)+label {
            top: 11px;
            transform: none;
            font-size: 9px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--t60)
        }

        .ig .fl {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--t40), transparent);
            transition: all .4s;
            border-radius: 2px
        }

        .ig input:focus~.fl {
            left: 10%;
            width: 80%
        }

        .btn-p {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, .1), rgba(255, 255, 255, .04));
            border: 1px solid var(--card-b);
            border-radius: 10px;
            color: var(--t100);
            font-size: 15px;
            font-weight: 600;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all .3s;
            position: relative;
            overflow: hidden;
            margin-top: 6px;
            letter-spacing: .03em
        }

        .btn-p:hover {
            transform: scale(1.02) translateY(-2px);
            background: linear-gradient(135deg, rgba(255, 255, 255, .15), rgba(255, 255, 255, .07));
            border-color: var(--t20);
            box-shadow: 0 8px 30px var(--glow-s)
        }

        .btn-p:active {
            transform: scale(.98)
        }

        .btn-p .shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .07), transparent);
            animation: sh 3.5s infinite
        }

        @keyframes sh {
            0% {
                left: -100%
            }

            35%,
            100% {
                left: 100%
            }
        }

        .rip {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, .25);
            transform: scale(0);
            animation: rip .6s ease-out forwards;
            pointer-events: none
        }

        @keyframes rip {
            to {
                transform: scale(5);
                opacity: 0
            }
        }

        /* ===================== DASHBOARD ===================== */
        .dash {
            position: relative;
            z-index: 1;
            min-height: 100vh
        }

        .dh {
            position: sticky;
            top: 0;
            z-index: 30;
            padding: 0 22px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--card-b);
            transition: background .5s
        }

        [data-theme="frost"] .dh {
            background: rgba(240, 240, 244, .85)
        }

        .d-logo {
            font-family: 'Anton', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: .05em;
            background: linear-gradient(135deg, var(--t100), var(--dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer
        }

        .hr {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .nav-tab {
            background: none;
            border: 1px solid transparent;
            color: var(--t40);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 100px;
            cursor: pointer;
            transition: all .3s;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: .04em;
            text-transform: uppercase
        }

        .nav-tab:hover {
            border-color: var(--card-b);
            color: var(--t80)
        }

        .nav-tab.act {
            background: var(--card-h);
            border-color: var(--card-b);
            color: var(--t100)
        }

        .av {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--card-h);
            border: 1px solid var(--card-b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            overflow: hidden;
            transition: all .3s;
            color: var(--t60);
            position: relative
        }

        .av:hover {
            border-color: var(--t20);
            transform: scale(1.05)
        }

        .av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .av .pro-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #ffd060, #aa8020);
            border-radius: 50%;
            border: 2px solid var(--bg);
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--card-b);
            color: var(--t40);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .3s;
            font-size: 15px
        }

        .icon-btn:hover {
            border-color: var(--t20);
            color: var(--t100);
            transform: scale(1.05)
        }

        .db {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 18px 100px
        }

        /* Stats Row */
        .sr {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
            gap: 12px;
            margin-bottom: 24px
        }

        .sc {
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: var(--card-rad);
            padding: 20px 18px;
            transition: all .35s;
            position: relative;
            overflow: hidden;
            cursor: default
        }

        .sc::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, .04), transparent 50%);
            pointer-events: none
        }

        .sc:hover {
            background: var(--card-h);
            border-color: var(--t20);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, .3)
        }

        .sc-icon {
            font-size: 22px;
            margin-bottom: 8px;
            display: block
        }

        .sl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--t40);
            margin-bottom: 5px
        }

        .sv {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--t100), var(--dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .ss {
            font-size: 10px;
            color: var(--t20);
            margin-top: 2px
        }

        /* Progress area */
        .pa {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center
        }

        .rw {
            position: relative;
            width: 160px;
            height: 160px;
            flex-shrink: 0
        }

        .rw svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg)
        }

        .rbg {
            fill: none;
            stroke: var(--card-b);
            stroke-width: 6
        }

        .rfg {
            fill: none;
            stroke: url(#rgrad);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 1.4s cubic-bezier(.4, 0, .2, 1);
            filter: drop-shadow(0 0 8px var(--glow))
        }

        .rc {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center
        }

        .rpct {
            font-family: 'Syne', sans-serif;
            font-size: 2.1rem;
            font-weight: 800;
            color: var(--t100)
        }

        .rlbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--t40);
            margin-top: 2px
        }

        .rglow {
            position: absolute;
            inset: 18px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-s), transparent 70%);
            animation: rpulse 3.5s ease-in-out infinite
        }

        @keyframes rpulse {

            0%,
            100% {
                opacity: .3;
                transform: scale(1)
            }

            50% {
                opacity: .6;
                transform: scale(1.06)
            }
        }

        .xa {
            flex: 1;
            min-width: 240px
        }

        .xlv {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--t80)
        }

        .xlv span {
            font-size: .72rem;
            color: var(--t40);
            font-weight: 400;
            margin-left: 8px
        }

        .xt {
            width: 100%;
            height: 8px;
            background: var(--card-b);
            border-radius: 100px;
            overflow: hidden;
            position: relative
        }

        .xf {
            height: 100%;
            background: linear-gradient(90deg, var(--t20), var(--t80));
            border-radius: 100px;
            transition: width 1.2s cubic-bezier(.4, 0, .2, 1);
            position: relative
        }

        .xf::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: var(--t100);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--glow);
            opacity: .6
        }

        .xs {
            font-size: 10px;
            color: var(--t20);
            margin-top: 5px
        }

        .stk-b {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 12px;
            margin-top: 12px;
            color: var(--t60);
            cursor: default
        }

        .flm {
            display: inline-block;
            animation: flm 1s ease infinite
        }

        @keyframes flm {

            0%,
            100% {
                transform: scale(1) rotate(-3deg)
            }

            50% {
                transform: scale(1.2) rotate(3deg)
            }
        }

        /* Section headers */
        .shdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px
        }

        .stit {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--t100), var(--dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .fr {
            display: flex;
            gap: 5px;
            flex-wrap: wrap
        }

        .fb {
            background: transparent;
            border: 1px solid var(--card-b);
            color: var(--t40);
            font-size: 11px;
            padding: 5px 13px;
            border-radius: 100px;
            cursor: pointer;
            transition: all .3s;
            font-family: 'Space Grotesk', sans-serif
        }

        .fb.act {
            background: var(--card-h);
            border-color: var(--t20);
            color: var(--t100)
        }

        .abtn {
            background: var(--card);
            border: 1px solid var(--card-b);
            color: var(--t60);
            font-size: 12px;
            padding: 7px 18px;
            border-radius: 100px;
            cursor: pointer;
            transition: all .3s;
            font-family: 'Space Grotesk', sans-serif
        }

        .abtn:hover {
            background: var(--card-h);
            color: var(--t100);
            border-color: var(--t20)
        }

        /* Goal grid */
        .gg {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 12px
        }

        .gc {
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: var(--card-rad);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all .4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: gci .4s ease forwards;
            opacity: 0
        }

        .gc::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, .03), transparent 50%);
            pointer-events: none
        }

        .gc:hover {
            background: var(--card-h);
            border-color: var(--t20);
            box-shadow: 0 8px 28px rgba(0, 0, 0, .25);
            transform: translateY(-2px)
        }

        .gc.dn .gtxt {
            text-decoration: line-through;
            opacity: .3
        }

        .gc.dn {
            border-color: rgba(255, 255, 255, .04)
        }

        @keyframes gci {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .gtop {
            display: flex;
            align-items: flex-start;
            gap: 10px
        }

        .gchk {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--t20);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .35s;
            margin-top: 1px
        }

        .gchk.on {
            background: var(--t20);
            border-color: var(--t40);
            box-shadow: 0 0 12px var(--glow)
        }

        .gchk svg {
            width: 11px;
            height: 11px;
            opacity: 0;
            transition: .3s;
            color: var(--t100)
        }

        .gchk.on svg {
            opacity: 1
        }

        .gtxt {
            font-size: 13.5px;
            line-height: 1.55;
            color: var(--t60);
            flex: 1;
            transition: all .3s
        }

        .gdel {
            opacity: 0;
            background: none;
            border: none;
            color: var(--t20);
            cursor: pointer;
            font-size: 14px;
            padding: 3px;
            transition: all .3s;
            flex-shrink: 0;
            line-height: 1
        }

        .gc:hover .gdel {
            opacity: 1
        }

        .gdel:hover {
            color: var(--t60)
        }

        .gcat {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--t20);
            background: var(--card);
            border: 1px solid var(--card-b);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            align-self: flex-start;
            margin-top: -2px
        }

        .gimg {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--card-b)
        }

        .gir {
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .gib {
            font-size: 9px;
            color: var(--t40);
            background: var(--card);
            border: 1px solid var(--card-b);
            padding: 3px 9px;
            border-radius: 5px;
            cursor: pointer;
            transition: all .3s;
            font-family: 'Space Grotesk', sans-serif
        }

        .gib:hover {
            color: var(--t100);
            border-color: var(--t20)
        }

        .gnote {
            font-size: 11px;
            color: var(--t20);
            padding: 6px 10px;
            background: var(--card);
            border-left: 2px solid var(--card-b);
            border-radius: 0 6px 6px 0;
            line-height: 1.5;
            font-style: italic
        }

        .gpri {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .gstar {
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            opacity: .3
        }

        .gstar.on {
            opacity: 1
        }

        .gstar:hover {
            transform: scale(1.2)
        }

        /* Badges */
        .bdgr {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px
        }

        .bdg {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--card-b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all .4s;
            position: relative;
            cursor: default;
            flex-direction: column
        }

        .bdg.lk {
            opacity: .18;
            filter: grayscale(1)
        }

        .bdg:not(.lk):hover {
            transform: scale(1.15);
            box-shadow: 0 0 20px var(--glow);
            border-color: var(--t20)
        }

        .bdg-t {
            position: absolute;
            bottom: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: var(--t40);
            white-space: nowrap;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            background: var(--bg3);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--card-b)
        }

        .bdg:hover .bdg-t {
            opacity: 1
        }

        .bdg.pop {
            animation: bpop .6s cubic-bezier(.34, 1.56, .64, 1)
        }

        @keyframes bpop {
            0% {
                transform: scale(0) rotate(-200deg)
            }

            100% {
                transform: scale(1) rotate(0)
            }
        }

        /* Weekly challenge */
        .wcc {
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: var(--card-rad);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden
        }

        .wcc::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, .04), transparent 40%);
            pointer-events: none
        }

        .wt {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--t40);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .wg {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--t80)
        }

        .cdr {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .cdu {
            text-align: center;
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: 8px;
            padding: 8px 12px;
            min-width: 52px
        }

        .cdn {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--t100)
        }

        .cdl {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--t20);
            margin-top: 2px
        }

        /* Leaderboard */
        .lbr {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .lbr-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: 10px;
            transition: all .3s;
            position: relative;
            overflow: hidden
        }

        .lbr-item:hover {
            background: var(--card-h);
            border-color: var(--t20);
            transform: translateX(3px)
        }

        .lbr-item.me {
            border-color: rgba(255, 255, 255, .15);
            background: rgba(255, 255, 255, .04)
        }

        .lbr-item.me::before {
            content: 'YOU';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 8px;
            letter-spacing: .1em;
            color: var(--t20);
            font-family: 'Space Grotesk', sans-serif
        }

        .lbr-rank {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--t40);
            width: 28px;
            text-align: center
        }

        .lbr-rank.gold {
            color: #ffd060
        }

        .lbr-rank.silver {
            color: #c0c0c0
        }

        .lbr-rank.bronze {
            color: #cd7f32
        }

        .lbr-av {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--card-h);
            border: 1px solid var(--card-b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            overflow: hidden
        }

        .lbr-av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .lbr-info {
            flex: 1
        }

        .lbr-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--t80)
        }

        .lbr-sub {
            font-size: 10px;
            color: var(--t40);
            margin-top: 2px
        }

        .lbr-xp {
            font-family: 'Syne', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--t60)
        }

        .lbr-badge {
            font-size: 12px;
            margin-left: 4px
        }

        /* Pricing */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px
        }

        .price-card {
            background: var(--card);
            border: 1px solid var(--card-b);
            border-radius: 18px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all .4s
        }

        .price-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 50px rgba(0, 0, 0, .4)
        }

        .price-card.popular {
            border-color: rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .05)
        }

        .price-card.popular::before {
            content: 'MOST POPULAR';
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 8px;
            letter-spacing: .12em;
            color: var(--t40);
            padding: 3px 10px;
            border: 1px solid var(--card-b);
            border-radius: 100px
        }

        .price-name {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--t60);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 8px
        }

        .price-amt {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--t100);
            line-height: 1;
            margin-bottom: 4px
        }

        .price-amt span {
            font-size: 1rem;
            font-weight: 400;
            color: var(--t40)
        }

        .price-per {
            font-size: 11px;
            color: var(--t40);
            margin-bottom: 20px
        }

        .price-feat {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px
        }

        .price-feat li {
            font-size: 13px;
            color: var(--t60);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .price-feat li::before {
            content: '✓';
            color: var(--t40);
            flex-shrink: 0
        }

        .price-feat li.locked {
            color: var(--t20)
        }

        .price-feat li.locked::before {
            content: '✕';
            color: rgba(200, 60, 60, .4)
        }

        .price-btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s;
            letter-spacing: .03em
        }

        .price-btn.primary {
            background: rgba(255, 255, 255, .1);
            border: 1px solid var(--card-b);
            color: var(--t100)
        }

        .price-btn.primary:hover {
            background: rgba(255, 255, 255, .18);
            transform: scale(1.02)
        }

        .price-btn.disabled {
            background: var(--card);
            border: 1px solid var(--card-b);
            color: var(--t40);
            cursor: default
        }

        .trial-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 200, 50, .08);
            border: 1px solid rgba(255, 200, 50, .2);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 11px;
            color: rgba(255, 200, 50, .8);
            margin-bottom: 20px
        }

        /* Settings panel */
        .settings-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fi .35s ease
        }

        @keyframes fi {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .settings-panel {
            background: var(--bg3);
            border: 1px solid var(--card-b);
            border-radius: 24px;
            width: min(700px, 94vw);
            max-height: 88vh;
            overflow-y: auto;
            animation: spi .45s cubic-bezier(.34, 1.5, .64, 1)
        }

        @keyframes spi {
            from {
                opacity: 0;
                transform: scale(.88) translateY(40px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .sp-header {
            padding: 24px 28px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg3);
            border-radius: 24px 24px 0 0;
            z-index: 2;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-b)
        }

        .sp-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--t100), var(--dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .sp-close {
            background: none;
            border: 1px solid var(--card-b);
            color: var(--t40);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;

            height: 22px;

            height: 16px;

        }

        @media(max-width:700px) {

            }

        }

            .sr {
                grid-template-columns: 1fr
            }

            .nav-tab {
                display: none
            }
        }
    </style>
</head>

        /* ===== ACCOUNTS ===== */
        const ACCOUNTS = {

        /* ===== AUDIO ENGINE ===== */
        let audioCtx = null;
        function getAudio() {
            if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)() } catch (e) { }
            return audioCtx;
        }
        function playTone(freq, dur, type, vol, delay) {
            const a = getAudio(); if (!a || !window._soundOn) return;
            try {
                const g = a.createGain(); const o = a.createOscillator();
                o.type = type || 'sine'; o.frequency.value = freq;
                g.gain.setValueAtTime(0, .001);
                g.gain.linearRampToValueAtTime(vol || .15, a.currentTime + (delay || 0) + .01);
                g.gain.exponentialRampToValueAtTime(.001, a.currentTime + (delay || 0) + dur);
                o.connect(g); g.connect(a.destination);
                o.start(a.currentTime + (delay || 0)); o.stop(a.currentTime + (delay || 0) + dur + .05);
            } catch (e) { }
        }
        function sfxComplete() {

        function rsStreak(d) {
            const t = new Date().toISOString().split('T')[0]; if (d.la === t) return d;
            const y = new Date(Date.now() - 864e5).toISOString().split('T')[0];
            return { ...d, streak: d.la === y ? d.streak + 1 : 1, la: t, xp: d.xp + 10 };
        }
        function isPro(uname) {
            const acc = ACCOUNTS[uname]; if (!acc) return false;
            if (acc.pro) return true;
            if (acc.trialEnd && new Date(acc.trialEnd) > new Date()) return true;

        function trialDaysLeft(uname) {
            const acc = ACCOUNTS[uname]; if (!acc || !acc.trialEnd) return 0;
            const diff = new Date(acc.trialEnd) - new Date();

        /* ===== THEME CTX ===== */
        const TC = createContext({ th: 'void', setTh: () => { } });

        /* ===== ANIMATED NUMBER ===== */
        function useAN(target, dur = 900) {
            const [v, setV] = useState(target); const pr = useRef(target); const af = useRef(0);
            useEffect(() => {
                const fr = pr.current; const st = performance.now();
                function tick(now) {
                    const p = Math.min((now - st) / dur, 1); const e = 1 - Math.pow(1 - p, 3);
                    setV(Math.round(fr + (target - fr) * e));
                    if (p < 1) af.current = requestAnimationFrame(tick); else pr.current = target;
                }
                af.current = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(af.current);
            }, [target, dur]);
            return v;
        }

        /* ===== PARTICLES ===== */
        const Particles = memo(function ({ intensity = 1, dark = true }) {
            const cr = useRef(null); const pts = useRef([]); const mo = useRef({ x: -9e3, y: -9e3 }); const af = useRef(0);
            useEffect(() => {
                const c = cr.current; if (!c) return; const ctx = c.getContext('2d');
                function resize() { c.width = innerWidth; c.height = innerHeight }
                resize(); const N = Math.min(Math.floor(55 * intensity), 90); pts.current = [];
                for (let i = 0; i < N; i++)pts.current.push({
                    x: Math.random() * c.width, y: Math.random() * c.height,
                    vx: (Math.random() - .5) * .3 * intensity, vy: (Math.random() - .5) * .3 * intensity,
                    sz: Math.random() * 1.4 + .4, op: Math.random() * .22 + .04
                });
                function draw() {
                    ctx.clearRect(0, 0, c.width, c.height); const col = dark ? '255,255,255' : '0,0,0';
                    pts.current.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0) p.x = c.width; if (p.x > c.width) p.x = 0;
                        if (p.y < 0) p.y = c.height; if (p.y > c.height) p.y = 0;
                        const dx = mo.current.x - p.x, dy = mo.current.y - p.y;
                        if (dx * dx + dy * dy < 12000) { p.x -= dx * .003; p.y -= dy * .003 }
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${col},${p.op})`; ctx.fill();
                    });
                    for (let i = 0; i < pts.current.length; i++)for (let j = i + 1; j < pts.current.length; j++) {
                        const dx = pts.current[i].x - pts.current[j].x, dy = pts.current[i].y - pts.current[j].y, d2 = dx * dx + dy * dy;
                        if (d2 < 11000) {
                            ctx.beginPath(); ctx.moveTo(pts.current[i].x, pts.current[i].y);
                            ctx.lineTo(pts.current[j].x, pts.current[j].y);
                            ctx.strokeStyle = `rgba(${col},${0.03 * (1 - d2 / 11000)})`; ctx.lineWidth = .5; ctx.stroke()
                        }
                    }
                    af.current = requestAnimationFrame(draw);
                }
                af.current = requestAnimationFrame(draw);
                const mm = e => { mo.current = { x: e.clientX, y: e.clientY } };
                const ml = () => { mo.current = { x: -9e3, y: -9e3 } };
                addEventListener('resize', resize); addEventListener('mousemove', mm); addEventListener('mouseleave', ml);
                return () => {
                    cancelAnimationFrame(af.current); removeEventListener('resize', resize);
                    removeEventListener('mousemove', mm); removeEventListener('mouseleave', ml)
                };
            }, [intensity, dark]);
            return <canvas ref={cr} className="bgc" />;
        });

        /* ===== ORBIT BG ===== */
        const OrbitBG = memo(function ({ intensity = 1, dark = true }) {
            const cr = useRef(null); const af = useRef(0);
            useEffect(() => {
                const c = cr.current; if (!c) return; const ctx = c.getContext('2d');
                function resize() { c.width = innerWidth; c.height = innerHeight }
                resize();
                const orbs = [{ r: 60, sp: .0004 * intensity, a: 0, sz: 2.5 }, { r: 120, sp: .00025 * intensity, a: 1.2, sz: 2 },
                { r: 190, sp: .00016 * intensity, a: 2.5, sz: 1.8 }, { r: 270, sp: .00011 * intensity, a: 4, sz: 1.5 },
                { r: 370, sp: .00007 * intensity, a: 5.5, sz: 1.2 }];
                function draw() {
                    ctx.clearRect(0, 0, c.width, c.height); const cx = c.width / 2, cy = c.height / 2;
                    const col = dark ? '255,255,255' : '0,0,0';
                    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 14);
                    g.addColorStop(0, `rgba(${col},.06)`); g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.fill();
                    orbs.forEach(o => {
                        ctx.beginPath(); ctx.arc(cx, cy, o.r, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(${col},.025)`; ctx.lineWidth = .5; ctx.stroke();
                        o.a += o.sp;
                        const px = cx + Math.cos(o.a) * o.r, py = cy + Math.sin(o.a) * o.r;
                        ctx.beginPath(); ctx.arc(px, py, o.sz, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${col},.12)`; ctx.fill();
                    });
                    af.current = requestAnimationFrame(draw);
                }
                af.current = requestAnimationFrame(draw);
                addEventListener('resize', resize);
                return () => { cancelAnimationFrame(af.current); removeEventListener('resize', resize) };
            }, [intensity, dark]);

        });

        /* ===== INTRO ===== */

            const winner = me.xp >= other.xp ? me : other;
            const meLeading = me.xp >= other.xp;
            const diff = Math.abs(me.xp - other.xp);

            const stats = [

        /* ===== GUIDE / TUTORIAL ===== */
        function Guide({ onClose }) {
            const [step, setStep] = useState(0);
            const [text, setText] = useState('');
            const [typing, setTyping] = useState(true);
            const tiRef = useRef(null);

            useEffect(() => {
                setText(''); setTyping(true);
                const full = TUTORIAL_STEPS[step].text;
                let i = 0;
                tiRef.current = setInterval(() => {
                    setText(full.slice(0, i + 1)); i++;
                    if (i >= full.length) { clearInterval(tiRef.current); setTyping(false) }
                }, 22);
                return () => clearInterval(tiRef.current);
            }, [step]);

            function next() {
                sfxNav();
                if (step < TUTORIAL_STEPS.length - 1) setStep(step + 1);
                else onClose();
            }
            function prev() { sfxNav(); if (step > 0) setStep(step - 1) }
            function goStep(i) { sfxNav(); setStep(i) }

            return <div className="guide-overlay" onClick={onClose}>
                <div className="guide-box" onClick={e => e.stopPropagation()}>

                            {/* Eyes - large anime */}

        /* ===== ADD MODAL ===== */
        function AddModal({ count, onAdd, onClose }) {
            const [text, setText] = useState('');
            const [cat, setCat] = useState('');
            function submit() {
                const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
                if (lines.length > 0) { onAdd(lines, cat); sfxClick(); }
                onClose();
            }
            return <div className="mov" onClick={onClose}>
                <div className="moc" onClick={e => e.stopPropagation()}>
                    <h3>Add New Goals</h3>
                    <div style={{ fontSize: 11, color: 'var(--t40)', marginBottom: 12 }}>{count}/100 goals used · One goal per line</div>
                    <textarea value={text} onChange={e => setText(e.target.value)}
                        placeholder={"Learn to surf\nVisit Japan\nWrite a song"} rows={5} autoFocus />
                    <label>Category (optional)</label>
                    <select value={cat} onChange={e => setCat(e.target.value)}>
                        <option value="">No category</option>
                        {CATS.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                    <div className="moa">
                        <button className="mcb" onClick={onClose}>Cancel</button>
                        <button className="mfb" onClick={submit}>Add Goals</button>
                    </div>
                </div>
            </div>;
        }

        /* ===== SETTINGS PANEL ===== */
        function Settings({ data, onUpdate, onClose, isPro, uname }) {
            const ctx = useContext(TC);
            const theme = ctx.th;
            const setTheme = ctx.setTh;
            const [trialNote, setTrialNote] = useState(false);

            function chTh(tid, free) {
                if (!free && !isPro) { setTrialNote(true); setTimeout(() => setTrialNote(false), 3000); return }
                sfxClick(); setTheme(tid); onUpdate({ ...data, th: tid });
            }
            function persist(nd) { onUpdate(nd) }

            return <div className="settings-overlay" onClick={onClose}>
                <div className="settings-panel" onClick={e => e.stopPropagation()}>

                        <div className="sp-title">⚙️ Settings</div>

                                            {locked && <div className="th-lock show">🔒</div>}
                                        </div>
                                        <div className="thn">{t.n}</div>
                                    </div>;
                                })}
                            </div>
                        </div>

                        <div className="sp-section">
                            <div className="sp-sec-title">Display</div>
                            <div className="srow">
                                <div className="slbl">Background Animations<small>Particle effects</small></div>

                                </div>
                            </div>
                            <div className="srow">
                                <div className="slbl">Grayscale Photos<small>Black & white memory style</small></div>
                                <button className={`tsw${data.gs ? ' on' : ''}`} onClick={() => persist({ ...data, gs: !data.gs })} />

        function App() {

            useEffect(() => {
                if (data && uname) sv(data, uname);
            }, [data, uname]);

            const introDone = useCallback(() => { setPhase(uname ? 'dashboard' : 'login') }, [uname]);

            function handleLogin(u) {
                let d = ld(u); if (!d) d = mkUser(u);
                d = rsStreak(d); setUname(u); setData(d); sv(d, u); setPhase('dashboard');
            }
            function handleUpdate(nd) { setData(nd); if (uname) sv(nd, uname) }
            function handleLogout() { setData(null); setUname(null); setPhase('login') }

            const currentTheme = (data && data.th) || 'void';

            return <TP init={currentTheme}>
                <AppInner phase={phase} data={data} uname={uname}
                    onIntroDone={introDone} onLogin={handleLogin} onUpdate={handleUpdate} onLogout={handleLogout} />
            </TP>;
        }

        function AppInner({ phase, data, uname, onIntroDone, onLogin, onUpdate, onLogout }) {
            const ctx = useContext(TC); const theme = ctx.th; const isDark = theme !== 'frost';
            if (phase === 'intro') return <>
                <Particles intensity={1} dark={true} />
                <Intro onDone={onIntroDone} />
            </>;
            if (phase === 'login') return <>
                <Particles intensity={.7} dark={isDark} />
                <OrbitBG intensity={.5} dark={isDark} />
                <Login onLogin={onLogin} />
            </>;
            if (phase === 'dashboard' && data) return <Dashboard data={data} onUpdate={onUpdate} onLogout={onLogout} uname={uname} />;
            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
